<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CITY 17 — The Arrival</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    color: #c8c8c8;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    cursor: default;
    user-select: none;
  }
  canvas { display: block; }

  /* ---------- TITLE SCREEN ---------- */
  #title-screen {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, #1a1a1a 0%, #000 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000;
    transition: opacity 2s;
  }
  #title-screen h1 {
    font-size: 6vw;
    letter-spacing: 1.2vw;
    color: #d8d8d8;
    text-shadow: 0 0 40px rgba(80,120,160,0.25);
    margin-bottom: 1vw;
    font-weight: 100;
  }
  #title-screen h2 {
    font-size: 1.4vw;
    letter-spacing: 0.6vw;
    color: #7a8896;
    margin-bottom: 4vw;
    font-weight: 100;
  }
  #title-screen button {
    background: transparent;
    border: 1px solid #5a6878;
    color: #b8c4d0;
    padding: 1.2vw 4vw;
    font-size: 1.1vw;
    letter-spacing: 0.4vw;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.3s;
  }
  #title-screen button:hover {
    background: rgba(80,120,160,0.1);
    border-color: #8a9aa8;
    color: #e0e8f0;
    letter-spacing: 0.6vw;
  }
  #title-screen .hint {
    margin-top: 3vw;
    font-size: 0.9vw;
    color: #4a5664;
    letter-spacing: 0.2vw;
  }
  .flicker { animation: flicker 4s infinite; }
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    72% { opacity: 1; }
    73% { opacity: 0.4; }
    74% { opacity: 1; }
    76% { opacity: 0.7; }
    77% { opacity: 1; }
  }

  /* ---------- HUD ---------- */
  #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

  /* Letterbox bars for cinematic moments */
  #letterbox-top, #letterbox-bottom {
    position: fixed; left: 0; right: 0;
    height: 0; background: #000;
    transition: height 1.2s ease-in-out;
    z-index: 20;
  }
  #letterbox-top { top: 0; }
  #letterbox-bottom { bottom: 0; }
  #hud.letterboxed #letterbox-top,
  #hud.letterboxed #letterbox-bottom { height: 12vh; }

  /* Fade overlay */
  #fade-overlay {
    position: fixed; inset: 0;
    background: #000;
    opacity: 0;
    transition: opacity 2s;
    pointer-events: none;
    z-index: 30;
  }
  #fade-overlay.black { opacity: 1; }

  /* Vignette */
  #vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
  }

  /* Damage / heartbeat pulse */
  #pulse-overlay {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(120,20,20,0) 100%);
    pointer-events: none;
    transition: background 0.4s;
  }
  #pulse-overlay.stressed {
    background: radial-gradient(ellipse at center, transparent 20%, rgba(120,20,20,0.35) 100%);
  }

  /* Subtitle */
  #subtitle {
    position: fixed;
    bottom: 12vh;
    left: 50%; transform: translateX(-50%);
    max-width: 70vw;
    text-align: center;
    color: #e0e0e0;
    font-size: 1.2vw;
    letter-spacing: 0.1vw;
    text-shadow: 0 2px 8px rgba(0,0,0,0.9);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 25;
  }
  #subtitle.show { opacity: 1; }
  #subtitle .speaker {
    display: block;
    font-size: 0.85vw;
    color: #7a8896;
    letter-spacing: 0.4vw;
    margin-bottom: 0.4vw;
    text-transform: uppercase;
  }

  /* Chapter title card */
  #chapter-card {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    opacity: 0;
    transition: opacity 1.5s;
    z-index: 22;
  }
  #chapter-card.show { opacity: 1; }
  #chapter-card .number {
    font-size: 0.9vw;
    color: #5a6878;
    letter-spacing: 0.8vw;
    margin-bottom: 1.5vw;
  }
  #chapter-card .title {
    font-size: 3.5vw;
    color: #d8dce0;
    letter-spacing: 0.8vw;
    font-weight: 100;
    text-shadow: 0 0 30px rgba(60,90,120,0.3);
  }
  #chapter-card .subtitle {
    font-size: 1vw;
    color: #6a7684;
    letter-spacing: 0.5vw;
    margin-top: 1.5vw;
    font-style: italic;
  }

  /* Objective hint (top-right, very subtle) */
  #objective {
    position: fixed;
    top: 18vh; right: 3vw;
    color: #6a7684;
    font-size: 0.85vw;
    letter-spacing: 0.2vw;
    text-align: right;
    opacity: 0;
    transition: opacity 0.8s;
    max-width: 22vw;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9);
  }
  #objective.show { opacity: 0.8; }
  #objective::before {
    content: '› ';
    color: #4a5664;
  }

  /* Interaction prompt */
  #prompt {
    position: fixed;
    bottom: 35%; left: 50%;
    transform: translateX(-50%);
    color: #d0d4d8;
    font-size: 0.95vw;
    letter-spacing: 0.3vw;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  #prompt.show { opacity: 0.9; }
  #prompt .key {
    display: inline-block;
    border: 1px solid #8a9aa8;
    padding: 0.2vw 0.6vw;
    margin-right: 0.4vw;
    color: #e0e8f0;
  }

  /* Crosshair (minimal dot, HL2 style) */
  #crosshair {
    position: fixed;
    top: 50%; left: 50%;
    width: 4px; height: 4px;
    margin-left: -2px; margin-top: -2px;
    border-radius: 50%;
    background: rgba(200, 210, 220, 0.7);
    box-shadow: 0 0 3px rgba(0,0,0,0.8);
    opacity: 0;
    transition: opacity 0.3s;
  }
  #crosshair.show { opacity: 0.6; }

  /* Noise / grain overlay for film feel */
  #grain {
    position: fixed; inset: 0;
    opacity: 0.06;
    pointer-events: none;
    background-image:
      radial-gradient(circle at 25% 25%, rgba(255,255,255,0.1) 1px, transparent 1px),
      radial-gradient(circle at 75% 75%, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 3px 3px, 4px 4px;
    mix-blend-mode: overlay;
  }

  /* Breen screen overlay (for intro TV moment) */
  #breen-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0);
    pointer-events: none;
    z-index: 15;
    transition: background 1s;
  }

  /* Loading screen */
  #loading {
    position: fixed; inset: 0;
    background: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 500;
    transition: opacity 1s;
  }
  #loading.hide { opacity: 0; pointer-events: none; }
  #loading .label {
    color: #6a7684;
    letter-spacing: 0.6vw;
    font-size: 0.9vw;
    margin-bottom: 2vw;
  }
  #loading .bar {
    width: 30vw; height: 2px;
    background: #1a1d22;
    overflow: hidden;
  }
  #loading .fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #3a5068, #6a8aaa);
    transition: width 0.3s;
  }
</style>

  <h1 class="flicker">CITY&nbsp;17</h1>

<script type="module">
import * as THREE from 'three';

// ============================================================================
// CITY 17 — THE ARRIVAL
// A cinematic Half-Life 2 inspired first-person campaign in Three.js
// ============================================================================
// Architecture:
//   • AudioSystem   — layered procedural audio via Web Audio API
//   • Characters    — detailed procedural skeletal models with idle anim
//   • Player        — momentum-based FPS controls + head bob + FOV + breathing
//   • UI            — subtitles, chapter cards, objectives, letterboxing
//   • Chapters      — scripted set-pieces; each is self-contained
//   • Game          — the conductor
// ============================================================================

// ------------------------------- CONSTANTS ----------------------------------

const COLORS = {
  skin:            0xc8a487,
  skinShadow:      0x8a6a52,
  hair:            0x2a1f18,
  jumpsuitBlue:    0x3d4a5a,
  jumpsuitGray:    0x55585e,
  jumpsuitDark:    0x2a2e34,
  rebelGreen:      0x4a5240,
  rebelBrown:      0x524432,
  cpArmor:         0x14171c,      // Civil Protection body armor
  cpBlue:          0x1a3048,      // CP accents
  cpMask:          0x0a0c10,
  cpLens:          0xc84030,      // red glow lenses
  scannerBody:     0x2a2e34,
  scannerLight:    0xfff0c0,
  concrete:        0x7a7670,
  concreteDark:    0x4a4844,
  rust:            0x5a3a28,
  metal:           0x484a4e,
  metalDark:       0x28292c,
  trainGreen:      0x2a3830,
  paper:           0xa89a84,
  glass:           0x6090b0,
  skyDay:          0x8a94a0,
  skyNight:        0x0a0f18,
  neon:            0xff5040,
  fireOrange:      0xff6820,
  screenBlue:      0x4070a8,
  woodDark:        0x3a2a1c,
  fabric:          0x6a5c4e,
};

const SETTINGS = {
  playerSpeed: 3.2,
  sprintMult:  1.7,
  jumpSpeed:   5.5,
  gravity:    -18,
  mouseSens:   0.0022,
  eyeHeight:   1.68,
  fovNormal:   72,
  fovSprint:   82,
};

// ------------------------------- UTILITIES ----------------------------------

const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp  = (a, b, t) => a + (b - a) * t;
const rand  = (a = 0, b = 1) => a + Math.random() * (b - a);
const irand = (a, b) => Math.floor(rand(a, b + 1));
const pick  = arr => arr[Math.floor(Math.random() * arr.length)];

// Standard material shortcut with good defaults for this grim palette
function stdMat(color, opts = {}) {
  return new THREE.MeshStandardMaterial({
    color,
    roughness: opts.roughness ?? 0.85,
    metalness: opts.metalness ?? 0.05,
    emissive: opts.emissive ?? 0x000000,
    emissiveIntensity: opts.emissiveIntensity ?? 0,
    transparent: opts.transparent ?? false,
    opacity: opts.opacity ?? 1,
    flatShading: opts.flatShading ?? false,
    side: opts.side ?? THREE.FrontSide,
  });
}

// ============================================================================
// AUDIO SYSTEM — fully procedural via Web Audio API
// Layers: ambient hum, wind, distant sirens, heartbeat, footsteps,
//         radio chatter, loudspeaker voice (formant synthesis), music stings.
// ============================================================================

class AudioSystem {
  constructor() {
    this.ctx = null;
    this.master = null;
    this.ambientGain = null;
    this.musicGain = null;
    this.sfxGain = null;
    this.voiceGain = null;
    this.ambientLayers = [];
    this.heartbeat = null;
    this.heartbeatIntensity = 0;
    this.currentMusic = null;
  }

  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.master = this.ctx.createGain();
    this.master.gain.value = 0.7;
    this.master.connect(this.ctx.destination);

    // Sub-mix buses
    this.ambientGain = this.ctx.createGain(); this.ambientGain.gain.value = 0.55;
    this.musicGain   = this.ctx.createGain(); this.musicGain.gain.value   = 0.5;
    this.sfxGain     = this.ctx.createGain(); this.sfxGain.gain.value     = 0.9;
    this.voiceGain   = this.ctx.createGain(); this.voiceGain.gain.value   = 0.85;
    [this.ambientGain, this.musicGain, this.sfxGain, this.voiceGain]
      .forEach(g => g.connect(this.master));

    // Cached noise buffer for reuse
    this._noiseBuffer = this._createNoiseBuffer(2);
  }

  _createNoiseBuffer(seconds) {
    const sr = this.ctx.sampleRate;
    const buf = this.ctx.createBuffer(1, sr * seconds, sr);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    return buf;
  }

  _noiseSource() {
    const n = this.ctx.createBufferSource();
    n.buffer = this._noiseBuffer;
    n.loop = true;
    return n;
  }

  // ---------------- AMBIENT BEDS ----------------

  startAmbient(scene) {
    this.stopAmbient();
    if (scene === 'train') {
      this.ambientLayers.push(this._ambientTrain());
    } else if (scene === 'station') {
      this.ambientLayers.push(this._ambientCityHum());
      this.ambientLayers.push(this._ambientCrowd());
    } else if (scene === 'plaza') {
      this.ambientLayers.push(this._ambientCityHum());
      this.ambientLayers.push(this._ambientWind(0.4));
      this.ambientLayers.push(this._ambientDistantSiren());
    } else if (scene === 'alley') {
      this.ambientLayers.push(this._ambientCityHum(0.7));
      this.ambientLayers.push(this._ambientWind(0.55));
      this.ambientLayers.push(this._ambientDripping());
    } else if (scene === 'safehouse') {
      this.ambientLayers.push(this._ambientRoomTone());
      this.ambientLayers.push(this._ambientMuffledCity());
    } else if (scene === 'checkpoint') {
      this.ambientLayers.push(this._ambientCityHum());
      this.ambientLayers.push(this._ambientFluorescent());
    } else if (scene === 'night') {
      this.ambientLayers.push(this._ambientWind(0.65));
      this.ambientLayers.push(this._ambientDistantSiren());
      this.ambientLayers.push(this._ambientRain(0.3));
    } else if (scene === 'collapse') {
      this.ambientLayers.push(this._ambientRumble());
    }
  }

  stopAmbient() {
    this.ambientLayers.forEach(layer => {
      try {
        if (layer.gain) {
          layer.gain.gain.cancelScheduledValues(this.ctx.currentTime);
          layer.gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 1.2);
        }
        setTimeout(() => { try { layer.stop && layer.stop(); } catch (e) {} }, 1300);
      } catch (e) {}
    });
    this.ambientLayers = [];
  }

  _ambientTrain() {
    // Low rumbling hum + rhythmic clack of rails
    const osc = this.ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = 42;
    const lfo = this.ctx.createOscillator();
    lfo.frequency.value = 2.3;
    const lfoGain = this.ctx.createGain();
    lfoGain.gain.value = 3;
    lfo.connect(lfoGain).connect(osc.frequency);

    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = 180; filter.Q.value = 0.7;
    const gain = this.ctx.createGain();
    gain.gain.value = 0; gain.gain.linearRampToValueAtTime(0.35, this.ctx.currentTime + 2);
    osc.connect(filter).connect(gain).connect(this.ambientGain);
    osc.start(); lfo.start();

    // Rail clacks
    const clackInterval = setInterval(() => {
      const n = this._noiseSource();
      const nf = this.ctx.createBiquadFilter();
      nf.type = 'bandpass'; nf.frequency.value = 120 + rand(0, 40); nf.Q.value = 8;
      const ng = this.ctx.createGain();
      ng.gain.setValueAtTime(0, this.ctx.currentTime);
      ng.gain.linearRampToValueAtTime(0.12, this.ctx.currentTime + 0.005);
      ng.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + 0.08);
      n.connect(nf).connect(ng).connect(this.ambientGain);
      n.start(); n.stop(this.ctx.currentTime + 0.1);
    }, 900);

    return {
      gain,
      stop: () => { clearInterval(clackInterval); try { osc.stop(); lfo.stop(); } catch (e) {} }
    };
  }

  _ambientCityHum(vol = 1) {
    // Deep 50Hz grid hum + faint machinery drone
    const osc1 = this.ctx.createOscillator();
    osc1.type = 'sawtooth'; osc1.frequency.value = 54;
    const osc2 = this.ctx.createOscillator();
    osc2.type = 'sawtooth'; osc2.frequency.value = 108;
    const osc3 = this.ctx.createOscillator();
    osc3.type = 'sine'; osc3.frequency.value = 32;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = 280;
    const gain = this.ctx.createGain();
    gain.gain.value = 0; gain.gain.linearRampToValueAtTime(0.22 * vol, this.ctx.currentTime + 3);
    osc1.connect(filter); osc2.connect(filter); osc3.connect(filter);
    filter.connect(gain).connect(this.ambientGain);
    osc1.start(); osc2.start(); osc3.start();
    return { gain, stop: () => { try { osc1.stop(); osc2.stop(); osc3.stop(); } catch (e) {} } };
  }

  _ambientWind(vol = 0.5) {
    const n = this._noiseSource();
    const hp = this.ctx.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 200;
    const lp = this.ctx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 600;
    const gain = this.ctx.createGain();
    gain.gain.value = 0; gain.gain.linearRampToValueAtTime(0.18 * vol, this.ctx.currentTime + 4);
    n.connect(hp).connect(lp).connect(gain).connect(this.ambientGain);
    n.start();

    // Modulate filter for gusts
    const modInterval = setInterval(() => {
      const now = this.ctx.currentTime;
      lp.frequency.linearRampToValueAtTime(300 + rand(0, 600), now + rand(2, 5));
    }, 2500);

    return { gain, stop: () => { clearInterval(modInterval); try { n.stop(); } catch (e) {} } };
  }

  _ambientDistantSiren() {
    // Sweeping sine every ~15-25s, very quiet
    let timer;
    const trigger = () => {
      const dur = rand(4, 7);
      const osc = this.ctx.createOscillator();
      osc.type = 'sine';
      const now = this.ctx.currentTime;
      osc.frequency.setValueAtTime(520, now);
      osc.frequency.linearRampToValueAtTime(680, now + dur * 0.5);
      osc.frequency.linearRampToValueAtTime(520, now + dur);
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.04, now + 1);
      g.gain.linearRampToValueAtTime(0.04, now + dur - 1);
      g.gain.linearRampToValueAtTime(0, now + dur);
      const lp = this.ctx.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 1200;
      osc.connect(lp).connect(g).connect(this.ambientGain);
      osc.start(now); osc.stop(now + dur + 0.1);
      timer = setTimeout(trigger, rand(14000, 28000));
    };
    timer = setTimeout(trigger, rand(3000, 8000));
    return { gain: { gain: { linearRampToValueAtTime: () => {} } }, stop: () => clearTimeout(timer) };
  }

  _ambientCrowd() {
    // Filtered noise bursts to simulate distant crowd/footstep murmur
    const n = this._noiseSource();
    const bp = this.ctx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 800; bp.Q.value = 1;
    const gain = this.ctx.createGain();
    gain.gain.value = 0; gain.gain.linearRampToValueAtTime(0.08, this.ctx.currentTime + 3);
    n.connect(bp).connect(gain).connect(this.ambientGain);
    n.start();

    // Random spikes (cough, voice)
    const spikeTimer = setInterval(() => {
      const s = this._noiseSource();
      const f = this.ctx.createBiquadFilter();
      f.type = 'bandpass'; f.frequency.value = 300 + rand(0, 1200); f.Q.value = 5;
      const g = this.ctx.createGain();
      const now = this.ctx.currentTime;
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.08, now + 0.04);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
      s.connect(f).connect(g).connect(this.ambientGain);
      s.start(); s.stop(now + 0.5);
    }, 2000);

    return { gain, stop: () => { clearInterval(spikeTimer); try { n.stop(); } catch (e) {} } };
  }

  _ambientDripping() {
    let timer;
    const drip = () => {
      const now = this.ctx.currentTime;
      const osc = this.ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1800, now);
      osc.frequency.exponentialRampToValueAtTime(400, now + 0.12);
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(0.12, now);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 0.25);
      osc.connect(g).connect(this.ambientGain);
      osc.start(now); osc.stop(now + 0.3);
      timer = setTimeout(drip, rand(2500, 6000));
    };
    timer = setTimeout(drip, 2000);
    return { gain: { gain: { linearRampToValueAtTime: () => {} } }, stop: () => clearTimeout(timer) };
  }

  _ambientRoomTone() {
    const n = this._noiseSource();
    const lp = this.ctx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 140;
    const gain = this.ctx.createGain();
    gain.gain.value = 0; gain.gain.linearRampToValueAtTime(0.12, this.ctx.currentTime + 3);
    n.connect(lp).connect(gain).connect(this.ambientGain);
    n.start();
    return { gain, stop: () => { try { n.stop(); } catch (e) {} } };
  }

  _ambientMuffledCity() {
    const osc = this.ctx.createOscillator();
    osc.type = 'sawtooth'; osc.frequency.value = 65;
    const lp = this.ctx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 100;
    const gain = this.ctx.createGain();
    gain.gain.value = 0; gain.gain.linearRampToValueAtTime(0.08, this.ctx.currentTime + 3);
    osc.connect(lp).connect(gain).connect(this.ambientGain);
    osc.start();
    return { gain, stop: () => { try { osc.stop(); } catch (e) {} } };
  }

  _ambientFluorescent() {
    // 60Hz buzz with flicker
    const osc = this.ctx.createOscillator();
    osc.type = 'sawtooth'; osc.frequency.value = 60;
    const hp = this.ctx.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 55;
    const gain = this.ctx.createGain();
    gain.gain.value = 0.02;
    osc.connect(hp).connect(gain).connect(this.ambientGain);
    osc.start();

    const flickerTimer = setInterval(() => {
      const now = this.ctx.currentTime;
      gain.gain.setValueAtTime(0.02, now);
      gain.gain.linearRampToValueAtTime(0.08, now + 0.03);
      gain.gain.linearRampToValueAtTime(0.015, now + 0.08);
      gain.gain.linearRampToValueAtTime(0.02, now + 0.15);
    }, rand(3000, 7000));

    return { gain, stop: () => { clearInterval(flickerTimer); try { osc.stop(); } catch (e) {} } };
  }

  _ambientRain(vol = 0.4) {
    const n = this._noiseSource();
    const hp = this.ctx.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 1200;
    const gain = this.ctx.createGain();
    gain.gain.value = 0; gain.gain.linearRampToValueAtTime(0.16 * vol, this.ctx.currentTime + 3);
    n.connect(hp).connect(gain).connect(this.ambientGain);
    n.start();
    return { gain, stop: () => { try { n.stop(); } catch (e) {} } };
  }

  _ambientRumble() {
    const osc = this.ctx.createOscillator();
    osc.type = 'sawtooth'; osc.frequency.value = 28;
    const lp = this.ctx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 80;
    const gain = this.ctx.createGain();
    gain.gain.value = 0; gain.gain.linearRampToValueAtTime(0.5, this.ctx.currentTime + 1);
    osc.connect(lp).connect(gain).connect(this.ambientGain);
    osc.start();
    return { gain, stop: () => { try { osc.stop(); } catch (e) {} } };
  }

  // ---------------- ONE-SHOTS ----------------

  playFootstep(material = 'concrete', volume = 1) {
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    const n = this._noiseSource();
    const f = this.ctx.createBiquadFilter();
    f.type = 'bandpass';
    if (material === 'concrete') { f.frequency.value = 400; f.Q.value = 2; }
    else if (material === 'metal') { f.frequency.value = 1800; f.Q.value = 6; }
    else if (material === 'debris') { f.frequency.value = 900; f.Q.value = 3; }
    else if (material === 'wood') { f.frequency.value = 600; f.Q.value = 4; }
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.15 * volume, now + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
    n.connect(f).connect(g).connect(this.sfxGain);
    n.start(now); n.stop(now + 0.13);
  }

  playDoorHiss() {
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    const n = this._noiseSource();
    const bp = this.ctx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 3500; bp.Q.value = 2;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.25, now + 0.1);
    g.gain.linearRampToValueAtTime(0.18, now + 0.8);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 1.4);
    n.connect(bp).connect(g).connect(this.sfxGain);
    n.start(now); n.stop(now + 1.5);

    // Hydraulic thunk
    setTimeout(() => this.playThunk(0.4), 100);
  }

  playThunk(volume = 1) {
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(120, now);
    osc.frequency.exponentialRampToValueAtTime(30, now + 0.15);
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.4 * volume, now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
    osc.connect(g).connect(this.sfxGain);
    osc.start(now); osc.stop(now + 0.45);
  }

  playScannerBeep() {
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    osc.type = 'square';
    osc.frequency.setValueAtTime(2400, now);
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.06, now + 0.01);
    g.gain.setValueAtTime(0.06, now + 0.04);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.1);
    osc.connect(g).connect(this.sfxGain);
    osc.start(now); osc.stop(now + 0.12);
  }

  playScannerFlash() {
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    // High-freq camera zap
    const osc = this.ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(3200, now);
    osc.frequency.exponentialRampToValueAtTime(800, now + 0.15);
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.2, now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
    osc.connect(g).connect(this.sfxGain);
    osc.start(now); osc.stop(now + 0.22);
  }

  playRadioSquelch() {
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    const n = this._noiseSource();
    const bp = this.ctx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 2800; bp.Q.value = 4;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.1, now + 0.02);
    g.gain.linearRampToValueAtTime(0.08, now + 0.3);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.45);
    n.connect(bp).connect(g).connect(this.sfxGain);
    n.start(now); n.stop(now + 0.5);
  }

  // Simple vocal synthesis — two formants + pitch contour per syllable
  speak(text, voiceType = 'citizen') {
    if (!this.ctx) return;
    const syllables = Math.max(2, Math.ceil(text.length / 4));
    let baseFreq, formant1, formant2, timbre;
    if (voiceType === 'breen')       { baseFreq = 110; formant1 = 700; formant2 = 1200; timbre = 'sawtooth'; }
    else if (voiceType === 'loudspeaker') { baseFreq = 140; formant1 = 900; formant2 = 1800; timbre = 'square'; }
    else if (voiceType === 'cp')          { baseFreq = 130; formant1 = 800; formant2 = 1600; timbre = 'square'; }
    else if (voiceType === 'rebel')       { baseFreq = 120; formant1 = 750; formant2 = 1400; timbre = 'sawtooth'; }
    else { baseFreq = 150; formant1 = 850; formant2 = 1500; timbre = 'triangle'; }

    const start = this.ctx.currentTime;
    for (let i = 0; i < syllables; i++) {
      const t0 = start + i * 0.14;
      const osc = this.ctx.createOscillator();
      osc.type = timbre;
      const pitch = baseFreq * (0.85 + Math.random() * 0.3);
      osc.frequency.setValueAtTime(pitch, t0);
      osc.frequency.linearRampToValueAtTime(pitch * 0.9, t0 + 0.12);

      const f1 = this.ctx.createBiquadFilter();
      f1.type = 'bandpass'; f1.frequency.value = formant1 + rand(-100, 100); f1.Q.value = 4;
      const f2 = this.ctx.createBiquadFilter();
      f2.type = 'bandpass'; f2.frequency.value = formant2 + rand(-200, 200); f2.Q.value = 3;

      const g = this.ctx.createGain();
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(0.15, t0 + 0.02);
      g.gain.setValueAtTime(0.15, t0 + 0.09);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.13);

      // Add voice distortion for broadcast voices
      if (voiceType === 'loudspeaker' || voiceType === 'breen' || voiceType === 'cp') {
        const dist = this.ctx.createWaveShaper();
        const curve = new Float32Array(256);
        for (let k = 0; k < 256; k++) {
          const x = (k / 128) - 1;
          curve[k] = Math.tanh(x * 3);
        }
        dist.curve = curve;
        osc.connect(f1).connect(f2).connect(dist).connect(g).connect(this.voiceGain);
      } else {
        osc.connect(f1).connect(f2).connect(g).connect(this.voiceGain);
      }
      osc.start(t0); osc.stop(t0 + 0.14);
    }
  }

  // ---------------- HEARTBEAT (tension) ----------------

  startHeartbeat() {
    if (this.heartbeat) return;
    let active = true;
    const beat = () => {
      if (!active || this.heartbeatIntensity <= 0) {
        setTimeout(beat, 300);
        return;
      }
      const now = this.ctx.currentTime;
      const bpm = lerp(60, 140, this.heartbeatIntensity);
      const vol = lerp(0.15, 0.5, this.heartbeatIntensity);
      // Two-thump kick
      [0, 0.12].forEach((offset, i) => {
        const osc = this.ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(80, now + offset);
        osc.frequency.exponentialRampToValueAtTime(35, now + offset + 0.15);
        const g = this.ctx.createGain();
        g.gain.setValueAtTime(vol * (i === 0 ? 1 : 0.7), now + offset);
        g.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.3);
        osc.connect(g).connect(this.sfxGain);
        osc.start(now + offset); osc.stop(now + offset + 0.35);
      });
      setTimeout(beat, 60000 / bpm);
    };
    this.heartbeat = { stop: () => { active = false; } };
    beat();
  }

  setHeartbeatIntensity(v) {
    this.heartbeatIntensity = clamp(v, 0, 1);
  }

  // ---------------- MUSIC STINGS ----------------

  playMusicTense() {
    if (!this.ctx) return;
    this.stopMusic();
    const now = this.ctx.currentTime;
    const notes = [55, 58, 62, 55];   // low dissonant drone
    const oscs = notes.map(freq => {
      const o = this.ctx.createOscillator();
      o.type = 'sawtooth';
      o.frequency.value = freq;
      return o;
    });
    const lp = this.ctx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 400;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.18, now + 3);
    oscs.forEach(o => o.connect(lp));
    lp.connect(g).connect(this.musicGain);
    oscs.forEach(o => o.start());
    this.currentMusic = { stop: () => { try { oscs.forEach(o => o.stop()); } catch (e) {} }, gain: g };
  }

  playMusicDread() {
    if (!this.ctx) return;
    this.stopMusic();
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    osc.type = 'sawtooth'; osc.frequency.value = 36;
    const osc2 = this.ctx.createOscillator();
    osc2.type = 'sawtooth'; osc2.frequency.value = 37.5;  // slight detune = beating
    const lp = this.ctx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 180;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.3, now + 4);
    osc.connect(lp); osc2.connect(lp);
    lp.connect(g).connect(this.musicGain);
    osc.start(); osc2.start();
    this.currentMusic = { stop: () => { try { osc.stop(); osc2.stop(); } catch (e) {} }, gain: g };
  }

  stopMusic() {
    if (this.currentMusic) {
      try {
        this.currentMusic.gain.gain.cancelScheduledValues(this.ctx.currentTime);
        this.currentMusic.gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2);
        setTimeout(() => this.currentMusic && this.currentMusic.stop(), 2100);
      } catch (e) {}
      this.currentMusic = null;
    }
  }
}

// ============================================================================
// CHARACTER FACTORY — procedural skeletal models with idle animation data
// Each character returns a THREE.Group with named sub-parts for animation.
// Models use multi-primitive construction for anatomical detail.
// ============================================================================

class CharacterFactory {

  // -------- helper: limb segment with joint caps --------
  static _limb(len, r1, r2, mat, jointMat) {
    const g = new THREE.Group();
    const seg = new THREE.Mesh(new THREE.CylinderGeometry(r1, r2, len, 10), mat);
    seg.position.y = -len / 2;
    g.add(seg);
    const topJoint = new THREE.Mesh(new THREE.SphereGeometry(r1 * 1.05, 10, 8), jointMat || mat);
    g.add(topJoint);
    const endJoint = new THREE.Mesh(new THREE.SphereGeometry(r2 * 1.05, 10, 8), jointMat || mat);
    endJoint.position.y = -len;
    g.add(endJoint);
    seg.castShadow = true; topJoint.castShadow = true; endJoint.castShadow = true;
    return g;
  }

  // ------------------------------- CITIZEN -------------------------------
  static createCitizen(opts = {}) {
    const g = new THREE.Group();
    g.userData.type = 'citizen';
    g.userData.behavior = opts.behavior || 'idle';
    g.userData.animTime = Math.random() * 10;
    g.userData.fidgetTime = rand(3, 8);

    const jumpsuitColor = opts.jumpsuitColor ||
      pick([COLORS.jumpsuitBlue, COLORS.jumpsuitGray, COLORS.jumpsuitDark]);
    const skinColor = opts.skinColor || COLORS.skin;
    const hairColor = opts.hairColor || pick([COLORS.hair, 0x3a2a1a, 0x5a4838, 0x6a5848]);

    const skinMat = stdMat(skinColor, { roughness: 0.7 });
    const suitMat = stdMat(jumpsuitColor, { roughness: 0.9 });
    const suitDarkMat = stdMat(jumpsuitColor * 0.6, { roughness: 0.9 });
    const hairMat = stdMat(hairColor, { roughness: 0.95 });
    const shoeMat = stdMat(COLORS.metalDark, { roughness: 0.85 });

    // -------- HEAD --------
    const head = new THREE.Group();
    const skull = new THREE.Mesh(new THREE.SphereGeometry(0.11, 14, 12), skinMat);
    skull.scale.set(0.95, 1.1, 0.95);
    skull.castShadow = true;
    head.add(skull);

    // jaw hint (slightly smaller sphere offset down-forward)
    const jaw = new THREE.Mesh(new THREE.SphereGeometry(0.085, 10, 8), skinMat);
    jaw.position.set(0, -0.06, 0.025);
    jaw.scale.set(0.9, 0.6, 0.9);
    head.add(jaw);

    // ears
    const earGeo = new THREE.SphereGeometry(0.022, 6, 5);
    const leftEar = new THREE.Mesh(earGeo, skinMat);
    leftEar.position.set(-0.105, 0, 0.005);
    leftEar.scale.set(0.5, 1, 1);
    head.add(leftEar);
    const rightEar = new THREE.Mesh(earGeo, skinMat);
    rightEar.position.set(0.105, 0, 0.005);
    rightEar.scale.set(0.5, 1, 1);
    head.add(rightEar);

    // eyes (dark sockets)
    const eyeGeo = new THREE.SphereGeometry(0.018, 6, 6);
    const eyeMat = stdMat(0x0a0a0a, { roughness: 0.3 });
    const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
    leftEye.position.set(-0.04, 0.015, 0.098);
    head.add(leftEye);
    const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
    rightEye.position.set(0.04, 0.015, 0.098);
    head.add(rightEye);

    // brows
    const browGeo = new THREE.BoxGeometry(0.035, 0.008, 0.012);
    const browMat = hairMat;
    const lBrow = new THREE.Mesh(browGeo, browMat);
    lBrow.position.set(-0.04, 0.045, 0.1);
    lBrow.rotation.z = 0.1;
    head.add(lBrow);
    const rBrow = new THREE.Mesh(browGeo, browMat);
    rBrow.position.set(0.04, 0.045, 0.1);
    rBrow.rotation.z = -0.1;
    head.add(rBrow);

    // nose
    const nose = new THREE.Mesh(new THREE.ConeGeometry(0.018, 0.045, 5), skinMat);
    nose.rotation.x = Math.PI / 2 + 0.3;
    nose.position.set(0, -0.005, 0.11);
    head.add(nose);

    // mouth (thin dark line)
    const mouth = new THREE.Mesh(
      new THREE.BoxGeometry(0.03, 0.004, 0.005),
      stdMat(0x3a1a18, { roughness: 0.5 })
    );
    mouth.position.set(0, -0.055, 0.095);
    head.add(mouth);

    // hair (cap over top of skull)
    if (Math.random() > 0.15) {   // most have hair
      const hair = new THREE.Mesh(new THREE.SphereGeometry(0.115, 12, 10, 0, Math.PI * 2, 0, Math.PI * 0.55), hairMat);
      hair.scale.set(0.98, 1.1, 0.98);
      hair.position.y = 0.015;
      head.add(hair);
    }

    head.position.y = 1.68;
    head.name = 'head';
    g.add(head);

    // -------- NECK --------
    const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.055, 0.08, 8), skinMat);
    neck.position.y = 1.56;
    neck.castShadow = true;
    g.add(neck);

    // -------- TORSO --------
    const torsoGeo = new THREE.BoxGeometry(0.34, 0.44, 0.22);
    // round corners via bevel — do it via extra spheres at shoulders
    const torso = new THREE.Mesh(torsoGeo, suitMat);
    torso.position.y = 1.28;
    torso.castShadow = true;
    torso.name = 'torso';
    g.add(torso);

    // collar
    const collar = new THREE.Mesh(
      new THREE.CylinderGeometry(0.06, 0.09, 0.03, 8),
      suitDarkMat
    );
    collar.position.y = 1.5;
    g.add(collar);

    // shoulder caps
    const shoulderMat = suitMat;
    [-1, 1].forEach(sign => {
      const shoulder = new THREE.Mesh(new THREE.SphereGeometry(0.09, 10, 8), shoulderMat);
      shoulder.position.set(sign * 0.17, 1.47, 0);
      shoulder.scale.y = 0.8;
      shoulder.castShadow = true;
      g.add(shoulder);
    });

    // belt
    const belt = new THREE.Mesh(
      new THREE.BoxGeometry(0.36, 0.04, 0.24),
      stdMat(COLORS.woodDark, { roughness: 0.9 })
    );
    belt.position.y = 1.07;
    g.add(belt);

    // pocket detail
    const pocket = new THREE.Mesh(
      new THREE.BoxGeometry(0.08, 0.1, 0.015),
      suitDarkMat
    );
    pocket.position.set(-0.09, 1.2, 0.11);
    g.add(pocket);

    // -------- ARMS --------
    const armMat = suitMat;
    const handMat = skinMat;
    [-1, 1].forEach(sign => {
      const shoulderAnchor = new THREE.Group();
      shoulderAnchor.position.set(sign * 0.2, 1.45, 0);
      shoulderAnchor.name = sign < 0 ? 'leftShoulder' : 'rightShoulder';

      const upperArm = CharacterFactory._limb(0.27, 0.055, 0.05, armMat);
      shoulderAnchor.add(upperArm);

      const elbowAnchor = new THREE.Group();
      elbowAnchor.position.y = -0.27;
      elbowAnchor.name = sign < 0 ? 'leftElbow' : 'rightElbow';
      upperArm.add(elbowAnchor);

      const lowerArm = CharacterFactory._limb(0.25, 0.05, 0.045, armMat);
      elbowAnchor.add(lowerArm);

      const hand = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.1, 0.05), handMat);
      hand.position.y = -0.3;
      hand.castShadow = true;
      lowerArm.add(hand);

      g.add(shoulderAnchor);
    });

    // -------- LEGS --------
    const legMat = suitDarkMat;
    [-1, 1].forEach(sign => {
      const hipAnchor = new THREE.Group();
      hipAnchor.position.set(sign * 0.085, 1.04, 0);
      hipAnchor.name = sign < 0 ? 'leftHip' : 'rightHip';

      const upperLeg = CharacterFactory._limb(0.45, 0.075, 0.06, legMat);
      hipAnchor.add(upperLeg);

      const kneeAnchor = new THREE.Group();
      kneeAnchor.position.y = -0.45;
      kneeAnchor.name = sign < 0 ? 'leftKnee' : 'rightKnee';
      upperLeg.add(kneeAnchor);

      const lowerLeg = CharacterFactory._limb(0.42, 0.06, 0.05, legMat);
      kneeAnchor.add(lowerLeg);

      const foot = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.06, 0.18), shoeMat);
      foot.position.set(0, -0.45, 0.04);
      foot.castShadow = true;
      lowerLeg.add(foot);

      g.add(hipAnchor);
    });

    // Optional props — briefcase, backpack
    if (Math.random() < 0.2) {
      const briefcase = new THREE.Mesh(
        new THREE.BoxGeometry(0.3, 0.22, 0.08),
        stdMat(COLORS.rust, { roughness: 0.9 })
      );
      briefcase.position.set(-0.26, 0.85, 0);
      g.add(briefcase);
    }
    if (Math.random() < 0.15) {
      const pack = new THREE.Mesh(
        new THREE.BoxGeometry(0.28, 0.3, 0.12),
        stdMat(COLORS.fabric, { roughness: 0.95 })
      );
      pack.position.set(0, 1.3, -0.17);
      g.add(pack);
    }

    return g;
  }

  // ----------------------- CIVIL PROTECTION (GUARD) -----------------------
  static createCivilProtection(opts = {}) {
    const g = new THREE.Group();
    g.userData.type = 'cp';
    g.userData.behavior = opts.behavior || 'patrol';
    g.userData.animTime = Math.random() * 10;
    g.userData.alertLevel = 0;

    const armorMat = stdMat(COLORS.cpArmor, { roughness: 0.55, metalness: 0.25 });
    const accentMat = stdMat(COLORS.cpBlue, { roughness: 0.7, metalness: 0.15 });
    const maskMat = stdMat(COLORS.cpMask, { roughness: 0.5, metalness: 0.1 });
    const lensMat = stdMat(COLORS.cpLens, { emissive: COLORS.cpLens, emissiveIntensity: 0.8, roughness: 0.2 });
    const bootMat = stdMat(0x0a0c10, { roughness: 0.8 });

    // -------- HEAD / MASK --------
    const head = new THREE.Group();
    head.name = 'head';

    const skullBack = new THREE.Mesh(new THREE.SphereGeometry(0.12, 14, 12), maskMat);
    skullBack.scale.set(0.95, 1.05, 0.95);
    skullBack.castShadow = true;
    head.add(skullBack);

    // Gas mask snout (iconic CP look)
    const snout = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.065, 0.12, 10), maskMat);
    snout.rotation.x = Math.PI / 2;
    snout.position.set(0, -0.02, 0.11);
    head.add(snout);

    // snout cap
    const snoutCap = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.06, 0.02, 10), accentMat);
    snoutCap.rotation.x = Math.PI / 2;
    snoutCap.position.set(0, -0.02, 0.17);
    head.add(snoutCap);

    // vent holes on snout cap
    for (let i = 0; i < 5; i++) {

    neck.position.y = 1.56;

  // ---------------------------- SCANNER ----------------------------
  static createScanner() {

    body.castShadow = true;
    g.add(body);

    const lens = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.09, 0.08, 12), lensMat);
    lens.rotation.x = Math.PI / 2;
    lens.position.z = 0.27;
    g.add(lens);

    const iris = new THREE.Mesh(new THREE.CircleGeometry(0.07, 10), lightMat);
    iris.position.z = 0.315;
    g.add(iris);
    g.userData.iris = iris;

    // Side wings / stabilizers
    [-1, 1].forEach(sign => {
      const wing = new THREE.Mesh(
        new THREE.BoxGeometry(0.15, 0.03, 0.2),
        bodyMat
      );
      wing.position.set(sign * 0.22, 0.02, 0);
      wing.rotation.z = sign * 0.3;
      g.add(wing);

      // warning light at wingtip
      const warnLight = new THREE.Mesh(new THREE.SphereGeometry(0.025, 6, 6), warnMat);
      warnLight.position.set(sign * 0.3, 0.06, 0.05);
      g.add(warnLight);
    });

    // top/bottom antennae
    const antennaTop = new THREE.Mesh(
      new THREE.CylinderGeometry(0.005, 0.005, 0.1, 4),
      bodyMat
    );
    antennaTop.position.y = 0.22;
    g.add(antennaTop);

    // Spotlight (the beam)
    const spotlight = new THREE.SpotLight(0xfff0c0, 2, 25, Math.PI / 7, 0.5, 1.5);
    spotlight.position.set(0, 0, 0.3);
    spotlight.target.position.set(0, -0.5, 3);
    g.add(spotlight);
    g.add(spotlight.target);
    g.userData.spotlight = spotlight;

    return g;
  }

  // ---------------------------- REBEL ----------------------------
  static createRebel(opts = {}) {
    const g = CharacterFactory.createCitizen({
      jumpsuitColor: pick([COLORS.rebelGreen, COLORS.rebelBrown, 0x3a4230]),
      ...opts
    });
    g.userData.type = 'rebel';

    // Add bandana/scarf
    const scarf = new THREE.Mesh(
      new THREE.TorusGeometry(0.07, 0.025, 6, 12, Math.PI),
      stdMat(0xa03030, { roughness: 0.9 })
    );
    scarf.position.set(0, 1.52, 0);
    scarf.rotation.x = Math.PI / 2;
    g.add(scarf);

    // Maybe a weapon — pistol
    if (opts.armed !== false && Math.random() > 0.4) {
      const pistol = new THREE.Group();
      const body = new THREE.Mesh(
        new THREE.BoxGeometry(0.05, 0.09, 0.15),
        stdMat(COLORS.metalDark, { metalness: 0.7, roughness: 0.3 })
      );
      pistol.add(body);
      const barrel = new THREE.Mesh(
        new THREE.BoxGeometry(0.025, 0.03, 0.1),
        stdMat(COLORS.metalDark, { metalness: 0.7, roughness: 0.3 })
      );
      barrel.position.set(0, 0.04, 0.1);
      pistol.add(barrel);
      pistol.position.set(0.25, 1.1, 0.12);
      pistol.rotation.x = 0.5;
      g.add(pistol);
    }

    return g;
  }

  // ------------------ ANIMATION -----------------
  // Apply breathing / idle animation to a character each frame
  static animate(character, delta, totalTime) {
    const ud = character.userData;
    if (!ud) return;
    ud.animTime = (ud.animTime || 0) + delta;
    const t = ud.animTime;

    // Breathing: subtle chest scale + head bob
    const breath = Math.sin(t * 1.8) * 0.5 + 0.5;
    const head = character.getObjectByName('head');
    const torso = character.getObjectByName('torso');
    if (head) {
      head.position.y = 1.68 + Math.sin(t * 1.8) * 0.005;
      head.rotation.z = Math.sin(t * 0.7) * 0.02;
    }
    if (torso) {
      torso.scale.x = 1 + breath * 0.012;
      torso.scale.z = 1 + breath * 0.008;
    }

    // Arm sway
    const leftShoulder = character.getObjectByName('leftShoulder');
    const rightShoulder = character.getObjectByName('rightShoulder');
    if (leftShoulder) leftShoulder.rotation.x = Math.sin(t * 1.1) * 0.04 - 0.02;
    if (rightShoulder) rightShoulder.rotation.x = -Math.sin(t * 1.1) * 0.04 - 0.02;

    // Occasional fidget — look around
    ud.fidgetTime = (ud.fidgetTime || 5) - delta;
    if (ud.fidgetTime <= 0) {
      ud.fidgetTime = rand(4, 9);
      ud.fidgetTarget = rand(-0.4, 0.4);
    }
    if (head) {
      head.rotation.y = lerp(head.rotation.y, ud.fidgetTarget || 0, delta * 1.5);
    }

    // Walking animation modulation (only if moving)
    if (ud.isWalking) {
      const walkT = t * 4;
      const lHip = character.getObjectByName('leftHip');
      const rHip = character.getObjectByName('rightHip');
      const lKnee = character.getObjectByName('leftKnee');
      const rKnee = character.getObjectByName('rightKnee');
      if (lHip) lHip.rotation.x = Math.sin(walkT) * 0.45;
      if (rHip) rHip.rotation.x = -Math.sin(walkT) * 0.45;
      if (lKnee) lKnee.rotation.x = Math.max(0, -Math.sin(walkT) * 0.6);
      if (rKnee) rKnee.rotation.x = Math.max(0, Math.sin(walkT) * 0.6);
      if (leftShoulder) leftShoulder.rotation.x = -Math.sin(walkT) * 0.3;
      if (rightShoulder) rightShoulder.rotation.x = Math.sin(walkT) * 0.3;
    }
  }
}

// ============================================================================
// PLAYER — momentum-based FPS controller with head bob, breathing, FOV, shake
// ============================================================================

class Player {
  constructor(camera, domElement) {
    this.camera = camera;
    this.dom = domElement;

    this.position = new THREE.Vector3(0, SETTINGS.eyeHeight, 0);
    this.velocity = new THREE.Vector3();
    this.euler = new THREE.Euler(0, 0, 0, 'YXZ');   // yaw, pitch

    this.onGround = true;
    this.canMove = true;
    this.frozen = false;   // during cinematic moments
    this.noClip = false;

    this.keys = { w: false, a: false, s: false, d: false, shift: false, space: false, e: false };

    // Head effects
    this.bobT = 0;
    this.breathT = 0;
    this.shakeAmount = 0;
    this.shakeDecay = 3;
    this.targetFOV = SETTINGS.fovNormal;
    this.currentFOV = SETTINGS.fovNormal;
    this.cameraQuat = new THREE.Quaternion();
    this.lookOverride = null;       // for scripted cinematic look targets
    this.lookBlend = 0;

    // Footsteps
    this.lastFootstepAt = 0;
    this.currentMaterial = 'concrete';

    // Collision: world is bounded by box colliders passed in via setColliders
    this.colliders = [];
    this.triggers = [];     // interaction zones

    this._onKeyDown = e => this._handleKey(e, true);
    this._onKeyUp   = e => this._handleKey(e, false);
    this._onMouseMove = e => this._handleMouse(e);

    window.addEventListener('keydown', this._onKeyDown);
    window.addEventListener('keyup',   this._onKeyUp);
    this.dom.addEventListener('mousemove', this._onMouseMove);

    // Pointer lock
    this.dom.addEventListener('click', () => {
      if (!document.pointerLockElement) this.dom.requestPointerLock();
    });
    this.pointerLocked = false;
    document.addEventListener('pointerlockchange', () => {
      this.pointerLocked = document.pointerLockElement === this.dom;
    });
  }

  _handleKey(e, down) {
    const k = e.code;
    if (k === 'KeyW') this.keys.w = down;
    else if (k === 'KeyA') this.keys.a = down;
    else if (k === 'KeyS') this.keys.s = down;
    else if (k === 'KeyD') this.keys.d = down;
    else if (k === 'ShiftLeft') this.keys.shift = down;
    else if (k === 'Space') this.keys.space = down;
    else if (k === 'KeyE') this.keys.e = down;
  }

  _handleMouse(e) {
    if (!this.pointerLocked || this.frozen) return;
    this.euler.y -= e.movementX * SETTINGS.mouseSens;
    this.euler.x -= e.movementY * SETTINGS.mouseSens;
    this.euler.x = clamp(this.euler.x, -Math.PI / 2 + 0.01, Math.PI / 2 - 0.01);
  }

  setPosition(x, y, z) {
    this.position.set(x, y, z);
    this.velocity.set(0, 0, 0);
  }

  setRotation(yaw, pitch = 0) {
    this.euler.y = yaw;
    this.euler.x = pitch;
  }

  shake(amount, decay = 3) {
    this.shakeAmount = Math.max(this.shakeAmount, amount);
    this.shakeDecay = decay;
  }

  freeze() { this.frozen = true; this.velocity.set(0, 0, 0); }
  unfreeze() { this.frozen = false; }

  setColliders(arr) { this.colliders = arr; }
  setTriggers(arr)  { this.triggers  = arr; }
  setFootstepMaterial(m) { this.currentMaterial = m; }

  // Look at a world-space point smoothly (scripted moment)
  lookAt(targetVec, blend = 1) {
    this.lookOverride = targetVec;
    this.lookBlend = blend;
  }
  clearLookAt() { this.lookOverride = null; }

  update(delta, audioSys, game) {
    const isMoving = (this.keys.w || this.keys.a || this.keys.s || this.keys.d);
    const sprinting = this.keys.shift && isMoving;

    // Desired FOV
    this.targetFOV = sprinting ? SETTINGS.fovSprint : SETTINGS.fovNormal;
    this.currentFOV = lerp(this.currentFOV, this.targetFOV, delta * 4);
    this.camera.fov = this.currentFOV;
    this.camera.updateProjectionMatrix();

    if (!this.frozen && this.canMove) {
      // --- Movement input ---
      const speed = SETTINGS.playerSpeed * (sprinting ? SETTINGS.sprintMult : 1);
      const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(
        new THREE.Quaternion().setFromEuler(new THREE.Euler(0, this.euler.y, 0, 'YXZ'))
      );
      const right = new THREE.Vector3(1, 0, 0).applyQuaternion(
        new THREE.Quaternion().setFromEuler(new THREE.Euler(0, this.euler.y, 0, 'YXZ'))
      );
      const wish = new THREE.Vector3();
      if (this.keys.w) wish.add(forward);
      if (this.keys.s) wish.sub(forward);
      if (this.keys.d) wish.add(right);
      if (this.keys.a) wish.sub(right);
      if (wish.lengthSq() > 0) wish.normalize().multiplyScalar(speed);

      // Horizontal momentum (accel/decel)
      const accel = this.onGround ? 14 : 4;
      this.velocity.x = lerp(this.velocity.x, wish.x, clamp(accel * delta, 0, 1));
      this.velocity.z = lerp(this.velocity.z, wish.z, clamp(accel * delta, 0, 1));

      // Jump
      if (this.keys.space && this.onGround) {
        this.velocity.y = SETTINGS.jumpSpeed;
        this.onGround = false;
      }

      // Gravity
      this.velocity.y += SETTINGS.gravity * delta;

      // Integrate + resolve collisions (axis-by-axis)
      const newPos = this.position.clone();

      newPos.x += this.velocity.x * delta;
      if (this._collides(newPos)) { newPos.x = this.position.x; this.velocity.x = 0; }

      newPos.z += this.velocity.z * delta;
      if (this._collides(newPos)) { newPos.z = this.position.z; this.velocity.z = 0; }

      newPos.y += this.velocity.y * delta;
      const groundY = this._groundHeight(newPos);
      if (newPos.y <= groundY + SETTINGS.eyeHeight) {
        newPos.y = groundY + SETTINGS.eyeHeight;
        this.velocity.y = 0;
        this.onGround = true;
      } else {
        this.onGround = false;
      }

      this.position.copy(newPos);

      // --- Head bob + footsteps ---
      if (isMoving && this.onGround) {
        const bobSpeed = sprinting ? 10 : 7;
        this.bobT += delta * bobSpeed;

        const stepInterval = sprinting ? 0.32 : 0.48;
        this.lastFootstepAt += delta;
        if (this.lastFootstepAt > stepInterval) {
          this.lastFootstepAt = 0;
          audioSys && audioSys.playFootstep(this.currentMaterial, sprinting ? 1.2 : 0.85);
        }
      } else {
        this.bobT += delta * 0.5;   // idle sway
      }
    }

    // Shake decay
    this.shakeAmount = Math.max(0, this.shakeAmount - this.shakeDecay * delta);

    // Check triggers
    for (const trig of this.triggers) {
      // Triggers are active by default unless explicitly disabled.
      if (trig.active === false) continue;
      const dx = this.position.x - trig.pos.x;
      const dz = this.position.z - trig.pos.z;
      if (dx * dx + dz * dz < trig.radius * trig.radius) {
        if (!trig.entered) {
          trig.entered = true;
          if (trig.onEnter) trig.onEnter(game);
        }
      } else {
        trig.entered = false;
      }
    }

    // --- Apply camera transform ---
    const bobY = (this.keys.w || this.keys.s || this.keys.a || this.keys.d)
      ? Math.sin(this.bobT) * 0.035 * (this.keys.shift ? 1.3 : 1)
      : Math.sin(this.bobT) * 0.005;    // subtle idle breath
    const bobX = (this.keys.w || this.keys.s || this.keys.a || this.keys.d)
      ? Math.cos(this.bobT * 0.5) * 0.02
      : 0;

    this.breathT += delta * 1.6;
    const breathY = Math.sin(this.breathT) * 0.006;

    this.camera.position.set(
      this.position.x + bobX + (Math.random() - 0.5) * this.shakeAmount,
      this.position.y + bobY + breathY + (Math.random() - 0.5) * this.shakeAmount,
      this.position.z + (Math.random() - 0.5) * this.shakeAmount
    );

    if (this.lookOverride) {
      // Blend to look at target
      const dir = new THREE.Vector3().subVectors(this.lookOverride, this.camera.position).normalize();
      const targetEuler = new THREE.Euler();
      targetEuler.y = Math.atan2(-dir.x, -dir.z);
      targetEuler.x = Math.asin(clamp(dir.y, -1, 1));
      this.euler.y = lerp(this.euler.y, targetEuler.y, this.lookBlend * delta * 3);
      this.euler.x = lerp(this.euler.x, targetEuler.x, this.lookBlend * delta * 3);
    }

    this.camera.rotation.copy(this.euler);
  }

  _collides(pos) {
    if (this.noClip) return false;
    const r = 0.3;   // player radius
    for (const c of this.colliders) {
      // AABB box collider defined by min/max
      if (pos.x + r > c.min.x && pos.x - r < c.max.x &&
          pos.z + r > c.min.z && pos.z - r < c.max.z &&
          pos.y > c.min.y && pos.y - SETTINGS.eyeHeight < c.max.y) {
        return true;
      }
    }
    return false;
  }

  _groundHeight(pos) {
    let h = 0;
    // Floor tiles can raise ground — check colliders tagged as floors
    for (const c of this.colliders) {
      if (c.isFloor && pos.x > c.min.x && pos.x < c.max.x &&
          pos.z > c.min.z && pos.z < c.max.z) {
        h = Math.max(h, c.max.y);
      }
    }
    return h;
  }
}

// ============================================================================
// GAME UI
// ============================================================================

class GameUI {
  constructor() {
    this.subtitleEl = document.getElementById('subtitle');
    this.subtitleText = this.subtitleEl.querySelector('.text');
    this.subtitleSpeaker = this.subtitleEl.querySelector('.speaker');
    this.chapterEl = document.getElementById('chapter-card');
    this.objectiveEl = document.getElementById('objective');
    this.promptEl = document.getElementById('prompt');
    this.promptAction = this.promptEl.querySelector('.action');
    this.crosshairEl = document.getElementById('crosshair');
    this.fadeEl = document.getElementById('fade-overlay');
    this.hudEl = document.getElementById('hud');
    this.pulseEl = document.getElementById('pulse-overlay');
    this._subTimer = null;
  }

  showSubtitle(text, speaker = '', duration = 4000) {
    clearTimeout(this._subTimer);
    this.subtitleSpeaker.textContent = speaker;
    this.subtitleText.textContent = text;
    this.subtitleEl.classList.add('show');
    this._subTimer = setTimeout(() => this.subtitleEl.classList.remove('show'), duration);
  }

  hideSubtitle() {
    clearTimeout(this._subTimer);
    this.subtitleEl.classList.remove('show');
  }

  showChapterCard(number, title, subtitle = '', duration = 5000) {
    this.chapterEl.querySelector('.number').textContent = number;
    this.chapterEl.querySelector('.title').textContent = title;
    this.chapterEl.querySelector('.subtitle').textContent = subtitle;
    this.chapterEl.classList.add('show');
    setTimeout(() => this.chapterEl.classList.remove('show'), duration);
  }

  showObjective(text) {
    this.objectiveEl.textContent = text;
    this.objectiveEl.classList.add('show');
  }
  hideObjective() { this.objectiveEl.classList.remove('show'); }

  showPrompt(action) {
    this.promptAction.textContent = action;
    this.promptEl.classList.add('show');
  }
  hidePrompt() { this.promptEl.classList.remove('show'); }

  showCrosshair(show = true) {
    this.crosshairEl.classList.toggle('show', show);
  }

  fadeToBlack(duration = 2000) {
    this.fadeEl.style.transition = `opacity ${duration}ms`;
    this.fadeEl.classList.add('black');
    return new Promise(res => setTimeout(res, duration));
  }

  fadeFromBlack(duration = 2000) {
    this.fadeEl.style.transition = `opacity ${duration}ms`;
    this.fadeEl.classList.remove('black');
    return new Promise(res => setTimeout(res, duration));
  }

  setLetterbox(on) {
    this.hudEl.classList.toggle('letterboxed', on);
  }

  setStressed(on) {
    this.pulseEl.classList.toggle('stressed', on);
  }
}

// ============================================================================
// ENVIRONMENT BUILDERS — each chapter builds its world here
// ============================================================================

class EnvBuilder {

  // Simple box with material, optional collider, returns { mesh, collider }
  static box(scene, size, pos, color, opts = {}) {
    const geo = new THREE.BoxGeometry(size.x, size.y, size.z);
    const mat = opts.mat || stdMat(color, opts.matOpts);
    const m = new THREE.Mesh(geo, mat);
    m.position.copy(pos);
    m.castShadow = opts.castShadow !== false;
    m.receiveShadow = opts.receiveShadow !== false;
    if (opts.rotY) m.rotation.y = opts.rotY;
    scene.add(m);
    const collider = opts.noCollide ? null : {
      min: new THREE.Vector3(pos.x - size.x / 2, pos.y - size.y / 2, pos.z - size.z / 2),
      max: new THREE.Vector3(pos.x + size.x / 2, pos.y + size.y / 2, pos.z + size.z / 2),
      isFloor: opts.isFloor || false
    };
    return { mesh: m, collider };
  }

  static floor(scene, size, pos, color, opts = {}) {
    return EnvBuilder.box(scene, { x: size.x, y: 0.2, z: size.z },
      new THREE.Vector3(pos.x, pos.y - 0.1, pos.z), color,
      { ...opts, isFloor: true, castShadow: false });
  }

  // Fluorescent light panel with flicker
  static addFluorescent(scene, pos, color = 0xfff4e0, flicker = true) {
    const housing = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 0.1, 0.3),
      stdMat(COLORS.metal)
    );
    housing.position.copy(pos);
    scene.add(housing);

    const panel = new THREE.Mesh(
      new THREE.BoxGeometry(1.15, 0.05, 0.25),
      stdMat(color, { emissive: color, emissiveIntensity: 1.2 })
    );
    panel.position.copy(pos);
    panel.position.y -= 0.05;
    scene.add(panel);

    const light = new THREE.PointLight(color, 1.2, 6);
    light.position.copy(pos);
    light.position.y -= 0.1;
    scene.add(light);

    if (flicker) {
      light.userData.baseIntensity = 1.2;
      light.userData.nextFlicker = rand(3, 10);
      light.userData.panel = panel;
      light.userData.flicker = true;
    }
    return light;
  }

  // Surveillance camera on wall
  static addSurveillanceCam(scene, pos, rotY = 0) {
    const g = new THREE.Group();
    const bracket = new THREE.Mesh(
      new THREE.BoxGeometry(0.1, 0.2, 0.1),
      stdMat(COLORS.metalDark)
    );
    bracket.position.y = 0.1;
    g.add(bracket);

    const body = new THREE.Mesh(
      new THREE.BoxGeometry(0.18, 0.12, 0.24),
      stdMat(COLORS.metal)
    );
    body.position.set(0, 0, 0.1);
    g.add(body);

    const lens = new THREE.Mesh(
      new THREE.CylinderGeometry(0.035, 0.035, 0.05, 8),
      stdMat(0x000000, { metalness: 0.9, roughness: 0.1 })
    );
    lens.rotation.x = Math.PI / 2;
    lens.position.set(0, 0, 0.25);
    g.add(lens);

    const redLed = new THREE.Mesh(
      new THREE.SphereGeometry(0.012, 6, 6),
      stdMat(0xff0000, { emissive: 0xff0000, emissiveIntensity: 1.5 })
    );
    redLed.position.set(0.06, 0.05, 0.22);
    g.add(redLed);

    g.position.copy(pos);
    g.rotation.y = rotY;
    g.userData.lens = lens;
    g.userData.isCamera = true;
    g.userData.sweepT = Math.random() * 10;
    scene.add(g);
    return g;
  }

  // Propaganda screen showing Breen (simple procedural face on canvas texture)
  static addBreenScreen(scene, pos, rotY = 0, width = 3) {
    const height = width * 0.56;
    // Create canvas texture
    const canvas = document.createElement('canvas');
    canvas.width = 512; canvas.height = 288;
    const ctx = canvas.getContext('2d');

    const drawBreen = (distortion = 0, off = 0) => {
      ctx.fillStyle = '#1a2834';
      ctx.fillRect(0, 0, 512, 288);

      // Scanlines
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      for (let y = 0; y < 288; y += 2) ctx.fillRect(0, y, 512, 1);

      // Backdrop
      ctx.fillStyle = '#2a4050';
      ctx.fillRect(80, 40, 352, 208);

      // Breen face — pale oval
      ctx.fillStyle = '#d0c8b8';
      ctx.beginPath();
      ctx.ellipse(256 + off, 140, 60, 80, 0, 0, Math.PI * 2);
      ctx.fill();

      // balding dome
      ctx.fillStyle = '#c0b8a8';
      ctx.beginPath();
      ctx.ellipse(256 + off, 100, 55, 40, 0, 0, Math.PI * 2);
      ctx.fill();

      // beard
      ctx.fillStyle = '#8a8078';
      ctx.beginPath();
      ctx.ellipse(256 + off, 180, 40, 30, 0, 0, Math.PI * 2);
      ctx.fill();

      // eyes
      ctx.fillStyle = '#2a2a2a';
      ctx.beginPath();
      ctx.arc(240 + off, 135, 4, 0, Math.PI * 2);
      ctx.arc(272 + off, 135, 4, 0, Math.PI * 2);
      ctx.fill();

      // glasses
      ctx.strokeStyle = '#606060';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(240 + off, 135, 11, 0, Math.PI * 2);
      ctx.arc(272 + off, 135, 11, 0, Math.PI * 2);
      ctx.moveTo(251 + off, 135); ctx.lineTo(261 + off, 135);
      ctx.stroke();

      // suit lapel
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.moveTo(220 + off, 230);
      ctx.lineTo(256 + off, 210);
      ctx.lineTo(292 + off, 230);
      ctx.lineTo(292 + off, 260);
      ctx.lineTo(220 + off, 260);
      ctx.closePath();
      ctx.fill();

      // UN logo / Combine insignia top-left
      ctx.strokeStyle = '#7a8a9a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(110, 70, 20, 0, Math.PI * 2);
      ctx.stroke();

      // Distortion bars
      if (distortion > 0) {
        for (let i = 0; i < distortion * 3; i++) {
          const y = Math.random() * 288;
          ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.3})`;
          ctx.fillRect(0, y, 512, 1 + Math.random() * 3);
        }
      }

      // "LIVE" indicator
      ctx.fillStyle = '#ff3030';
      ctx.beginPath();
      ctx.arc(460, 30, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#c0c0c0';
      ctx.font = 'bold 14px monospace';
      ctx.fillText('LIVE', 420, 35);
    };

    drawBreen(0, 0);
    const tex = new THREE.CanvasTexture(canvas);
    tex.minFilter = THREE.LinearFilter;

    const screen = new THREE.Mesh(
      new THREE.PlaneGeometry(width, height),
      new THREE.MeshBasicMaterial({ map: tex })
    );
    screen.position.copy(pos);
    screen.rotation.y = rotY;
    scene.add(screen);

    // frame
    const frame = new THREE.Mesh(
      new THREE.BoxGeometry(width + 0.15, height + 0.15, 0.1),
      stdMat(COLORS.metalDark)
    );
    frame.position.copy(pos);
    frame.position.z -= 0.05 * Math.cos(rotY);
    frame.position.x -= 0.05 * Math.sin(rotY);
    frame.rotation.y = rotY;
    scene.add(frame);

    // Glow
    const glow = new THREE.PointLight(0x4070a8, 0.8, 6);
    glow.position.copy(pos);
    scene.add(glow);

    screen.userData.tex = tex;
    screen.userData.ctx = ctx;
    screen.userData.redraw = drawBreen;
    screen.userData.flickerT = 0;
    screen.userData.isBreenScreen = true;
    return screen;
  }

  // Generic building block — a tall wall slab with rough concrete texture
  static wall(scene, size, pos, rotY = 0, color = COLORS.concrete) {
    return EnvBuilder.box(scene, size, pos, color, {
      matOpts: { roughness: 0.95, flatShading: true },
      rotY
    });
  }

  // Debris pile
  static debris(scene, pos, scale = 1) {
    const g = new THREE.Group();
    for (let i = 0; i < 8; i++) {
      const chunk = new THREE.Mesh(
        new THREE.BoxGeometry(rand(0.2, 0.6) * scale, rand(0.15, 0.4) * scale, rand(0.2, 0.5) * scale),
        stdMat(pick([COLORS.concreteDark, COLORS.concrete, COLORS.rust]), { flatShading: true, roughness: 0.95 })
      );
      chunk.position.set(rand(-0.6, 0.6) * scale, rand(0, 0.5) * scale, rand(-0.6, 0.6) * scale);
      chunk.rotation.set(rand(0, Math.PI), rand(0, Math.PI), rand(0, Math.PI));
      chunk.castShadow = true;
      g.add(chunk);
    }
    g.position.copy(pos);
    scene.add(g);
    return g;
  }

  // Trash/paper props
  static addTrash(scene, pos) {
    const count = irand(3, 7);
    for (let i = 0; i < count; i++) {
      const paper = new THREE.Mesh(
        new THREE.PlaneGeometry(rand(0.15, 0.3), rand(0.15, 0.3)),
        stdMat(COLORS.paper, { side: THREE.DoubleSide, roughness: 0.95 })
      );
      paper.rotation.x = -Math.PI / 2 + rand(-0.2, 0.2);
      paper.rotation.z = rand(0, Math.PI * 2);
      paper.position.set(pos.x + rand(-1, 1), 0.01, pos.z + rand(-1, 1));
      scene.add(paper);
    }
  }
}

// ============================================================================
// CHAPTERS — each chapter is a self-contained set-piece.
// Each has: build(), start(), update(delta, game), cleanup().
// ============================================================================

class BaseChapter {
  constructor(game) {
    this.game = game;
    this.scene = game.scene;
    this.audio = game.audio;
    this.ui = game.ui;
    this.player = game.player;
    this.colliders = [];
    this.triggers  = [];
    this.objects   = [];   // track for cleanup
    this.lights    = [];
    this.npcs      = [];
    this.time      = 0;
    this.completed = false;
    this.timers    = [];
  }

  // Register a timer so we can cancel on cleanup
  setTimer(cb, ms) {
    const t = setTimeout(() => {
      cb();
      this.timers = this.timers.filter(x => x !== t);
    }, ms);
    this.timers.push(t);
    return t;
  }

  addObj(obj) { this.objects.push(obj); return obj; }
  addLight(l) { this.lights.push(l); this.scene.add(l); return l; }
  addNPC(n)   { this.npcs.push(n);   this.scene.add(n); return n; }

  applyColliders() { this.player.setColliders(this.colliders); }
  applyTriggers()  { this.player.setTriggers(this.triggers); }

  async cleanup() {
    this.timers.forEach(t => clearTimeout(t));
    this.timers = [];
    this.objects.forEach(o => {
      this.scene.remove(o);
      if (o.geometry) o.geometry.dispose?.();
      if (o.material) {
        if (Array.isArray(o.material)) o.material.forEach(m => m.dispose?.());
        else o.material.dispose?.();
      }
    });
    this.lights.forEach(l => this.scene.remove(l));
    this.npcs.forEach(n => this.scene.remove(n));
    this.objects = []; this.lights = []; this.npcs = []; this.colliders = []; this.triggers = [];
  }

  update(delta) {
    this.time += delta;
    // Animate NPCs
    this.npcs.forEach(n => CharacterFactory.animate(n, delta, this.time));
    // Animate breen screens / cameras / flickering lights
    this.lights.forEach(l => {
      if (l.userData && l.userData.flicker) {
        l.userData.nextFlicker -= delta;
        if (l.userData.nextFlicker <= 0) {
          l.userData.nextFlicker = rand(3, 10);
          const orig = l.userData.baseIntensity;
          l.intensity = orig * 0.2;
          if (l.userData.panel) l.userData.panel.material.emissiveIntensity = 0.3;
          this.setTimer(() => { l.intensity = orig * 1.4; if (l.userData.panel) l.userData.panel.material.emissiveIntensity = 1.4; }, 50);
          this.setTimer(() => { l.intensity = orig * 0.5; if (l.userData.panel) l.userData.panel.material.emissiveIntensity = 0.5; }, 100);
          this.setTimer(() => { l.intensity = orig; if (l.userData.panel) l.userData.panel.material.emissiveIntensity = 1.2; }, 180);
        }
      }
    });
  }
}

// ============================================================================
// CHAPTER 1 — ARRIVAL
// Train → station interior → plaza exit. No combat. Pure atmosphere + dread.
// ============================================================================

class Chapter1_Arrival extends BaseChapter {

  async start() {
    this.phase = 'train';
    this.buildTrain();

    // Fog setup — heavy indoor feel
    this.scene.fog = new THREE.FogExp2(0x353a40, 0.045);
    this.scene.background = new THREE.Color(0x1a1d22);

    // Lighting — dim interior
    const hemi = new THREE.HemisphereLight(0x6a7080, 0x1a1d22, 0.35);
    this.addLight(hemi);
    const dir = new THREE.DirectionalLight(0x8090a0, 0.3);
    dir.position.set(5, 10, 5);
    this.addLight(dir);

    // Player position inside train
    this.player.setPosition(0, SETTINGS.eyeHeight, 3);
    this.player.setRotation(Math.PI, 0);
    this.player.freeze();

    this.audio.startAmbient('train');
    this.ui.showChapterCard('CHAPTER ONE', 'ARRIVAL', 'City 17 — the only place left', 6000);

    await this.ui.fadeFromBlack(3500);

    // Intro dialogue sequence while train sways
    this.setTimer(() => this.ui.showSubtitle('The train will arrive at Central Station in approximately two minutes.',
      'LOUDSPEAKER', 5000), 2500);
    this.setTimer(() => this.audio.speak('The train will arrive', 'loudspeaker'), 2500);

    this.setTimer(() => {
      this.ui.showSubtitle('Please remain in your seat until the train has come to a complete stop.',
        'LOUDSPEAKER', 5000);
      this.audio.speak('Please remain seated', 'loudspeaker');
    }, 8500);

    this.setTimer(() => {
      this.ui.showSubtitle('They track everything… even conversations.', 'PASSENGER', 4500);
      this.audio.speak('They track everything', 'citizen');
    }, 15000);

    this.setTimer(() => {
      this.ui.showSubtitle('Just blend in. Don\'t be special.', 'PASSENGER', 4500);
      this.audio.speak('Just blend in', 'citizen');
    }, 21000);

    this.setTimer(() => {
      this.ui.showSubtitle('You didn\'t come from here… did you?', 'WOMAN', 5000);
      this.audio.speak('You did not come from here', 'citizen');
    }, 27000);

    // Train arrives — sway stops, doors open
    this.setTimer(() => this.trainArrives(), 34000);
  }

  buildTrain() {
    // Train interior — elongated box with windows, seats, benches, NPCs
    const trainLength = 16;
    const trainWidth = 2.6;
    const trainHeight = 2.6;

    // Floor
    EnvBuilder.floor(this.scene, { x: trainWidth, z: trainLength }, new THREE.Vector3(0, 0, 0), 0x1a1d22, {
      matOpts: { roughness: 0.95 }
    }).mesh && this.addObj(EnvBuilder.floor(this.scene, { x: trainWidth, z: trainLength },
      new THREE.Vector3(0, 0, -4), 0x1a1d22, { matOpts: { roughness: 0.9 } }).mesh);

    // Ceiling
    const ceil = new THREE.Mesh(
      new THREE.BoxGeometry(trainWidth, 0.2, trainLength),
      stdMat(0x2a2e34, { roughness: 0.9 })
    );
    ceil.position.set(0, trainHeight - 0.1, -4);
    this.scene.add(ceil);
    this.addObj(ceil);

    // Walls (with windows)
    for (let side = -1; side <= 1; side += 2) {
      // Lower wall
      const lw = new THREE.Mesh(
        new THREE.BoxGeometry(0.1, 0.9, trainLength),
        stdMat(COLORS.trainGreen, { roughness: 0.9 })
      );
      lw.position.set(side * trainWidth / 2, 0.45, -4);
      this.scene.add(lw); this.addObj(lw);
      this.colliders.push({
        min: new THREE.Vector3(side * trainWidth / 2 - 0.1, 0, -trainLength / 2 - 4),
        max: new THREE.Vector3(side * trainWidth / 2 + 0.1, trainHeight, trainLength / 2 - 4)
      });

      // Upper wall
      const uw = new THREE.Mesh(
        new THREE.BoxGeometry(0.1, 0.6, trainLength),
        stdMat(COLORS.trainGreen * 0.7, { roughness: 0.9 })
      );
      uw.position.set(side * trainWidth / 2, 2.1, -4);
      this.scene.add(uw); this.addObj(uw);

      // Windows — passing scenery (animated via canvas)
      const winCanvas = document.createElement('canvas');
      winCanvas.width = 256; winCanvas.height = 128;
      const wctx = winCanvas.getContext('2d');
      const winTex = new THREE.CanvasTexture(winCanvas);

      for (let i = 0; i < 5; i++) {
        const win = new THREE.Mesh(
          new THREE.PlaneGeometry(1.8, 0.6),
          new THREE.MeshBasicMaterial({ map: winTex })
        );
        win.position.set(side * (trainWidth / 2 + 0.001), 1.4, -8 + i * 2.5);
        win.rotation.y = side > 0 ? -Math.PI / 2 : Math.PI / 2;
        this.scene.add(win); this.addObj(win);
      }

      this._winCtx = wctx;
      this._winTex = winTex;
    }

    // Initial window render
    this._redrawWindows(0);

    // Benches (both sides)
    for (let z = -11; z <= 3; z += 1.5) {
      for (let side = -1; side <= 1; side += 2) {
        const bench = new THREE.Mesh(
          new THREE.BoxGeometry(0.6, 0.5, 1.2),
          stdMat(0x2a3a4a, { roughness: 0.9 })
        );
        bench.position.set(side * 0.85, 0.25, z);
        bench.castShadow = true;
        this.scene.add(bench); this.addObj(bench);
      }
    }

    // Central support poles
    for (let z = -10; z <= 2; z += 4) {
      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.04, 0.04, trainHeight, 8),
        stdMat(COLORS.metal, { metalness: 0.7, roughness: 0.3 })
      );
      pole.position.set(0, trainHeight / 2, z);
      this.scene.add(pole); this.addObj(pole);
    }

    // Interior lights
    for (let z = -10; z <= 2; z += 3) {
      EnvBuilder.addFluorescent(this.scene, new THREE.Vector3(0, trainHeight - 0.15, z), 0xfff0c8, false);
    }

    // Door (will open at arrival)
    const doorL = new THREE.Mesh(
      new THREE.BoxGeometry(1.1, 2.1, 0.08),
      stdMat(COLORS.trainGreen * 0.5, { roughness: 0.8, metalness: 0.2 })
    );
    doorL.position.set(-0.55, 1.05, 4);
    this.scene.add(doorL); this.addObj(doorL);
    this._doorL = doorL;
    const doorR = new THREE.Mesh(
      new THREE.BoxGeometry(1.1, 2.1, 0.08),
      stdMat(COLORS.trainGreen * 0.5, { roughness: 0.8, metalness: 0.2 })
    );
    doorR.position.set(0.55, 1.05, 4);
    this.scene.add(doorR); this.addObj(doorR);
    this._doorR = doorR;

    // Door frame
    const frame = new THREE.Mesh(
      new THREE.BoxGeometry(2.6, 2.3, 0.1),
      stdMat(COLORS.metalDark, { roughness: 0.7 })
    );
    frame.position.set(0, 1.15, 4.05);
    this.scene.add(frame); this.addObj(frame);

    // Black box transition tunnel right outside the train door.
    // Player must walk through this area to leave the train chapter cleanly.
    const boxLength = 4;
    const boxCenterZ = 6;
    const boxWidth = 2.6;
    const boxHeight = 2.6;

    const boxFloor = new THREE.Mesh(
      new THREE.BoxGeometry(boxWidth, 0.2, boxLength),
      stdMat(0x050505, { roughness: 1 })
    );
    boxFloor.position.set(0, -0.1, boxCenterZ);
    this.scene.add(boxFloor); this.addObj(boxFloor);
    this.colliders.push({
      min: new THREE.Vector3(-boxWidth / 2, -0.2, boxCenterZ - boxLength / 2),
      max: new THREE.Vector3(boxWidth / 2, 0, boxCenterZ + boxLength / 2),
      isFloor: true
    });

    // Tunnel shell (visual only)
    const boxCeil = new THREE.Mesh(
      new THREE.BoxGeometry(boxWidth, 0.2, boxLength),
      stdMat(0x070707, { roughness: 1 })
    );
    boxCeil.position.set(0, boxHeight - 0.1, boxCenterZ);
    this.scene.add(boxCeil); this.addObj(boxCeil);

    for (let side = -1; side <= 1; side += 2) {
      const boxWall = new THREE.Mesh(
        new THREE.BoxGeometry(0.1, boxHeight, boxLength),
        stdMat(0x060606, { roughness: 1 })
      );
      boxWall.position.set(side * boxWidth / 2, boxHeight / 2, boxCenterZ);
      this.scene.add(boxWall); this.addObj(boxWall);
      this.colliders.push({
        min: new THREE.Vector3(side * boxWidth / 2 - 0.1, 0, boxCenterZ - boxLength / 2),
        max: new THREE.Vector3(side * boxWidth / 2 + 0.1, boxHeight, boxCenterZ + boxLength / 2)
      });
    }

    // Back wall (past the seats)
    const back = new THREE.Mesh(
      new THREE.BoxGeometry(trainWidth, trainHeight, 0.15),
      stdMat(COLORS.trainGreen, { roughness: 0.9 })
    );
    back.position.set(0, trainHeight / 2, -12);
    this.scene.add(back); this.addObj(back);
    this.colliders.push({
      min: new THREE.Vector3(-trainWidth / 2, 0, -12.1),
      max: new THREE.Vector3(trainWidth / 2, trainHeight, -11.9)
    });

    // NPCs in train
    const npcPositions = [
      { x: -0.85, z: -9.5, rotY: Math.PI / 2, behavior: 'foot-tap' },
      { x:  0.85, z: -8,   rotY: -Math.PI / 2, behavior: 'over-shoulder' },
      { x: -0.85, z: -6.5, rotY: Math.PI / 2, behavior: 'stare' },
      { x:  0.85, z: -5,   rotY: -Math.PI / 2, behavior: 'idle' },
      { x: -0.85, z: -3.5, rotY: Math.PI / 2, behavior: 'idle' },
      { x:  0.85, z: -2,   rotY: -Math.PI / 2, behavior: 'idle' },
      { x: -0.85, z: -0.5, rotY: Math.PI / 2, behavior: 'idle' },
    ];
    npcPositions.forEach(p => {
      const npc = CharacterFactory.createCitizen({
        jumpsuitColor: pick([COLORS.jumpsuitBlue, COLORS.jumpsuitGray, COLORS.jumpsuitDark])
      });
      npc.position.set(p.x, 0.5, p.z);   // sitting
      npc.rotation.y = p.rotY;
      npc.scale.setScalar(0.95);
      npc.userData.behavior = p.behavior;
      this.addNPC(npc);

      // Seated pose — bend hips and knees
      const lHip = npc.getObjectByName('leftHip');
      const rHip = npc.getObjectByName('rightHip');
      const lKnee = npc.getObjectByName('leftKnee');
      const rKnee = npc.getObjectByName('rightKnee');
      if (lHip) lHip.rotation.x = Math.PI / 2;
      if (rHip) rHip.rotation.x = Math.PI / 2;
      if (lKnee) lKnee.rotation.x = -Math.PI / 2;
      if (rKnee) rKnee.rotation.x = -Math.PI / 2;
    });

    this.applyColliders();
  }

  _redrawWindows(t) {
    const ctx = this._winCtx;
    if (!ctx) return;
    // Gradient sky
    const grad = ctx.createLinearGradient(0, 0, 0, 128);
    grad.addColorStop(0, '#1a2030');
    grad.addColorStop(1, '#3a4048');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 256, 128);

    // Silhouetted buildings scrolling by
    ctx.fillStyle = '#0a0e14';
    const speed = this.phase === 'train' ? t * 80 : 0;
    for (let i = 0; i < 30; i++) {
      const x = ((i * 40 - speed) % 320) - 40;
      const w = 20 + (i * 7) % 30;
      const h = 30 + (i * 11) % 60;
      ctx.fillRect(x, 128 - h, w, h);
    }

    // Occasional spark
    if (this.phase === 'train' && Math.random() < 0.05) {
      ctx.fillStyle = `rgba(255,${180 + Math.random() * 60},100,${Math.random() * 0.8})`;
      ctx.beginPath();
      ctx.arc(Math.random() * 256, Math.random() * 60 + 40, 1 + Math.random() * 3, 0, Math.PI * 2);
      ctx.fill();
    }

    this._winTex.needsUpdate = true;
  }

  async trainArrives() {
    this.audio.playThunk(1);
    this.player.shake(0.05, 4);
    this.phase = 'arriving';

    this.setTimer(() => {
      this.audio.speak('Now arriving', 'loudspeaker');
      this.ui.showSubtitle('Now arriving at Central Station. All passengers must disembark.', 'LOUDSPEAKER', 5000);
    }, 1500);

    // Doors open
    this.setTimer(() => {
      this.audio.playDoorHiss();
      this._doorsOpen = true;
      this.player.unfreeze();
      this.ui.showObjective('WALK OUT THE BLACK BOX');
      this.ui.showCrosshair(true);
