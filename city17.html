      this.audio.setHeartbeatIntensity(0.8);
      this.audio.startHeartbeat();
      this.ui.setStressed(true);
    }, 6000);
  }

  _startHeliSound() {
    // Procedural helicopter blade thump
    const thumpTimer = setInterval(() => {
      const now = this.audio.ctx.currentTime;
      const osc = this.audio.ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(60, now);
      osc.frequency.exponentialRampToValueAtTime(30, now + 0.1);
      const g = this.audio.ctx.createGain();

      // Volume based on distance
      let vol = 0.15;
      if (this._helicopter) {
        const dx = this.player.position.x - this._helicopter.position.x;
        const dz = this.player.position.z - this._helicopter.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        vol = clamp(0.6 / (1 + dist * 0.05), 0.05, 0.4);
      }

      g.gain.setValueAtTime(vol, now);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
      osc.connect(g).connect(this.audio.sfxGain);
      osc.start(now); osc.stop(now + 0.2);
    }, 120);
    this._heliThumpTimer = thumpTimer;
  }

  async reachSite() {
    if (this.completed) return;
    this.completed = true;

    this.audio.setHeartbeatIntensity(0);
    this.ui.setStressed(false);
    this.ui.hideObjective();

    this.setTimer(() => {
      this.ui.showChapterCard('END OF CHAPTER 5', '', '', 4000);
    }, 500);
    this.setTimer(() => this.game.nextChapter(), 5500);
  }

  update(delta) {
    super.update(delta);

    // Animate dust particles
    this._dustParticles?.forEach(d => {
      d.position.x += d.userData.driftSpeed * delta;
      d.position.y += Math.sin(this._heliTime + d.userData.bobPhase) * delta * 0.2;
      if (d.position.x > 6) d.position.x = -6;
    });

    // Neon flicker
    this.objects.forEach(o => {
      if (o.userData && o.userData.isNeon) {
        o.userData.flickerT += delta;
        if (Math.random() < 0.006) {
          o.material.emissiveIntensity = 0.2;
          this.setTimer(() => {
            if (o.material) o.material.emissiveIntensity = 1.3;
          }, 80);
        }
      }
    });

    // Citadel pulse
    if (this._citadel) {
      this._citadel.material.emissiveIntensity = 0.15 + Math.sin(this.time * 0.5) * 0.1;
    }

    // Helicopter logic
    if (this._helicopter) {
      this._heliTime = (this._heliTime || 0) + delta;
      const h = this._helicopter;

      // Rotate rotors
      if (h.userData.rotor) h.userData.rotor.rotation.y += delta * 30;
      if (h.userData.tailRotor) h.userData.tailRotor.rotation.x += delta * 40;

      // Flashing red light
      if (h.userData.redLight) {
        h.userData.redLight.material.emissiveIntensity =
          (Math.sin(this.time * 6) > 0) ? 2 : 0.3;
      }

      // Motion — circle around player
      if (this._heliPhase === 'approach') {
        const targetX = this.player.position.x + Math.sin(this._heliTime * 0.3) * 8;
        const targetZ = this.player.position.z + Math.cos(this._heliTime * 0.3) * 10 + 5;
        h.position.x = lerp(h.position.x, targetX, delta * 0.5);
        h.position.z = lerp(h.position.z, targetZ, delta * 0.5);
        h.position.y = lerp(h.position.y, 14, delta * 0.5);

        // Look toward player
        const dx = this.player.position.x - h.position.x;
        const dz = this.player.position.z - h.position.z;
        h.rotation.y = lerp(h.rotation.y, Math.atan2(dx, dz), delta * 1.5);
      }

      // Spotlight tracks player (with delay)
      if (h.userData.spotlight) {
        h.userData.spotlight.target.position.lerp(
          new THREE.Vector3(this.player.position.x, 0, this.player.position.z),
          delta * 0.8
        );
      }
    }
  }

  async cleanup() {
    if (this._heliThumpTimer) clearInterval(this._heliThumpTimer);
    this.audio.setHeartbeatIntensity(0);
    this.audio.stopMusic();
    await super.cleanup();
  }
}

// ============================================================================
// CHAPTER 6 — THE FALL (Act 1 Finale)
// Building collapse. Floor cracks. Player falls through layers.
// ============================================================================

class ChapterFinale_Fall extends BaseChapter {

  async start() {
    this.scene.fog = new THREE.FogExp2(0x1a1510, 0.07);
    this.scene.background = new THREE.Color(0x0a0806);

    this.buildCollapse();

    this.player.setPosition(0, SETTINGS.eyeHeight, 10);
    this.player.setRotation(Math.PI, 0);
    this.player.setFootstepMaterial('debris');

    await this.ui.fadeFromBlack(2500);

    this.ui.showChapterCard('CHAPTER SIX', 'THE FALL', 'This city does not forgive', 5500);

    this.audio.stopAmbient();
    this.audio.startAmbient('collapse');
    this.audio.playMusicDread();

    this.setTimer(() => {
      this.ui.showObjective('KEEP MOVING — THE BUILDING IS COMING DOWN');
      this.audio.setHeartbeatIntensity(0.9);
      this.audio.startHeartbeat();
      this.ui.setStressed(true);
    }, 3500);

    // Continuous shake + falling debris
    this._shakeTimer = setInterval(() => {
      this.player.shake(rand(0.02, 0.08), 2);
    }, 800);

    // Debris fall events
    this._debrisTimer = setInterval(() => this.dropDebris(), 1500);

    // Trigger moments
    this.triggers.push({
      pos: new THREE.Vector3(0, 0, -15),
      radius: 2.5,
      onEnter: () => this.firstCollapse()
    });
    this.triggers.push({
      pos: new THREE.Vector3(-5, 0, -28),
      radius: 2.5,
      onEnter: () => this.secondCollapse()
    });
    this.triggers.push({
      pos: new THREE.Vector3(8, 0, -42),
      radius: 2.5,
      onEnter: () => this.finalFall()
    });
    this.applyTriggers();
  }

  buildCollapse() {
    // Long unstable corridor with branching debris-blocked sections
    // Builds down-and-right as player progresses

    const floorMat = stdMat(0x2a241e, { roughness: 0.95, flatShading: true });
    const wallMat = stdMat(0x3a2e22, { roughness: 0.95 });

    // Main corridor segments
    const floor1 = new THREE.Mesh(
      new THREE.BoxGeometry(10, 0.2, 30),
      floorMat
    );
    floor1.position.set(0, -0.1, -3);
    this.scene.add(floor1); this.addObj(floor1);
    this.colliders.push({
      min: new THREE.Vector3(-5, -0.2, -18),
      max: new THREE.Vector3(5, 0, 12),
      isFloor: true
    });

    const floor2 = new THREE.Mesh(
      new THREE.BoxGeometry(8, 0.2, 16),
      floorMat
    );
    floor2.position.set(-4, -0.1, -26);
    this.scene.add(floor2); this.addObj(floor2);
    this.colliders.push({
      min: new THREE.Vector3(-8, -0.2, -34),
      max: new THREE.Vector3(0, 0, -18),
      isFloor: true
    });

    const floor3 = new THREE.Mesh(
      new THREE.BoxGeometry(12, 0.2, 14),
      floorMat
    );
    floor3.position.set(6, -0.1, -40);
    this.scene.add(floor3); this.addObj(floor3);
    this.colliders.push({
      min: new THREE.Vector3(0, -0.2, -47),
      max: new THREE.Vector3(12, 0, -33),
      isFloor: true
    });

    // Ceilings (broken, partial)
    for (const [x, z, w, d] of [[0, -3, 10, 30], [-4, -26, 8, 16], [6, -40, 12, 14]]) {
      const ceil = new THREE.Mesh(
        new THREE.BoxGeometry(w, 0.3, d),
        stdMat(0x1f1a14, { roughness: 0.95 })
      );
      ceil.position.set(x, 5, z);
      this.scene.add(ceil); this.addObj(ceil);
    }

    // Corridor walls
    const walls = [
      // Segment 1
      { x: -5, y: 2.5, z: -3, w: 0.3, h: 5, d: 30 },
      { x:  5, y: 2.5, z: -3, w: 0.3, h: 5, d: 30 },
      { x:  0, y: 2.5, z: 12, w: 10, h: 5, d: 0.3 },
      // Segment 2
      { x: -8, y: 2.5, z: -26, w: 0.3, h: 5, d: 16 },
      { x:  0, y: 2.5, z: -26, w: 0.3, h: 5, d: 16 },   // inner
      // Segment 3
      { x:  0, y: 2.5, z: -40, w: 0.3, h: 5, d: 14 },
      { x: 12, y: 2.5, z: -40, w: 0.3, h: 5, d: 14 },
      { x:  6, y: 2.5, z: -47, w: 12, h: 5, d: 0.3 },
    ];
    walls.forEach(w => {
      const m = new THREE.Mesh(
        new THREE.BoxGeometry(w.w, w.h, w.d),
        wallMat
      );
      m.position.set(w.x, w.y, w.z);
      this.scene.add(m); this.addObj(m);
      this.colliders.push({
        min: new THREE.Vector3(w.x - w.w/2, 0, w.z - w.d/2),
        max: new THREE.Vector3(w.x + w.w/2, w.h, w.z + w.d/2)
      });
    });

    // Transition walls between segments (diagonal cut-throughs)
    // Seg1 -> Seg2 opening at z=-18 (west side)
    // Seg2 -> Seg3 opening at z=-34 going east

    // Dying emergency lights (red-orange)
    for (let z = 8; z >= -45; z -= 6) {
      const pos = new THREE.Vector3(rand(-3, 3), 4.8, z);
      const emergency = new THREE.PointLight(0xff4020, 1.5, 10);
      emergency.position.copy(pos);
      emergency.userData.baseIntensity = 1.5;
      emergency.userData.flicker = true;
      emergency.userData.nextFlicker = rand(1, 3);
      this.addLight(emergency);
      const bulb = new THREE.Mesh(
        new THREE.SphereGeometry(0.08, 6, 6),
        stdMat(0xff6040, { emissive: 0xff4020, emissiveIntensity: 2 })
      );
      bulb.position.copy(pos);
      this.scene.add(bulb); this.addObj(bulb);
    }

    // Hanging broken pipes
    for (let i = 0; i < 8; i++) {
      const pipe = new THREE.Mesh(
        new THREE.CylinderGeometry(0.15, 0.15, rand(1, 3), 8),
        stdMat(COLORS.rust, { roughness: 0.85, metalness: 0.3 })
      );
      pipe.rotation.z = rand(-1, 1);
      pipe.rotation.x = rand(-0.3, 0.3);
      pipe.position.set(rand(-4, 10), 4, rand(-45, 5));
      this.scene.add(pipe); this.addObj(pipe);
    }

    // Fires (small glowing red areas)
    for (let i = 0; i < 5; i++) {
      const fire = new THREE.Group();
      for (let j = 0; j < 4; j++) {
        const flame = new THREE.Mesh(
          new THREE.ConeGeometry(0.15, rand(0.3, 0.6), 4),
          stdMat(pick([0xff6020, 0xffa030, 0xff3010]), { emissive: 0xff5020, emissiveIntensity: 2, transparent: true, opacity: 0.85 })
        );
        flame.position.set(rand(-0.15, 0.15), rand(0.15, 0.3), rand(-0.15, 0.15));
        fire.add(flame);
      }
      fire.position.set(rand(-4, 10), 0, rand(-44, 8));
      fire.userData.isFire = true;
      this.scene.add(fire); this.addObj(fire);

      const fireLight = new THREE.PointLight(0xff4010, 1.5, 5);
      fireLight.position.copy(fire.position);
      fireLight.position.y = 0.3;
      this.addLight(fireLight);
    }

    // Initial debris piles
    for (let i = 0; i < 15; i++) {
      EnvBuilder.debris(this.scene, new THREE.Vector3(rand(-4, 10), 0, rand(-45, 8)), rand(0.5, 1.2));
    }

    // Paper/dust floating
    for (let i = 0; i < 40; i++) {
      const paper = new THREE.Mesh(
        new THREE.PlaneGeometry(0.2, 0.2),
        stdMat(COLORS.paper, { side: THREE.DoubleSide, transparent: true, opacity: 0.7 })
      );
      paper.position.set(rand(-5, 10), rand(0.3, 4), rand(-45, 8));
      paper.rotation.set(rand(0, Math.PI), rand(0, Math.PI), rand(0, Math.PI));
      paper.userData.isDust = true;
      paper.userData.fallSpeed = rand(0.3, 0.8);
      paper.userData.spinSpeed = rand(1, 3);
      this.scene.add(paper); this.addObj(paper);
    }

    // Ambient
    this.addLight(new THREE.HemisphereLight(0x3a1a10, 0x080402, 0.2));

    this.applyColliders();
  }

  dropDebris() {
    if (this.completed) return;
    const debris = new THREE.Mesh(
      new THREE.BoxGeometry(rand(0.3, 0.7), rand(0.3, 0.6), rand(0.3, 0.7)),
      stdMat(pick([0x4a3a2a, 0x2a241c, COLORS.rust]), { flatShading: true, roughness: 0.95 })
    );
    const x = this.player.position.x + rand(-4, 4);
    const z = this.player.position.z + rand(-4, 4);
    debris.position.set(x, 5, z);
    debris.rotation.set(rand(0, Math.PI), rand(0, Math.PI), rand(0, Math.PI));
    debris.userData.isFallingDebris = true;
    debris.userData.fallSpeed = 0;
    debris.userData.spin = new THREE.Vector3(rand(-2, 2), rand(-2, 2), rand(-2, 2));
    this.scene.add(debris);
    this.addObj(debris);

    this.audio.playThunk(0.3);
  }

  async firstCollapse() {
    if (this._firstCollapsed) return;
    this._firstCollapsed = true;

    this.audio.playThunk(2);
    this.player.shake(0.25, 2);
    this.setTimer(() => { this.audio.playThunk(1.5); this.player.shake(0.2, 2); }, 600);

    this.ui.showSubtitle('Run. Don\'t stop.', 'WHISPER', 3500);
  }

  async secondCollapse() {
    if (this._secondCollapsed) return;
    this._secondCollapsed = true;
    this.audio.playThunk(2);
    this.audio.playThunk(1.5);
    this.player.shake(0.3, 2);

    // Drop many debris pieces
    for (let i = 0; i < 10; i++) {
      this.setTimer(() => this.dropDebris(), i * 100);
    }
  }

  async finalFall() {
    if (this._falling) return;
    this._falling = true;
    this.completed = true;

    if (this._shakeTimer) clearInterval(this._shakeTimer);
    if (this._debrisTimer) clearInterval(this._debrisTimer);

    this.ui.hideObjective();

    // Lock player for the fall sequence
    this.player.freeze();
    this.player.noClip = true;
    this.ui.setLetterbox(true);

    // Huge crash
    this.audio.playThunk(3);
    this.player.shake(0.5, 1);
    this.audio.stopMusic();

    // Floor cracks narrative beat
    this.ui.showSubtitle('The floor…', '', 2500);

    // Wait and then fall — camera drops
    await new Promise(r => setTimeout(r, 2500));

    this.audio.playThunk(4);
    this.player.shake(1, 0.5);

    // Simulate falling through layers - camera free-fall
    const startY = this.player.position.y;
    const fallDuration = 4;
    const fallStart = performance.now();

    const fallAnim = () => {
      const t = (performance.now() - fallStart) / 1000;
      if (t >= fallDuration) {
        this.player.position.y = startY - 20;
        this.player.shake(0.8, 4);
        this.audio.playThunk(5);
        this.endingCutToBlack();
        return;
      }
      // Accelerating fall
      this.player.position.y = startY - 0.5 * 9.8 * t * t;
      // Spinning camera
      this.player.euler.z = Math.sin(t * 4) * 0.3;
      this.player.euler.x = -0.4 + Math.sin(t * 3) * 0.2;
      this.player.camera.rotation.copy(this.player.euler);
      this.player.camera.position.copy(this.player.position);
      requestAnimationFrame(fallAnim);
    };
    fallAnim();

    // Spawn falling debris past the camera
    const fallDebrisTimer = setInterval(() => {
      const p = new THREE.Mesh(
        new THREE.BoxGeometry(rand(0.3, 1), rand(0.3, 1), rand(0.3, 1)),
        stdMat(pick([COLORS.rust, 0x3a2a1a, COLORS.metalDark]), { flatShading: true })
      );
      p.position.set(
        this.player.position.x + rand(-3, 3),
        this.player.position.y + 10 + Math.random() * 5,
        this.player.position.z + rand(-3, 3)
      );
      p.rotation.set(rand(0, Math.PI), rand(0, Math.PI), rand(0, Math.PI));
      p.userData.isFallingPastCam = true;
      this.scene.add(p);
      this.addObj(p);
    }, 100);
    this._fallDebrisTimer = fallDebrisTimer;
  }

  async endingCutToBlack() {
    if (this._fallDebrisTimer) clearInterval(this._fallDebrisTimer);

    await this.ui.fadeToBlack(1500);

    this.setTimer(() => {
      this.ui.showChapterCard('END OF ACT 1', 'SURVIVAL', 'Act 2 — Resistance', 8000);
    }, 2000);

    this.setTimer(() => {
      this.ui.showSubtitle('Now… it begins.', 'WHISPER', 5000);
      this.audio.speak('Now it begins', 'breen');
    }, 8500);

    this.setTimer(() => {
      this.game.showEnding();
    }, 14000);
  }

  update(delta) {
    super.update(delta);

    // Animate fires (flicker)
    this.objects.forEach(o => {
      if (o.userData && o.userData.isFire) {
        o.children.forEach(flame => {
          flame.scale.y = 0.8 + Math.sin(this.time * 10 + flame.position.x * 3) * 0.3;
          flame.position.y = 0.15 + Math.sin(this.time * 8 + flame.position.z * 2) * 0.05;
        });
      }

      // Dust floating
      if (o.userData && o.userData.isDust) {
        o.position.y -= delta * o.userData.fallSpeed;
        o.rotation.z += delta * o.userData.spinSpeed;
        if (o.position.y < 0.1) {
          o.position.y = 4;
          o.position.x = rand(-5, 10);
          o.position.z = rand(-45, 8);
        }
      }

      // Falling debris physics (simple)
      if (o.userData && o.userData.isFallingDebris) {
        o.userData.fallSpeed += 15 * delta;
        o.position.y -= o.userData.fallSpeed * delta;
        o.rotation.x += o.userData.spin.x * delta;
        o.rotation.y += o.userData.spin.y * delta;
        o.rotation.z += o.userData.spin.z * delta;
        if (o.position.y < 0.2) {
          o.position.y = 0.2;
          o.userData.isFallingDebris = false;
          this.audio.playThunk(0.15);
        }
      }

      // Falling past camera during final fall
      if (o.userData && o.userData.isFallingPastCam) {
        o.position.y -= delta * 15;
        o.rotation.x += delta * 4;
        o.rotation.z += delta * 3;
      }
    });
  }

  async cleanup() {
    if (this._shakeTimer) clearInterval(this._shakeTimer);
    if (this._debrisTimer) clearInterval(this._debrisTimer);
    if (this._fallDebrisTimer) clearInterval(this._fallDebrisTimer);
    this.player.noClip = false;
    this.player.unfreeze();
    this.audio.setHeartbeatIntensity(0);
    this.audio.stopMusic();
    this.ui.setStressed(false);
    this.ui.setLetterbox(false);
    await super.cleanup();
  }
}

// ============================================================================
// GAME — main conductor. Manages scene, renderer, chapters, update loop.
// ============================================================================

class Game {
  constructor() {
    this.canvas = null;
    this.renderer = null;
    this.scene = null;
    this.camera = null;
    this.clock = null;
    this.player = null;
    this.audio = null;
    this.ui = null;
    this.currentChapter = null;
    this.chapterIndex = 0;
    this.chapters = [];
    this.running = false;
  }

  async init() {
    // Renderer
    this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    this.renderer.setSize(window.innerWidth, window.innerHeight);
    this.renderer.setClearColor(0x000000);
    this.renderer.shadowMap.enabled = true;
    this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
    this.renderer.toneMappingExposure = 1.0;
    this.renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(this.renderer.domElement);
    this.canvas = this.renderer.domElement;

    // Scene + camera
    this.scene = new THREE.Scene();
    this.camera = new THREE.PerspectiveCamera(SETTINGS.fovNormal,
      window.innerWidth / window.innerHeight, 0.1, 500);

    // Audio
    this.audio = new AudioSystem();
    this.audio.init();

    // UI
    this.ui = new GameUI();

    // Player
    this.player = new Player(this.camera, this.canvas);

    // Clock
    this.clock = new THREE.Clock();

    // Chapters in order
    this.chapters = [
      Chapter1_Arrival,
      Chapter2_Pursuit,
      Chapter3_Safehouse,
      Chapter4_Checkpoint,
      Chapter5_NightRun,
      ChapterFinale_Fall,
    ];

    // Resize handler
    window.addEventListener('resize', () => {
      this.camera.aspect = window.innerWidth / window.innerHeight;
      this.camera.updateProjectionMatrix();
      this.renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Escape to release pointer
    document.addEventListener('keydown', e => {
      if (e.code === 'Escape' && document.pointerLockElement) {
        document.exitPointerLock();
      }
    });
  }

  async start() {
    this.running = true;
    await this.loadChapter(0);
    this.loop();
  }

  async loadChapter(idx) {
    if (this.currentChapter) {
      await this.currentChapter.cleanup();
      this.currentChapter = null;
    }

    this.chapterIndex = idx;
    if (idx >= this.chapters.length) {
      this.showEnding();
      return;
    }

    const ChapterClass = this.chapters[idx];
    this.currentChapter = new ChapterClass(this);

    // Fade to black before new chapter
    await this.ui.fadeToBlack(1200);

    // Clear residual scene state
    this.scene.fog = null;
    this.scene.background = new THREE.Color(0x000000);

    // Start chapter — chapter handles its own fadeFromBlack
    await this.currentChapter.start();
  }

  async nextChapter() {
    await this.loadChapter(this.chapterIndex + 1);
  }

  async showEnding() {
    await this.ui.fadeToBlack(2500);
    this.scene.clear();
    this.player.freeze();
    this.audio.stopMusic();
    this.audio.stopAmbient();

    this.ui.hideSubtitle();
    this.ui.hideObjective();
    this.ui.setLetterbox(false);
    this.ui.showCrosshair(false);

    // Show ending screen
    document.getElementById('title-screen').style.display = 'flex';
    document.getElementById('title-screen').style.opacity = '1';
    document.querySelector('#title-screen h1').textContent = 'ACT 1 — COMPLETE';
    document.querySelector('#title-screen h2').textContent = 'THE RESISTANCE WAITS';
    document.querySelector('#title-screen button').textContent = 'RESTART';
    document.querySelector('#title-screen .hint').textContent =
      'ACT 2 — RESISTANCE · ACT 3 — UPRISING · (continue the campaign)';
    await this.ui.fadeFromBlack(2000);
  }

  loop() {
    if (!this.running) return;
    requestAnimationFrame(() => this.loop());

    const delta = Math.min(0.05, this.clock.getDelta());

    // Update current chapter
    if (this.currentChapter && !this.currentChapter.completed) {
      this.currentChapter.update(delta);
    } else if (this.currentChapter && this.currentChapter.completed) {
      // Still animate even after completion for smooth transition
      this.currentChapter.update(delta);
    }

    // Update player
    this.player.update(delta, this.audio, this);

    this.renderer.render(this.scene, this.camera);
  }
}

// ============================================================================
// BOOT SEQUENCE
// ============================================================================

const game = new Game();
window.__game = game;    // for debug

(async () => {
  await game.init();

  const titleScreen = document.getElementById('title-screen');
  const startBtn = document.getElementById('start-btn');
  const loadingScreen = document.getElementById('loading');
  const loadingFill = document.getElementById('loading-fill');

  startBtn.addEventListener('click', async () => {
    // User gesture — resume audio context
    if (game.audio.ctx && game.audio.ctx.state === 'suspended') {
      await game.audio.ctx.resume();
    }

    // Fade title
    titleScreen.style.opacity = '0';
    setTimeout(() => { titleScreen.style.display = 'none'; }, 2000);

    // Show loading bar
    loadingScreen.classList.remove('hide');
    for (let p = 0; p <= 100; p += 5) {
      loadingFill.style.width = p + '%';
      await new Promise(r => setTimeout(r, 40));
    }
    await new Promise(r => setTimeout(r, 300));
    loadingScreen.classList.add('hide');

    // Request pointer lock once user starts
    setTimeout(() => {
      if (!document.pointerLockElement) {
        game.canvas.requestPointerLock?.();
      }
    }, 500);

    await game.start();
  });
})();
