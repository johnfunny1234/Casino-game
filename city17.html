      // Stop train ambient, start station
      this.audio.stopAmbient();
      this.setTimer(() => this.audio.startAmbient('station'), 1500);
    }, 3500);

    // Trigger to leave train
    this.triggers.push({
      // Wider trigger so exiting along either side of the tunnel still transitions.
      pos: new THREE.Vector3(0, 0, 6.9),
      radius: 1.8,
      onEnter: () => this.enterStation()
    });
    this.applyTriggers();
  }

  enterStation() {
    if (this.phase !== 'arriving') return;
    this.phase = 'station';
    this.ui.showObjective('FOLLOW THE CROWD');
    this.ui.hideSubtitle();

    // Swap to station environment
    this.cleanupTrain();
    this.buildStation();

    // Ensure player is spawned inside the station nav space (not behind the back wall)
    // and facing toward the concourse so movement works immediately.
    this.player.setPosition(0, SETTINGS.eyeHeight, 3);
    this.player.setRotation(0, 0);
    this.player.unfreeze();

    // Breen screen dialogue
    this.setTimer(() => this.breenSpeech(), 4000);
  }

  cleanupTrain() {
    // Remove just the train-specific objects; keep lights and colliders logic
    // Simpler: clear all existing and rebuild
    this.objects.forEach(o => {
      this.scene.remove(o);
      if (o.geometry) o.geometry.dispose?.();
      if (o.material && o.material.dispose) o.material.dispose();
    });
    this.objects = [];
    this.npcs.forEach(n => this.scene.remove(n));
    this.npcs = [];
    this.lights.forEach(l => this.scene.remove(l));
    this.lights = [];
    this.colliders = [];
    this.triggers = [];
  }

  buildStation() {
    // Station is a large hall with pillars, ceiling, Breen screens on walls
    const hallW = 20, hallL = 30, hallH = 8;

    // Floor
    const floorMat = stdMat(COLORS.concrete, { roughness: 0.95 });
    const floor = new THREE.Mesh(
      new THREE.BoxGeometry(hallW + 10, 0.2, hallL + 10),
      floorMat
    );
    floor.position.set(0, -0.1, -10);
    floor.receiveShadow = true;
    this.scene.add(floor);
    this.addObj(floor);
    this.colliders.push({
      min: new THREE.Vector3(-(hallW + 10) / 2, -0.2, -(hallL + 10) / 2 - 10),
      max: new THREE.Vector3((hallW + 10) / 2, 0, (hallL + 10) / 2 - 10),
      isFloor: true
    });

    // Ceiling
    const ceil = new THREE.Mesh(
      new THREE.BoxGeometry(hallW, 0.3, hallL),
      stdMat(COLORS.concreteDark, { roughness: 0.95 })
    );
    ceil.position.set(0, hallH, -10);
    this.scene.add(ceil); this.addObj(ceil);

    // Side walls
    [-1, 1].forEach(side => {
      const wall = new THREE.Mesh(
        new THREE.BoxGeometry(0.3, hallH, hallL),
        stdMat(COLORS.concrete, { roughness: 0.95 })
      );
      wall.position.set(side * hallW / 2, hallH / 2, -10);
      this.scene.add(wall); this.addObj(wall);
      this.colliders.push({
        min: new THREE.Vector3(side * hallW / 2 - 0.2, 0, -hallL / 2 - 10),
        max: new THREE.Vector3(side * hallW / 2 + 0.2, hallH, hallL / 2 - 10)
      });
    });

    // Back wall (entry from train - behind player)
    const backWall = new THREE.Mesh(
      new THREE.BoxGeometry(hallW, hallH, 0.3),
      stdMat(COLORS.concrete, { roughness: 0.95 })
    );
    backWall.position.set(0, hallH / 2, 5);
    this.scene.add(backWall); this.addObj(backWall);
    this.colliders.push({
      min: new THREE.Vector3(-hallW / 2, 0, 4.85),
      max: new THREE.Vector3(hallW / 2, hallH, 5.15)
    });

    // Front wall with exit doorway
    const frontL = new THREE.Mesh(
      new THREE.BoxGeometry(hallW / 2 - 1.5, hallH, 0.3),
      stdMat(COLORS.concrete, { roughness: 0.95 })
    );
    frontL.position.set(-hallW / 4 - 0.75, hallH / 2, -25);
    this.scene.add(frontL); this.addObj(frontL);
    this.colliders.push({
      min: new THREE.Vector3(-hallW / 2, 0, -25.15),
      max: new THREE.Vector3(-1.5, hallH, -24.85)
    });
    const frontR = new THREE.Mesh(
      new THREE.BoxGeometry(hallW / 2 - 1.5, hallH, 0.3),
      stdMat(COLORS.concrete, { roughness: 0.95 })
    );
    frontR.position.set(hallW / 4 + 0.75, hallH / 2, -25);
    this.scene.add(frontR); this.addObj(frontR);
    this.colliders.push({
      min: new THREE.Vector3(1.5, 0, -25.15),
      max: new THREE.Vector3(hallW / 2, hallH, -24.85)
    });

    // Doorway arch
    const arch = new THREE.Mesh(
      new THREE.BoxGeometry(3, 0.5, 0.3),
      stdMat(COLORS.metalDark)
    );
    arch.position.set(0, 3.5, -25);
    this.scene.add(arch); this.addObj(arch);

    // Pillars
    for (let z = -3; z >= -23; z -= 5) {
      for (const x of [-5, 5]) {
        const pillar = new THREE.Mesh(
          new THREE.BoxGeometry(0.6, hallH, 0.6),
          stdMat(COLORS.concreteDark, { roughness: 0.95 })
        );
        pillar.position.set(x, hallH / 2, z);
        this.scene.add(pillar); this.addObj(pillar);
        this.colliders.push({
          min: new THREE.Vector3(x - 0.3, 0, z - 0.3),
          max: new THREE.Vector3(x + 0.3, hallH, z + 0.3)
        });
      }
    }

    // Lights in ceiling - fluorescent grid
    for (let x = -6; x <= 6; x += 6) {
      for (let z = -2; z >= -22; z -= 4) {
        this.addLight(EnvBuilder.addFluorescent(this.scene, new THREE.Vector3(x, hallH - 0.2, z), 0xfff0d8, true));
      }
    }

    // Overall ambient + directional
    const hemi = new THREE.HemisphereLight(0x8a94a0, 0x3a3d42, 0.3);
    this.addLight(hemi);

    // Breen screen on wall
    const breenScreen = EnvBuilder.addBreenScreen(this.scene,
      new THREE.Vector3(0, 4, -24.8), 0, 4.5);
    this.addObj(breenScreen);
    this._breenScreen = breenScreen;

    // Two more Breen screens on side walls
    const sideBreen1 = EnvBuilder.addBreenScreen(this.scene,
      new THREE.Vector3(-9.8, 4, -8), Math.PI / 2, 3);
    this.addObj(sideBreen1);
    const sideBreen2 = EnvBuilder.addBreenScreen(this.scene,
      new THREE.Vector3(9.8, 4, -15), -Math.PI / 2, 3);
    this.addObj(sideBreen2);

    // Surveillance cameras
    [[-9.8, 7, -5, Math.PI / 2], [9.8, 7, -12, -Math.PI / 2], [-9.8, 7, -20, Math.PI / 2]].forEach(([x,y,z,r]) => {
      const cam = EnvBuilder.addSurveillanceCam(this.scene, new THREE.Vector3(x, y, z), r);
      this.addObj(cam);
    });

    // Scattered suitcases and papers
    for (let i = 0; i < 8; i++) {
      const bag = new THREE.Mesh(
        new THREE.BoxGeometry(rand(0.3, 0.5), rand(0.18, 0.3), rand(0.15, 0.25)),
        stdMat(pick([COLORS.rust, COLORS.woodDark, COLORS.fabric]), { roughness: 0.95 })
      );
      bag.position.set(rand(-8, 8), rand(0.1, 0.2), rand(-20, -2));
      bag.rotation.y = rand(0, Math.PI * 2);
      bag.castShadow = true;
      this.scene.add(bag); this.addObj(bag);
    }
    EnvBuilder.addTrash(this.scene, new THREE.Vector3(-4, 0, -10));
    EnvBuilder.addTrash(this.scene, new THREE.Vector3(6, 0, -15));

    // Crowds walking (NPCs along corridor)
    const crowdPos = [
      { x: -3, z: -5 }, { x: 3, z: -7 }, { x: -1, z: -10 }, { x: 2, z: -12 },
      { x: -4, z: -14 }, { x: 1, z: -16 }, { x: -2, z: -18 }, { x: 4, z: -20 }
    ];
    crowdPos.forEach(p => {
      const npc = CharacterFactory.createCitizen();
      npc.position.set(p.x, 0, p.z);
      npc.rotation.y = Math.PI + rand(-0.2, 0.2);
      npc.userData.isWalking = true;
      npc.userData.walkTarget = p.z - 10;
      npc.userData.walkSpeed = rand(0.7, 1.1);
      this.addNPC(npc);
    });

    // TWO Civil Protection guards standing near exit (intimidating)
    const guard1 = CharacterFactory.createCivilProtection();
    guard1.position.set(-2.5, 0, -22);
    guard1.rotation.y = Math.PI;
    this.addNPC(guard1);
    this._guard1 = guard1;

    const guard2 = CharacterFactory.createCivilProtection();
    guard2.position.set(2.5, 0, -22);
    guard2.rotation.y = Math.PI;
    this.addNPC(guard2);
    this._guard2 = guard2;

    // Guard shoves NPC event (will trigger via timer)
    this.setTimer(() => this.guardShoveEvent(), 9000);

    // Trigger for exit door
    this.triggers.push({
      pos: new THREE.Vector3(0, 0, -25),
      radius: 2,
      onEnter: () => this.exitToPlaza()
    });

    this.applyColliders();
    this.applyTriggers();
    this.player.setFootstepMaterial('concrete');
  }

  breenSpeech() {
    const lines = [
      { t: 'Welcome.', s: 'DR. BREEN', d: 2500 },
      { t: 'Welcome to City 17.', s: 'DR. BREEN', d: 3000 },
      { t: 'You have chosen — or been chosen — to live in one of our finest remaining urban centers.', s: 'DR. BREEN', d: 6500 },
      { t: 'It is safer here…', s: 'DR. BREEN', d: 3500 },
      { t: 'because we say it is.', s: 'DR. BREEN', d: 3500 },
      { t: 'Rest assured, your compliance is appreciated.', s: 'DR. BREEN', d: 4500 },
    ];
    let t = 0;
    lines.forEach(line => {
      this.setTimer(() => {
        this.ui.showSubtitle(line.t, line.s, line.d);
        this.audio.speak(line.t.split(' ').slice(0, 4).join(' '), 'breen');
        // Flicker the screen
        if (this._breenScreen && this._breenScreen.userData.redraw) {
          this._breenScreen.userData.redraw(2, rand(-3, 3));
          this._breenScreen.userData.tex.needsUpdate = true;
        }
      }, t);
      t += line.d + 500;
    });
  }

  guardShoveEvent() {
    // A scripted brutality moment
    const victim = CharacterFactory.createCitizen({ jumpsuitColor: COLORS.jumpsuitBlue });
    victim.position.set(-1, 0, -21);
    victim.rotation.y = Math.PI / 2;
    this.addNPC(victim);

    this.setTimer(() => {
      this.audio.speak('Move along', 'cp');
      this.ui.showSubtitle('Move along, citizen!', 'CIVIL PROTECTION', 3000);
      if (this._guard1) {
        // Simulate shove — guard moves forward briefly
        this._guard1.userData.isWalking = true;
        this._guard1.position.z = -21.5;
      }
      this.audio.playThunk(0.7);
      this.player.shake(0.08, 3);
      // Victim stumbles
      victim.rotation.z = -0.4;
      victim.position.x = -2;
      victim.position.y = 0.1;
      this.setTimer(() => {
        victim.rotation.z = 0;
        victim.position.y = 0;
        if (this._guard1) this._guard1.userData.isWalking = false;
      }, 1500);
    }, 1000);
  }

  async exitToPlaza() {
    if (this.phase !== 'station') return;
    this.phase = 'exiting';
    this.ui.hideObjective();

    // Brief door hiss
    this.audio.playDoorHiss();

    // Fade to white then to plaza
    await this.ui.fadeToBlack(1500);

    // Clean station, build plaza
    this.cleanupTrain();  // reuses method
    this.scene.fog = new THREE.FogExp2(0x606870, 0.015);
    this.scene.background = new THREE.Color(0x7a8490);

    this.buildPlaza();

    await this.ui.fadeFromBlack(2500);

    this.audio.stopAmbient();
    this.audio.startAmbient('plaza');
    this.audio.playMusicDread();

    // Opening plaza moment — wind gust, camera sway
    this.player.shake(0.03, 2);
    this.setTimer(() => {
      this.ui.showSubtitle('…wind.', '', 2500);
    }, 500);

    this.setTimer(() => {
      this.ui.showChapterCard('END OF CHAPTER 1', '', '', 4500);
    }, 4000);

    this.setTimer(() => {
      this.completed = true;
      this.game.nextChapter();
    }, 10000);
  }

  buildPlaza() {
    const pw = 30, pl = 40;

    // Ground
    const ground = new THREE.Mesh(
      new THREE.BoxGeometry(pw, 0.2, pl),
      stdMat(COLORS.concrete, { roughness: 0.95 })
    );
    ground.position.set(0, -0.1, -15);
    ground.receiveShadow = true;
    this.scene.add(ground); this.addObj(ground);
    this.colliders.push({
      min: new THREE.Vector3(-pw / 2, -0.2, -pl - 10),
      max: new THREE.Vector3(pw / 2, 0, 5),
      isFloor: true
    });

    // Player at plaza entrance (outside station doors)
    this.player.setPosition(0, SETTINGS.eyeHeight, 2);
    this.player.setRotation(Math.PI, 0);

    // Surrounding buildings (simple tall box silhouettes)
    const buildings = [
      { x: -15, z: -10, w: 8, h: 22, d: 10 },
      { x: -15, z: -25, w: 8, h: 28, d: 12 },
      { x:  15, z: -8,  w: 8, h: 20, d: 10 },
      { x:  15, z: -22, w: 8, h: 26, d: 14 },
      { x:   0, z: -35, w: 16, h: 34, d: 8 },
      { x: -25, z: -35, w: 10, h: 40, d: 8 },
      { x:  25, z: -35, w: 10, h: 36, d: 8 },
    ];
    buildings.forEach(b => {
      const bldg = new THREE.Mesh(
        new THREE.BoxGeometry(b.w, b.h, b.d),
        stdMat(pick([COLORS.concrete, COLORS.concreteDark, COLORS.rust * 1.2]), { roughness: 0.95 })
      );
      bldg.position.set(b.x, b.h / 2, b.z);
      this.scene.add(bldg); this.addObj(bldg);
      this.colliders.push({
        min: new THREE.Vector3(b.x - b.w / 2, 0, b.z - b.d / 2),
        max: new THREE.Vector3(b.x + b.w / 2, b.h, b.z + b.d / 2)
      });

      // Windows (grid of small emissive squares)
      const winMat = stdMat(0x606878, { emissive: 0x303840, emissiveIntensity: 0.4 });
      for (let wy = 2; wy < b.h - 2; wy += 2.5) {
        for (let wx = -b.w / 2 + 1; wx < b.w / 2 - 1; wx += 2) {
          if (Math.random() > 0.3) {
            const win = new THREE.Mesh(
              new THREE.BoxGeometry(1, 1.2, 0.05),
              winMat
            );
            win.position.set(b.x + wx, wy, b.z + b.d / 2 + 0.03);
            this.scene.add(win); this.addObj(win);
          }
        }
      }
    });

    // Citadel silhouette in the distance
    const citadel = new THREE.Mesh(
      new THREE.ConeGeometry(6, 35, 6),
      stdMat(COLORS.concreteDark, { roughness: 0.8, flatShading: true })
    );
    citadel.position.set(-8, 17, -55);
    citadel.scale.set(1, 2.5, 1);
    this.scene.add(citadel); this.addObj(citadel);

    const citadelTop = new THREE.Mesh(
      new THREE.OctahedronGeometry(4, 0),
      stdMat(COLORS.metalDark, { emissive: 0x4070a8, emissiveIntensity: 0.3, flatShading: true })
    );
    citadelTop.position.set(-8, 48, -55);
    this.scene.add(citadelTop); this.addObj(citadelTop);

    // Loose papers / trash animating via wind
    for (let i = 0; i < 12; i++) {
      const paper = new THREE.Mesh(
        new THREE.PlaneGeometry(0.3, 0.3),
        stdMat(COLORS.paper, { side: THREE.DoubleSide, roughness: 0.95 })
      );
      paper.rotation.x = -Math.PI / 2 + rand(-0.2, 0.2);
      paper.rotation.z = rand(0, Math.PI * 2);
      paper.position.set(rand(-12, 12), 0.01, rand(-25, 0));
      paper.userData.isPaper = true;
      paper.userData.flyT = Math.random() * 10;
      this.scene.add(paper); this.addObj(paper);
    }

    // Lamp posts
    [[-6, -6], [6, -6], [-6, -20], [6, -20]].forEach(([x, z]) => {
      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.05, 0.08, 5, 6),
        stdMat(COLORS.metalDark)
      );
      pole.position.set(x, 2.5, z);
      this.scene.add(pole); this.addObj(pole);

      const lampHead = new THREE.Mesh(
        new THREE.CylinderGeometry(0.2, 0.25, 0.4, 8),
        stdMat(COLORS.metalDark)
      );
      lampHead.position.set(x, 5, z);
      this.scene.add(lampHead); this.addObj(lampHead);

      const lamp = new THREE.PointLight(0xfff0c8, 0.8, 12);
      lamp.position.set(x, 4.9, z);
      this.addLight(lamp);
    });

    // Moving silhouettes far away (other figures walking)
    for (let i = 0; i < 4; i++) {
      const silhouette = new THREE.Mesh(
        new THREE.BoxGeometry(0.4, 1.8, 0.3),
        stdMat(0x1a1d22, { roughness: 0.95 })
      );
      silhouette.position.set(rand(-15, 15), 0.9, rand(-30, -20));
      this.scene.add(silhouette); this.addObj(silhouette);
    }

    // Ambient sky light (cold gray-blue)
    const hemi = new THREE.HemisphereLight(0x8894a4, 0x3a3d42, 0.6);
    this.addLight(hemi);
    const sun = new THREE.DirectionalLight(0xa8b4c4, 0.5);
    sun.position.set(10, 20, -5);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 1024;
    sun.shadow.mapSize.height = 1024;
    sun.shadow.camera.left = -20;
    sun.shadow.camera.right = 20;
    sun.shadow.camera.top = 20;
    sun.shadow.camera.bottom = -20;
    this.addLight(sun);

    this.applyColliders();
    this.applyTriggers();
  }

  update(delta) {
    super.update(delta);
    if (this.phase === 'train') {
      // Animate window scrolling
      this._redrawWindows(this.time);
      // Gentle train sway (player camera)
      const sway = Math.sin(this.time * 1.2) * 0.015;
      this.player.camera.rotation.z = sway;
    } else if (this.phase === 'arriving') {
      // Fallback transition: if the player physically walks out through the black box,
      // force progression even if the trigger edge is missed.
      if (this.player.position.z > 6.1) this.enterStation();
    } else if (this.phase === 'plaza' || this.phase === 'exiting') {
      // Animate papers blowing
      this.objects.forEach(o => {
        if (o.userData && o.userData.isPaper) {
          o.userData.flyT = (o.userData.flyT || 0) + delta;
          o.position.x += delta * 0.5;
          o.position.z += delta * 0.2;
          o.position.y = 0.01 + Math.abs(Math.sin(o.userData.flyT * 3)) * 0.5;
          o.rotation.z += delta * 2;
          if (o.position.x > 15) o.position.x = -15;
        }
      });
    }

    // Animate surveillance cams
    this.objects.forEach(o => {
      if (o.userData && o.userData.isCamera) {
        o.userData.sweepT = (o.userData.sweepT || 0) + delta * 0.5;
        const lens = o.userData.lens;
        if (lens) lens.parent.rotation.y = Math.sin(o.userData.sweepT) * 0.4;
      }
      if (o.userData && o.userData.isBreenScreen) {
        o.userData.flickerT = (o.userData.flickerT || 0) + delta;
        if (Math.random() < 0.01) {
          o.userData.redraw(3, rand(-2, 2));
          o.userData.tex.needsUpdate = true;
        } else if (Math.random() < 0.02) {
          o.userData.redraw(0, 0);
          o.userData.tex.needsUpdate = true;
        }
      }
    });

    // Animate walking NPCs in station
    this.npcs.forEach(n => {
      if (n.userData.isWalking && n.userData.walkTarget !== undefined) {
        n.position.z -= delta * (n.userData.walkSpeed || 1);
        if (n.position.z < n.userData.walkTarget - 5) {
          n.position.z = 5;   // wrap
        }
      }
      // Foot tap, stare, over-shoulder micro-behaviors
      if (n.userData.behavior === 'foot-tap') {
        const lKnee = n.getObjectByName('leftKnee');
        if (lKnee) lKnee.rotation.x = -Math.PI / 2 + Math.sin(this.time * 5) * 0.15;
      }
      if (n.userData.behavior === 'over-shoulder') {
        const head = n.getObjectByName('head');
        if (head) head.rotation.y = Math.sin(this.time * 0.5) * 0.9;
      }
      if (n.userData.behavior === 'stare') {
        const head = n.getObjectByName('head');
        if (head) {
          // Look at player then quickly look away when close
          const dx = this.player.position.x - n.position.x;
          const dz = this.player.position.z - n.position.z;
          const dist = Math.sqrt(dx * dx + dz * dz);
          if (dist < 8) {
            head.rotation.y = lerp(head.rotation.y, 0, delta * 8);   // look away
          } else {
            head.rotation.y = Math.atan2(dx, dz) - n.rotation.y;
          }
        }
      }
    });
  }
}

// ============================================================================
// CHAPTER 2 — FIRST PURSUIT
// Escape through branching alleys. Heartbeat. Scanner. Guards cut you off.
// ============================================================================

class Chapter2_Pursuit extends BaseChapter {

  async start() {
    this.scene.fog = new THREE.FogExp2(0x454a52, 0.035);
    this.scene.background = new THREE.Color(0x3a3f46);

    this.buildAlleys();

    this.player.setPosition(0, SETTINGS.eyeHeight, 5);
    this.player.setRotation(Math.PI, 0);
    this.player.setFootstepMaterial('concrete');

    await this.ui.fadeFromBlack(2000);

    this.ui.showChapterCard('CHAPTER TWO', 'FIRST PURSUIT', 'Don\'t let them see you', 5000);

    this.audio.stopAmbient();
    this.audio.startAmbient('alley');

    // Pursuit begins
    this.setTimer(() => this.triggerAlarm(), 4500);
  }

  buildAlleys() {
    // Long branching alley maze — player spawns south, must reach north exit
    // Map is roughly 40 units deep, with two branching paths.

    // Ground
    const groundMat = stdMat(COLORS.concrete, { roughness: 0.95 });
    const ground = new THREE.Mesh(new THREE.BoxGeometry(60, 0.2, 80), groundMat);
    ground.position.set(0, -0.1, -30);
    ground.receiveShadow = true;
    this.scene.add(ground); this.addObj(ground);
    this.colliders.push({
      min: new THREE.Vector3(-30, -0.2, -70),
      max: new THREE.Vector3(30, 0, 10),
      isFloor: true
    });

    // Sky / ambient
    const hemi = new THREE.HemisphereLight(0x707a88, 0x2a2d32, 0.35);
    this.addLight(hemi);
    const dir = new THREE.DirectionalLight(0x8090a0, 0.35);
    dir.position.set(-8, 15, -5);
    dir.castShadow = true;
    this.addLight(dir);

    // Helper: build a walled section with gap
    const wall = (w, h, d, x, y, z, color = COLORS.concrete) => {
      const m = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        stdMat(color, { roughness: 0.95 })
      );
      m.position.set(x, y, z);
      m.castShadow = true;
      m.receiveShadow = true;
      this.scene.add(m); this.addObj(m);
      this.colliders.push({
        min: new THREE.Vector3(x - w / 2, 0, z - d / 2),
        max: new THREE.Vector3(x + w / 2, h, z + d / 2)
      });
      return m;
    };

    // ===== Main alley layout =====
    // South entrance: player spawn at z = 5, alley opens north
    // At z = -5, fork: left path and right path
    // Left path loops through a debris squeeze at z = -20
    // Right path has a staircase up to a platform at z = -18
    // Both converge at z = -35 at a narrow exit corridor leading to z = -50

    // Player spawn area - closed off behind with wall
    wall(30, 8, 1, 0, 4, 5.5, COLORS.concreteDark);

    // East & west perimeter walls (very tall for alley feel)
    wall(1, 12, 15, -12, 6, -2, COLORS.concrete);
    wall(1, 12, 15, 12, 6, -2, COLORS.concrete);

    // Central divider starting the fork (at z = -10)
    wall(3, 10, 12, 0, 5, -11, COLORS.rust * 0.8);

    // LEFT PATH walls
    wall(1, 10, 20, -8, 5, -15, COLORS.concrete);
    wall(1, 10, 15, -4, 5, -14, COLORS.concreteDark);

    // LEFT PATH — debris squeeze at z = -20, need to go around a pile
    EnvBuilder.debris(this.scene, new THREE.Vector3(-6, 0, -20), 1.4);
    // Climbable pile (raise the ground here slightly as "floor" collider)
    const rubble = new THREE.Mesh(
      new THREE.BoxGeometry(3, 0.8, 2),
      stdMat(COLORS.rust, { flatShading: true, roughness: 0.95 })
    );
    rubble.position.set(-6, 0.4, -20);
    this.scene.add(rubble); this.addObj(rubble);
    this.colliders.push({
      min: new THREE.Vector3(-7.5, 0, -21),
      max: new THREE.Vector3(-4.5, 0.8, -19),
      isFloor: true
    });

    // RIGHT PATH walls
    wall(1, 10, 20, 8, 5, -15, COLORS.concrete);
    wall(1, 10, 15, 4, 5, -14, COLORS.concreteDark);

    // RIGHT PATH — staircase up to small platform
    for (let i = 0; i < 5; i++) {
      const step = new THREE.Mesh(
        new THREE.BoxGeometry(2.5, 0.2, 0.8),
        stdMat(COLORS.concrete, { roughness: 0.9 })
      );
      step.position.set(6, 0.1 + i * 0.35, -16 - i * 0.8);
      this.scene.add(step); this.addObj(step);
      this.colliders.push({
        min: new THREE.Vector3(4.75, 0, -16.4 - i * 0.8),
        max: new THREE.Vector3(7.25, 0.2 + i * 0.35, -15.6 - i * 0.8),
        isFloor: true
      });
    }
    const platform = new THREE.Mesh(
      new THREE.BoxGeometry(4, 0.3, 4),
      stdMat(COLORS.concreteDark, { roughness: 0.95 })
    );
    platform.position.set(6, 1.75, -22);
    this.scene.add(platform); this.addObj(platform);
    this.colliders.push({
      min: new THREE.Vector3(4, 0, -24),
      max: new THREE.Vector3(8, 1.9, -20),
      isFloor: true
    });

    // Convergence zone at z = -30 — both paths rejoin
    wall(8, 10, 1, -4, 5, -30, COLORS.concreteDark);
    wall(8, 10, 1, 4, 5, -30, COLORS.concreteDark);

    // Narrow squeeze-through gap to exit corridor
    wall(1, 10, 5, -2.5, 5, -33, COLORS.rust);
    wall(1, 10, 5, 2.5, 5, -33, COLORS.rust);

    // Exit corridor
    wall(1, 12, 20, -4, 6, -45, COLORS.concrete);
    wall(1, 12, 20, 4, 6, -45, COLORS.concrete);

    // Buildings around perimeter (tall silhouettes)
    const bldgMat = stdMat(COLORS.concreteDark, { roughness: 0.95 });
    for (const b of [
      { x: -20, z: -10, w: 12, h: 24, d: 20 },
      { x:  20, z: -10, w: 12, h: 28, d: 20 },
      { x: -20, z: -35, w: 14, h: 22, d: 16 },
      { x:  20, z: -35, w: 14, h: 26, d: 16 },
      { x:   0, z: -55, w: 30, h: 30, d: 10 },
    ]) {
      const bldg = new THREE.Mesh(new THREE.BoxGeometry(b.w, b.h, b.d), bldgMat);
      bldg.position.set(b.x, b.h / 2, b.z);
      this.scene.add(bldg); this.addObj(bldg);
      this.colliders.push({
        min: new THREE.Vector3(b.x - b.w / 2, 0, b.z - b.d / 2),
        max: new THREE.Vector3(b.x + b.w / 2, b.h, b.z + b.d / 2)
      });
      // Scattered lit windows
      for (let wy = 2; wy < b.h - 2; wy += 2.5) {
        for (let wx = -b.w / 2 + 1; wx < b.w / 2 - 1; wx += 2.5) {
          if (Math.random() > 0.5) {
            const win = new THREE.Mesh(
              new THREE.BoxGeometry(1, 1.2, 0.05),
              stdMat(0x303848, { emissive: 0x4a5c78, emissiveIntensity: 0.7 })
            );
            const side = b.x < 0 ? 1 : -1;
            win.position.set(b.x + side * b.w / 2, wy, b.z + wx);
            win.rotation.y = side > 0 ? -Math.PI / 2 : Math.PI / 2;
            this.scene.add(win); this.addObj(win);
          }
        }
      }
    }

    // Dumpsters, trash, broken signs
    for (const pos of [[-3, 0, -4], [5, 0, -8], [-6, 0, -25], [7, 0, -28]]) {
      const dumpster = new THREE.Mesh(
        new THREE.BoxGeometry(1.4, 1.2, 0.9),
        stdMat(pick([COLORS.rust, 0x2a4030, 0x4a2a20]), { roughness: 0.9 })
      );
      dumpster.position.set(pos[0], 0.6, pos[2]);
      dumpster.castShadow = true;
      this.scene.add(dumpster); this.addObj(dumpster);
      this.colliders.push({
        min: new THREE.Vector3(pos[0] - 0.7, 0, pos[2] - 0.45),
        max: new THREE.Vector3(pos[0] + 0.7, 1.2, pos[2] + 0.45)
      });
    }

    // Broken propaganda sign
    const sign = new THREE.Mesh(
      new THREE.PlaneGeometry(2.5, 1.5),
      stdMat(COLORS.paper, { side: THREE.DoubleSide, roughness: 0.95 })
    );
    sign.position.set(-11.8, 3, -15);
    sign.rotation.y = Math.PI / 2;
    this.scene.add(sign); this.addObj(sign);

    // Flickering emergency lights in alley
    for (let z = -5; z >= -45; z -= 8) {
      const side = z % 16 === 0 ? -1 : 1;
      const light = new THREE.PointLight(0xffa040, 1, 8);
      light.position.set(side * 10, 5, z);
      light.userData.baseIntensity = 1;
      light.userData.flicker = true;
      light.userData.nextFlicker = rand(2, 5);
      this.addLight(light);

      // Lamp bracket + bulb visual
      const bulb = new THREE.Mesh(
        new THREE.SphereGeometry(0.1, 8, 6),
        stdMat(0xffb060, { emissive: 0xffa040, emissiveIntensity: 1.5 })
      );
      bulb.position.copy(light.position);
      this.scene.add(bulb); this.addObj(bulb);
    }

    // Trigger: reaching exit ends chapter
    this.triggers.push({
      pos: new THREE.Vector3(0, 0, -50),
      radius: 3,
      onEnter: () => this.reachExit()
    });

    // Trigger: heartbeat intensifies halfway through
    this.triggers.push({
      pos: new THREE.Vector3(0, 0, -20),
      radius: 4,
      onEnter: () => this.midPursuit()
    });

    this.applyColliders();
    this.applyTriggers();
  }

  triggerAlarm() {
    this.audio.playRadioSquelch();
    this.setTimer(() => {
      this.audio.speak('Suspect sighted', 'cp');
      this.ui.showSubtitle('Suspect sighted! Pursuing on foot!', 'CIVIL PROTECTION', 4000);
    }, 300);

    this.setTimer(() => {
      this.audio.playMusicTense();
      this.audio.startHeartbeat();
      this.audio.setHeartbeatIntensity(0.4);
      this.ui.showObjective('ESCAPE — FIND THE EXIT NORTH');
    }, 1500);

    // Spawn scanner that patrols the area
    this.setTimer(() => this.spawnScanner(), 3000);

    // Spawn guards at spawn-end that pursue
    this.setTimer(() => this.spawnPursuingGuards(), 5000);
  }

  spawnScanner() {
    const scanner = CharacterFactory.createScanner();
    scanner.position.set(0, 3.5, -2);
    scanner.userData.patrolTime = 0;
    scanner.userData.homeX = 0;
    scanner.userData.homeZ = -15;
    this.addNPC(scanner);
    this._scanner = scanner;
    this.audio.playScannerBeep();

    // Radio chatter
    this.setTimer(() => {
      this.audio.playRadioSquelch();
      this.audio.speak('Scanner deployed', 'cp');
      this.ui.showSubtitle('Scanner deployed. Lock on visual.', 'DISPATCH', 3500);
    }, 1500);
  }

  spawnPursuingGuards() {
    // Two guards come from the south (player's behind)
    for (let i = 0; i < 2; i++) {
      const guard = CharacterFactory.createCivilProtection();
      guard.position.set(i === 0 ? -2 : 2, 0, 8);
      guard.rotation.y = 0;   // facing north toward player
      guard.userData.isWalking = true;
      guard.userData.pursueSpeed = 2.2;
      guard.userData.pursues = true;
      this.addNPC(guard);
    }

    // Radio chatter
    this.setTimer(() => {
      this.audio.playRadioSquelch();
      this.audio.speak('Units moving', 'cp');
    }, 2500);

    // Echoing footsteps behind (phantom footsteps)
    const chaseFootTimer = setInterval(() => {
      if (this.completed) { clearInterval(chaseFootTimer); return; }
      this.audio.playFootstep('concrete', 0.4);
    }, 650);
    this._chaseFootTimer = chaseFootTimer;
  }

  midPursuit() {
    this.audio.setHeartbeatIntensity(0.75);
    this.ui.setStressed(true);
    this.audio.playRadioSquelch();
    this.setTimer(() => {
      this.audio.speak('Cut him off north side', 'cp');
      this.ui.showSubtitle('Cut him off on the north side! Deploy second team!', 'CIVIL PROTECTION', 4000);
    }, 400);
  }

  async reachExit() {
    if (this.completed) return;
    this.completed = true;
    this.audio.setHeartbeatIntensity(0);
    this.ui.setStressed(false);
    this.audio.stopMusic();
    if (this._chaseFootTimer) clearInterval(this._chaseFootTimer);

    this.ui.hideObjective();
    this.ui.showSubtitle('In here! Quickly!', 'REBEL', 3000);
    this.audio.speak('In here quickly', 'rebel');

    this.setTimer(() => this.ui.showChapterCard('END OF CHAPTER 2', '', '', 4000), 1500);
    this.setTimer(() => { this.game.nextChapter(); }, 6000);
  }

  update(delta) {
    super.update(delta);

    // Animate scanner patrol + lock-on
    if (this._scanner) {
      const s = this._scanner;
      s.userData.patrolTime += delta;

      // Orbit and slowly rotate toward player
      const t = s.userData.patrolTime;
      const orbitR = 4;
      s.position.x = s.userData.homeX + Math.sin(t * 0.5) * orbitR;
      s.position.z = s.userData.homeZ + Math.cos(t * 0.5) * orbitR * 0.6;
      s.position.y = 3.2 + Math.sin(t * 1.3) * 0.15;

      // Slowly rotate to look at player
      const dx = this.player.position.x - s.position.x;
      const dz = this.player.position.z - s.position.z;
      const targetY = Math.atan2(dx, dz);
      s.rotation.y = lerp(s.rotation.y, targetY, delta * 0.8);
      // Target for spotlight
      if (s.userData.spotlight) {
        s.userData.spotlight.target.position.set(
          this.player.position.x, 0, this.player.position.z
        );
      }

      // Distance-based alert
      const dist = Math.sqrt(dx * dx + dz * dz);
      if (dist < 12 && !s.userData.hasSpotted) {
        s.userData.spotCountdown = (s.userData.spotCountdown || 2) - delta;
        if (s.userData.spotCountdown <= 0) {
          s.userData.hasSpotted = true;
          this.audio.playScannerFlash();
          this.player.shake(0.1, 3);
          this.audio.playRadioSquelch();
          this.setTimer(() => {
            this.audio.speak('Contact confirmed', 'cp');
            this.ui.showSubtitle('Contact confirmed! Move in!', 'DISPATCH', 3500);
            this.audio.setHeartbeatIntensity(1);
          }, 400);
        }
      } else if (dist >= 12 && s.userData.hasSpotted) {
        s.userData.hasSpotted = false;
        s.userData.spotCountdown = 2;
      }

      // Beep occasionally
      s.userData.beepT = (s.userData.beepT || 0) + delta;
      if (s.userData.beepT > rand(1.5, 3)) {
        s.userData.beepT = 0;
        this.audio.playScannerBeep();
      }
    }

    // Pursuing guards
    this.npcs.forEach(n => {
      if (n.userData.pursues) {
        const dx = this.player.position.x - n.position.x;
        const dz = this.player.position.z - n.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist > 3) {
          const vx = (dx / dist) * n.userData.pursueSpeed * delta;
          const vz = (dz / dist) * n.userData.pursueSpeed * delta;
          n.position.x += vx;
          n.position.z += vz;
          n.rotation.y = Math.atan2(dx, dz);
          n.userData.isWalking = true;
        } else {
          n.userData.isWalking = false;
        }

        // Clamp to alley bounds
        n.position.x = clamp(n.position.x, -11, 11);
      }
    });
  }

  async cleanup() {
    if (this._chaseFootTimer) clearInterval(this._chaseFootTimer);
    this.audio.stopHeartbeat?.();
    this.audio.setHeartbeatIntensity(0);
    this.audio.stopMusic();
    await super.cleanup();
  }
}

// ============================================================================
// CHAPTER 3 — SAFEHOUSE
// Dim interior. Rebels. Someone crying. Flashlight sweeps outside.
// ============================================================================

class Chapter3_Safehouse extends BaseChapter {

  async start() {
    this.scene.fog = new THREE.FogExp2(0x1a1f26, 0.12);
    this.scene.background = new THREE.Color(0x0a0d12);

    this.buildSafehouse();

    this.player.setPosition(0, SETTINGS.eyeHeight, 3);
    this.player.setRotation(Math.PI, 0);
    this.player.setFootstepMaterial('wood');

    await this.ui.fadeFromBlack(2500);

    this.ui.showChapterCard('CHAPTER THREE', 'SAFEHOUSE', 'Don\'t make a sound', 5500);

    this.audio.stopAmbient();
    this.audio.startAmbient('safehouse');

    // Initial dialogue
    this.setTimer(() => {
      this.ui.showSubtitle('Close the door. Quietly.', 'OLDER REBEL', 3500);
      this.audio.speak('Close the door', 'rebel');
    }, 3000);

    this.setTimer(() => {
      this.ui.showSubtitle('How many outside?', 'YOUNGER REBEL', 3500);
      this.audio.speak('How many outside', 'rebel');
    }, 7500);

    this.setTimer(() => {
      this.ui.showSubtitle('Enough. Keep the lights off.', 'OLDER REBEL', 3500);
      this.audio.speak('Enough keep lights off', 'rebel');
    }, 11500);

    // Radio static moment
    this.setTimer(() => this.radioStaticEvent(), 18000);

    // Flashlight sweep tension event
    this.setTimer(() => this.flashlightEvent(), 30000);

    // Exit trigger unlocks after flashlight event
  }

  buildSafehouse() {
    const rw = 8, rl = 10, rh = 3;

    // Floor (wood)
    const floor = new THREE.Mesh(
      new THREE.BoxGeometry(rw, 0.2, rl),
      stdMat(COLORS.woodDark, { roughness: 0.95 })
    );
    floor.position.set(0, -0.1, -2);
    floor.receiveShadow = true;
    this.scene.add(floor); this.addObj(floor);
    this.colliders.push({
      min: new THREE.Vector3(-rw/2, -0.2, -rl/2 - 2),
      max: new THREE.Vector3(rw/2, 0, rl/2 - 2),
      isFloor: true
    });

    // Ceiling
    const ceil = new THREE.Mesh(
      new THREE.BoxGeometry(rw, 0.15, rl),
      stdMat(0x2a2218, { roughness: 0.95 })
    );
    ceil.position.set(0, rh, -2);
    this.scene.add(ceil); this.addObj(ceil);

    // Walls — cracked & peeling (multiple plane layers for peel effect)
    const wallMat = stdMat(0x6a5c4a, { roughness: 0.95 });
    const peelMat = stdMat(0x4a3c2a, { roughness: 0.95 });

    // North wall (with exit door at far end)
    const nWall = new THREE.Mesh(
      new THREE.BoxGeometry(rw, rh, 0.2),
      wallMat
    );
    nWall.position.set(0, rh/2, -rl/2 - 2);
    this.scene.add(nWall); this.addObj(nWall);
    this.colliders.push({
      min: new THREE.Vector3(-rw/2, 0, -rl/2 - 2.1),
      max: new THREE.Vector3(rw/2, rh, -rl/2 - 1.9)
    });

    // South wall (with entrance, open at start)
    const sWall = new THREE.Mesh(
      new THREE.BoxGeometry(rw, rh, 0.2),
      wallMat
    );
    sWall.position.set(0, rh/2, rl/2 - 2);
    this.scene.add(sWall); this.addObj(sWall);
    this.colliders.push({
      min: new THREE.Vector3(-rw/2, 0, rl/2 - 2.1),
      max: new THREE.Vector3(rw/2, rh, rl/2 - 1.9)
    });

    // East & West walls
    [-1, 1].forEach(side => {
      const w = new THREE.Mesh(
        new THREE.BoxGeometry(0.2, rh, rl),
        wallMat
      );
      w.position.set(side * rw/2, rh/2, -2);
      this.scene.add(w); this.addObj(w);
      this.colliders.push({
        min: new THREE.Vector3(side * rw/2 - 0.1, 0, -rl/2 - 2),
        max: new THREE.Vector3(side * rw/2 + 0.1, rh, rl/2 - 2)
      });
    });

    // Peeling paint patches
    for (let i = 0; i < 15; i++) {
      const peel = new THREE.Mesh(
        new THREE.PlaneGeometry(rand(0.3, 0.8), rand(0.3, 0.7)),
        peelMat
      );
      const side = irand(0, 3);
      if (side === 0) {
        peel.position.set(rand(-rw/2 + 0.5, rw/2 - 0.5), rand(0.5, rh - 0.5), -rl/2 - 1.9);
      } else if (side === 1) {
        peel.position.set(rand(-rw/2 + 0.5, rw/2 - 0.5), rand(0.5, rh - 0.5), rl/2 - 2.1);
        peel.rotation.y = Math.PI;
      } else if (side === 2) {
        peel.position.set(-rw/2 + 0.11, rand(0.5, rh - 0.5), rand(-rl/2 - 1.5, rl/2 - 2.5));
        peel.rotation.y = Math.PI / 2;
      } else {
        peel.position.set(rw/2 - 0.11, rand(0.5, rh - 0.5), rand(-rl/2 - 1.5, rl/2 - 2.5));
        peel.rotation.y = -Math.PI / 2;
      }
      this.scene.add(peel); this.addObj(peel);
    }

    // Crack lines (thin dark strips)
    for (let i = 0; i < 8; i++) {
      const crack = new THREE.Mesh(
        new THREE.PlaneGeometry(0.03, rand(1, 2)),
        stdMat(0x1a1410)
      );
      crack.position.set(-rw/2 + 0.12, rand(0.5, rh - 0.5), rand(-rl/2 - 1, rl/2 - 3));
      crack.rotation.y = Math.PI / 2;
      crack.rotation.z = rand(-0.3, 0.3);
      this.scene.add(crack); this.addObj(crack);
    }

    // Boarded-up window (south-east) — will be used for flashlight event
    const boardGroup = new THREE.Group();
    for (let i = 0; i < 5; i++) {
      const board = new THREE.Mesh(
        new THREE.BoxGeometry(1.6, 0.22, 0.04),
        stdMat(COLORS.woodDark, { roughness: 0.95 })
      );
      board.position.set(0, -0.5 + i * 0.28, 0);
      board.rotation.z = rand(-0.08, 0.08);
      boardGroup.add(board);
    }
    boardGroup.position.set(rw/2 - 0.15, 1.7, 1);
    boardGroup.rotation.y = -Math.PI / 2;
    this.scene.add(boardGroup); this.addObj(boardGroup);
    this._boards = boardGroup;

    // Gap behind boards — tiny window (for light to sweep through)
    const windowHole = new THREE.Mesh(
      new THREE.PlaneGeometry(1.4, 1.2),
      stdMat(0x000000)
    );
    windowHole.position.set(rw/2 - 0.2, 1.7, 1);
    windowHole.rotation.y = -Math.PI / 2;
    this.scene.add(windowHole); this.addObj(windowHole);

    // Exit door (north-east) — locked at first
    const exitDoor = new THREE.Mesh(
      new THREE.BoxGeometry(1, 2.1, 0.08),
      stdMat(COLORS.woodDark, { roughness: 0.9 })
    );
    exitDoor.position.set(2.5, 1.05, -rl/2 - 1.9);
    this.scene.add(exitDoor); this.addObj(exitDoor);
    this._exitDoor = exitDoor;

    // Furniture — table, chairs, bedroll
    const table = new THREE.Mesh(
      new THREE.BoxGeometry(1.4, 0.05, 0.8),
      stdMat(COLORS.woodDark, { roughness: 0.85 })
    );
    table.position.set(-1.5, 0.85, -3);
    this.scene.add(table); this.addObj(table);
    this.colliders.push({
      min: new THREE.Vector3(-2.2, 0, -3.4),
      max: new THREE.Vector3(-0.8, 0.9, -2.6)
    });
    // Table legs
    for (const [dx, dz] of [[-0.65, -0.35], [0.65, -0.35], [-0.65, 0.35], [0.65, 0.35]]) {
      const leg = new THREE.Mesh(
        new THREE.BoxGeometry(0.06, 0.85, 0.06),
        stdMat(COLORS.woodDark)
      );
      leg.position.set(-1.5 + dx, 0.425, -3 + dz);
      this.scene.add(leg); this.addObj(leg);
    }

    // Radio on table
    const radio = new THREE.Mesh(
      new THREE.BoxGeometry(0.35, 0.2, 0.15),
      stdMat(COLORS.rust, { roughness: 0.85 })
    );
    radio.position.set(-1.5, 0.98, -3);
    this.scene.add(radio); this.addObj(radio);
    this._radio = radio;

    // Radio knob + antenna
    const knob = new THREE.Mesh(
      new THREE.CylinderGeometry(0.025, 0.025, 0.015, 8),
      stdMat(COLORS.metal)
    );
    knob.position.set(-1.4, 1.09, -2.95);
    knob.rotation.x = Math.PI/2;
    this.scene.add(knob); this.addObj(knob);
    const antenna = new THREE.Mesh(
      new THREE.CylinderGeometry(0.005, 0.005, 0.4, 4),
      stdMat(COLORS.metal)
    );
    antenna.position.set(-1.65, 1.3, -3);
    this.scene.add(antenna); this.addObj(antenna);

    // Bedroll / mattress
    const bed = new THREE.Mesh(
      new THREE.BoxGeometry(0.9, 0.2, 1.8),
      stdMat(0x4a3828, { roughness: 0.95 })
    );
    bed.position.set(2.8, 0.1, -5);
    this.scene.add(bed); this.addObj(bed);
    this.colliders.push({
      min: new THREE.Vector3(2.35, 0, -5.9),
      max: new THREE.Vector3(3.25, 0.25, -4.1)
    });

    // Crates stacked
    for (let i = 0; i < 3; i++) {
      const crate = new THREE.Mesh(
        new THREE.BoxGeometry(0.7, 0.7, 0.7),
        stdMat(pick([COLORS.woodDark, 0x4a3828]), { roughness: 0.95 })
      );
      crate.position.set(-2.8, 0.35 + i * 0.7, -5 + (i * 0.1));
      crate.rotation.y = rand(-0.1, 0.1);
      crate.castShadow = true;
      this.scene.add(crate); this.addObj(crate);
      if (i === 0) {
        this.colliders.push({
          min: new THREE.Vector3(-3.15, 0, -5.35),
          max: new THREE.Vector3(-2.45, 0.7, -4.65)
        });
      }
    }

    // Single flickering hanging bulb — weak
    const bulbLight = new THREE.PointLight(0xffa860, 1.2, 8);
    bulbLight.position.set(0, 2.5, -3);
    bulbLight.castShadow = true;
    bulbLight.userData.baseIntensity = 1.2;
    bulbLight.userData.flicker = true;
    bulbLight.userData.nextFlicker = rand(2, 5);
    this.addLight(bulbLight);
    this._bulbLight = bulbLight;

    // Visual bulb
    const bulbMesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.06, 8, 6),
      stdMat(0xffc888, { emissive: 0xffa860, emissiveIntensity: 1.5 })
    );
    bulbMesh.position.set(0, 2.5, -3);
    this.scene.add(bulbMesh); this.addObj(bulbMesh);
    // wire
    const wire = new THREE.Mesh(
      new THREE.CylinderGeometry(0.005, 0.005, 0.45, 4),
      stdMat(0x1a1a1a)
    );
    wire.position.set(0, 2.78, -3);
    this.scene.add(wire); this.addObj(wire);

    // Ambient fill
    this.addLight(new THREE.HemisphereLight(0x3a3228, 0x0a0d12, 0.15));

    // NPCs — 3 rebels
    // Rebel 1 — older man, sitting on crate near table
    const rebel1 = CharacterFactory.createRebel({ jumpsuitColor: COLORS.rebelBrown });
    rebel1.position.set(-2.8, 0.7, -5.6);
    rebel1.rotation.y = Math.PI / 4;
    // Seated pose
    const l1h = rebel1.getObjectByName('leftHip');
    const r1h = rebel1.getObjectByName('rightHip');
    const l1k = rebel1.getObjectByName('leftKnee');
    const r1k = rebel1.getObjectByName('rightKnee');
    if (l1h) l1h.rotation.x = Math.PI / 2;
    if (r1h) r1h.rotation.x = Math.PI / 2;
    if (l1k) l1k.rotation.x = -Math.PI / 2;
    if (r1k) r1k.rotation.x = -Math.PI / 2;
    rebel1.userData.behavior = 'guard';
    this.addNPC(rebel1);
    this._rebel1 = rebel1;

    // Rebel 2 — kneeling by the boards, looking through crack (guard role)
    const rebel2 = CharacterFactory.createRebel({ jumpsuitColor: COLORS.rebelGreen });
    rebel2.position.set(2.3, 0, 0.5);
    rebel2.rotation.y = -Math.PI / 2;
    // Kneeling pose
    const l2h = rebel2.getObjectByName('leftHip');
    const r2h = rebel2.getObjectByName('rightHip');
    const l2k = rebel2.getObjectByName('leftKnee');
    const r2k = rebel2.getObjectByName('rightKnee');
    if (l2h) l2h.rotation.x = 1.4;
    if (r2h) r2h.rotation.x = 0.3;
    if (l2k) l2k.rotation.x = -2.2;
    rebel2.scale.setScalar(0.85);
    rebel2.position.y = -0.35;
    rebel2.userData.behavior = 'watch';
    this.addNPC(rebel2);
    this._rebel2 = rebel2;

    // Rebel 3 — corner, crying silently (shaking)
    const rebel3 = CharacterFactory.createCitizen({ jumpsuitColor: COLORS.jumpsuitDark });
    rebel3.position.set(-3, 0, 0.5);
    rebel3.rotation.y = Math.PI;
    // Crouched sad pose
    const l3h = rebel3.getObjectByName('leftHip');
    const r3h = rebel3.getObjectByName('rightHip');
    const l3k = rebel3.getObjectByName('leftKnee');
    const r3k = rebel3.getObjectByName('rightKnee');
    if (l3h) l3h.rotation.x = 1.5;
    if (r3h) r3h.rotation.x = 1.5;
    if (l3k) l3k.rotation.x = -2.5;
    if (r3k) r3k.rotation.x = -2.5;
    rebel3.scale.setScalar(0.9);
    rebel3.position.y = -0.5;
    // Hunch torso forward — tilt whole body
    rebel3.rotation.x = 0.3;
    rebel3.userData.behavior = 'crying';
    this.addNPC(rebel3);
    this._rebel3 = rebel3;

    this.applyColliders();

  radioStaticEvent() {
    // Radio picks up distorted transmission, then cuts out
    this.audio.playRadioSquelch();
    this.ui.showSubtitle('…anyone receiving…coordinates…sector…', 'RADIO', 3500);

    this.setTimer(() => {
      this.audio.playRadioSquelch();
      this.audio.speak('Is anyone', 'loudspeaker');
    }, 400);

    this.setTimer(() => {
      this.audio.playRadioSquelch();
    }, 2000);

    this.setTimer(() => {
      this.ui.showSubtitle('Turn it off. Now.', 'OLDER REBEL', 3000);
      this.audio.speak('Turn it off now', 'rebel');
    }, 4200);

    this.setTimer(() => {
      this.audio.playThunk(0.3);   // turning off radio
    }, 5000);
  }

  async flashlightEvent() {
    // The iconic moment — flashlight beam sweeps over the boarded window
    this.audio.playMusicTense();
    this.audio.setHeartbeatIntensity(0);
    this.audio.startHeartbeat();
    this.audio.setHeartbeatIntensity(0.6);

    this.ui.setLetterbox(true);

    this.setTimer(() => {
      this.ui.showSubtitle('Don\'t. Move.', 'OLDER REBEL', 4000);
      this.audio.speak('Don\'t move', 'rebel');
    }, 500);

    // Dim bulb
    if (this._bulbLight) {
      this._bulbLight.intensity = 0.3;
    }

    // Create flashlight — a SpotLight that sweeps across
    const flashlight = new THREE.SpotLight(0xffffff, 4, 15, Math.PI / 9, 0.4, 1);
    flashlight.position.set(8, 2, 6);
    flashlight.target.position.set(-4, 1.7, -2);
    this.scene.add(flashlight);
    this.scene.add(flashlight.target);
    this.addObj(flashlight);
    this.addObj(flashlight.target);
    this._flashlight = flashlight;

    // Sweep target across the boarded window
    this._flashlightSweeping = true;
    this._flashlightSweepStart = this.time;

    // Guard voice from outside
    this.setTimer(() => {
      this.audio.playRadioSquelch();
      this.audio.speak('Sector clear', 'cp');
      this.ui.showSubtitle('Sector clear. Moving on.', 'CIVIL PROTECTION', 3500);
    }, 7000);

    this.setTimer(() => {
      this._flashlightSweeping = false;
      if (this._flashlight) {
        this._flashlight.intensity = 0;
      }
      this.audio.setHeartbeatIntensity(0);
      this.ui.setLetterbox(false);
      this.audio.stopMusic();
      if (this._bulbLight) this._bulbLight.intensity = 1.2;

      // Relief dialogue
      this.setTimer(() => {
        this.ui.showSubtitle('They\'re gone. For now.', 'OLDER REBEL', 4000);
        this.audio.speak('They are gone', 'rebel');
      }, 1500);

      this.setTimer(() => {
        this.ui.showSubtitle('Take this. Head north through the service corridor.', 'OLDER REBEL', 5000);
        this.audio.speak('Take this go north', 'rebel');
      }, 6000);

      this.setTimer(() => {
        this.ui.showObjective('HEAD NORTH THROUGH THE DOOR');
        // Unlock exit
        this.triggers.push({
          pos: new THREE.Vector3(2.5, 0, -7),
          radius: 2,
          onEnter: () => this.exitSafehouse()
        });
        this.applyTriggers();
      }, 10000);
    }, 11000);
  }

  async exitSafehouse() {
    if (this.completed) return;
    this.completed = true;
    this.audio.playDoorHiss();
    this.setTimer(() => this.ui.showChapterCard('END OF CHAPTER 3', '', '', 4000), 500);
    this.setTimer(() => this.game.nextChapter(), 5000);
  }

  update(delta) {
    super.update(delta);

    // Animate flashlight sweep
    if (this._flashlightSweeping && this._flashlight) {
      const t = this.time - this._flashlightSweepStart;
      const sweepProg = clamp(t / 7, 0, 1);
      const lerpAngle = lerp(-0.5, 0.5, sweepProg);
      this._flashlight.target.position.set(
        4 + Math.cos(lerpAngle) * 2,
        1.7 + Math.sin(this.time * 2) * 0.1,
        1 + Math.sin(lerpAngle) * 2
      );
      // Flicker slightly
      this._flashlight.intensity = 4 + Math.sin(this.time * 12) * 0.3;
    }

    // Animate crying rebel (shaking)
    if (this._rebel3) {
      this._rebel3.position.y = -0.5 + Math.sin(this.time * 8) * 0.005;
      const head = this._rebel3.getObjectByName('head');
      if (head) head.rotation.z = Math.sin(this.time * 4) * 0.02;
    }

    // Radio animation — subtle hum light if on
    // (no action currently)
  }

  async cleanup() {
    this.audio.setHeartbeatIntensity(0);
    this.audio.stopMusic();
    await super.cleanup();
  }
}

// ============================================================================
// CHAPTER 4 — CHECKPOINT
// Long corridor. Metal gates. Scanning beams. Guards watching.
// A distraction lets you slip through.
// ============================================================================

class Chapter4_Checkpoint extends BaseChapter {

  async start() {
    this.scene.fog = new THREE.FogExp2(0x2a2e34, 0.04);
    this.scene.background = new THREE.Color(0x15181e);

    this.buildCheckpoint();

    this.player.setPosition(0, SETTINGS.eyeHeight, 8);
    this.player.setRotation(Math.PI, 0);
    this.player.setFootstepMaterial('metal');

    await this.ui.fadeFromBlack(2500);

    this.ui.showChapterCard('CHAPTER FOUR', 'CHECKPOINT', 'Walk. Breathe. Don\'t look up.', 5500);

    this.audio.stopAmbient();
    this.audio.startAmbient('checkpoint');

    this.setTimer(() => {
      this.ui.showObjective('PROCEED THROUGH THE SCANNERS');
      this.ui.showSubtitle('Keep your head down. Move like everyone else.', 'REBEL', 4500);
      this.audio.speak('Keep your head down', 'rebel');
    }, 3000);

    // Loudspeaker announcements
    this.setTimer(() => {
      this.audio.speak('All citizens report', 'loudspeaker');
      this.ui.showSubtitle('All citizens will submit to identification scan. No exceptions.', 'LOUDSPEAKER', 5000);
    }, 8000);

    this.setTimer(() => {
      this.audio.speak('Report irregular behavior', 'loudspeaker');
      this.ui.showSubtitle('Report irregular behavior. Compliance ensures continuance.', 'LOUDSPEAKER', 5500);
    }, 16000);

    // Chaos event triggers at halfway point
    this.triggers.push({
      pos: new THREE.Vector3(0, 0, -8),
      radius: 2,
      onEnter: () => this.chaosEvent()
    });
    this.triggers.push({
      pos: new THREE.Vector3(0, 0, -30),
      radius: 2.5,
      onEnter: () => this.reachEnd()
    });
    this.applyTriggers();
  }

  buildCheckpoint() {
    const cw = 8, cl = 45, ch = 5;

    // Floor (metal grating)
    const floor = new THREE.Mesh(
      new THREE.BoxGeometry(cw, 0.2, cl),
      stdMat(COLORS.metalDark, { roughness: 0.6, metalness: 0.4 })
    );
    floor.position.set(0, -0.1, -15);
    floor.receiveShadow = true;
    this.scene.add(floor); this.addObj(floor);
    this.colliders.push({
      min: new THREE.Vector3(-cw/2, -0.2, -37.5),
      max: new THREE.Vector3(cw/2, 0, 7.5),
      isFloor: true
    });

    // Ceiling
    const ceil = new THREE.Mesh(
      new THREE.BoxGeometry(cw, 0.3, cl),
      stdMat(COLORS.metalDark, { roughness: 0.85 })
    );
    ceil.position.set(0, ch, -15);
    this.scene.add(ceil); this.addObj(ceil);

    // Side walls
    [-1, 1].forEach(side => {
      const w = new THREE.Mesh(
        new THREE.BoxGeometry(0.3, ch, cl),
        stdMat(COLORS.cpArmor * 2, { roughness: 0.75, metalness: 0.3 })
      );
      w.position.set(side * cw/2, ch/2, -15);
      this.scene.add(w); this.addObj(w);
      this.colliders.push({
        min: new THREE.Vector3(side * cw/2 - 0.15, 0, -37.5),
        max: new THREE.Vector3(side * cw/2 + 0.15, ch, 7.5)
      });

      // Ribbed pattern (vertical strips)
      for (let z = -35; z <= 5; z += 1.2) {
        const rib = new THREE.Mesh(
          new THREE.BoxGeometry(0.05, ch, 0.05),
          stdMat(COLORS.metal, { metalness: 0.6 })
        );
        rib.position.set(side * cw/2 * 0.98, ch/2, z);
        this.scene.add(rib); this.addObj(rib);
      }
    });

    // End walls (entry/exit apertures)
    const entryWall = new THREE.Mesh(
      new THREE.BoxGeometry(cw, ch, 0.3),
      stdMat(COLORS.cpArmor, { roughness: 0.7 })
    );
    entryWall.position.set(0, ch/2, 8);
    // Hole for player — we'll use two halves
    this.scene.remove(entryWall);

    // Actually use two panels to leave doorway
    const ePanelW = (cw - 1.5) / 2;
    for (const sign of [-1, 1]) {
      const panel = new THREE.Mesh(
        new THREE.BoxGeometry(ePanelW, ch, 0.3),
        stdMat(COLORS.cpArmor, { roughness: 0.7 })
      );
      panel.position.set(sign * (0.75 + ePanelW/2), ch/2, 8);
      this.scene.add(panel); this.addObj(panel);
      this.colliders.push({
        min: new THREE.Vector3(sign * (0.75 + ePanelW/2) - ePanelW/2, 0, 7.85),
        max: new THREE.Vector3(sign * (0.75 + ePanelW/2) + ePanelW/2, ch, 8.15)
      });
    }

    // Exit wall (fully closed, triggers end of chapter)
    for (const sign of [-1, 1]) {
      const panel = new THREE.Mesh(
        new THREE.BoxGeometry(ePanelW, ch, 0.3),
        stdMat(COLORS.cpArmor, { roughness: 0.7 })
      );
      panel.position.set(sign * (0.75 + ePanelW/2), ch/2, -38);
      this.scene.add(panel); this.addObj(panel);
      this.colliders.push({
        min: new THREE.Vector3(sign * (0.75 + ePanelW/2) - ePanelW/2, 0, -38.15),
        max: new THREE.Vector3(sign * (0.75 + ePanelW/2) + ePanelW/2, ch, -37.85)
      });
    }

    // METAL GATES — 3 checkpoints along the corridor
    const gatePositions = [-2, -14, -26];
    gatePositions.forEach((gz, idx) => {
      // Gate frame
      const gf1 = new THREE.Mesh(
        new THREE.BoxGeometry(0.3, ch, 0.4),
        stdMat(0x1a1d22, { roughness: 0.5, metalness: 0.5 })
      );
      gf1.position.set(-2, ch/2, gz);
      this.scene.add(gf1); this.addObj(gf1);
      const gf2 = new THREE.Mesh(
        new THREE.BoxGeometry(0.3, ch, 0.4),
        stdMat(0x1a1d22, { roughness: 0.5, metalness: 0.5 })
      );
      gf2.position.set(2, ch/2, gz);
      this.scene.add(gf2); this.addObj(gf2);

      // Top crossbeam with scanner
      const beam = new THREE.Mesh(
        new THREE.BoxGeometry(4.2, 0.4, 0.5),
        stdMat(0x2a3240, { roughness: 0.6 })
      );
      beam.position.set(0, ch - 0.4, gz);
      this.scene.add(beam); this.addObj(beam);

      // Scanning beam (vertical red plane)
      const scanBeam = new THREE.Mesh(
        new THREE.PlaneGeometry(3.8, ch - 0.5),
        new THREE.MeshBasicMaterial({
          color: 0xff4040,
          transparent: true,
          opacity: 0.35,
          side: THREE.DoubleSide,
          depthWrite: false
        })
      );
      scanBeam.position.set(0, ch/2 - 0.2, gz);
      scanBeam.userData.isScanBeam = true;
      scanBeam.userData.offsetZ = 0;
      this.scene.add(scanBeam); this.addObj(scanBeam);

      // Red glow
      const scanLight = new THREE.PointLight(0xff3030, 1, 5);
      scanLight.position.set(0, ch - 0.7, gz);
      this.addLight(scanLight);

      // Scanner beep sound triggered via update
      scanBeam.userData.gateIdx = idx;
    });

    // Ceiling fluorescent strips
    for (let z = 5; z >= -35; z -= 4) {
      this.addLight(EnvBuilder.addFluorescent(
        this.scene, new THREE.Vector3(0, ch - 0.1, z), 0xf0f4ff, true
      ));
    }

    // CP Guards on catwalks — stationary, intimidating
    const guard1 = CharacterFactory.createCivilProtection();
    guard1.position.set(-3.2, 0, -6);
    guard1.rotation.y = Math.PI / 2;
    this.addNPC(guard1);
    this._guard1 = guard1;

    const guard2 = CharacterFactory.createCivilProtection();
    guard2.position.set(3.2, 0, -18);
    guard2.rotation.y = -Math.PI / 2;
    this.addNPC(guard2);
    this._guard2 = guard2;

    const guard3 = CharacterFactory.createCivilProtection();
    guard3.position.set(-3.2, 0, -30);
    guard3.rotation.y = Math.PI / 2;
    this.addNPC(guard3);
    this._guard3 = guard3;

    // Other citizens walking through (creates sense of flow)
    this._checkpointCitizens = [];
    for (let i = 0; i < 6; i++) {
      const c = CharacterFactory.createCitizen();
      c.position.set(rand(-2, 2), 0, 6 - i * 6);
      c.rotation.y = Math.PI;
      c.userData.isWalking = true;
      c.userData.walkSpeed = 0.6;
      this.addNPC(c);
      this._checkpointCitizens.push(c);
    }

    // Surveillance cameras
    [[-3.8, 4.5, 0], [3.8, 4.5, -12], [-3.8, 4.5, -24]].forEach(([x,y,z]) => {
      const cam = EnvBuilder.addSurveillanceCam(this.scene, new THREE.Vector3(x, y, z), x < 0 ? Math.PI/2 : -Math.PI/2);
      this.addObj(cam);
    });

    // Floor marking (yellow painted line)
    const line = new THREE.Mesh(
      new THREE.PlaneGeometry(0.4, cl - 5),
      stdMat(0xc8b040, { roughness: 0.9 })
    );
    line.rotation.x = -Math.PI / 2;
    line.position.set(0, 0.01, -15);
    this.scene.add(line); this.addObj(line);

    // Propaganda poster
    const poster = new THREE.Mesh(
      new THREE.PlaneGeometry(1.5, 2),
      stdMat(0xa8403a, { roughness: 0.9 })
    );
    poster.position.set(-3.85, 2.5, -10);
    poster.rotation.y = Math.PI / 2;
    this.scene.add(poster); this.addObj(poster);

    // Ambient fill
    this.addLight(new THREE.HemisphereLight(0x4a5260, 0x1a1d22, 0.3));

    this.applyColliders();
  }

  async chaosEvent() {
    if (this._chaosTriggered) return;
    this._chaosTriggered = true;

    // Big crash from the side — NPC yells
    this.setTimer(() => {
      this.audio.playThunk(1);
      this.audio.playThunk(0.5);
      this.player.shake(0.15, 4);
      this.ui.setStressed(true);
    }, 500);

    this.setTimer(() => {
      this.audio.speak('HEY', 'citizen');
      this.ui.showSubtitle('Hey! HEY! Get off me!', 'CITIZEN', 3000);
    }, 800);

    this.setTimer(() => {
      this.audio.speak('Stop now', 'cp');
      this.ui.showSubtitle('Stop moving! Code three on deck two!', 'CIVIL PROTECTION', 4000);
      this.audio.playRadioSquelch();
    }, 3500);

    // Guards turn to commotion — rotate them to face it
    if (this._guard2) {
      this._guard2.userData.distracted = true;
    }
    if (this._guard3) {
      this._guard3.userData.distracted = true;
    }

    // All nearby citizens flinch/run
    this._checkpointCitizens.forEach(c => {
      c.userData.walkSpeed = 2;
      c.userData.fleeing = true;
    });

    this.setTimer(() => {
      this.ui.showObjective('SLIP THROUGH — NOW');
      this.audio.playMusicTense();
    }, 2500);

    this.setTimer(() => {
      this.ui.setStressed(false);
    }, 9000);
  }

  async reachEnd() {
    if (this.completed) return;
    this.completed = true;
    this.ui.hideObjective();
    this.audio.stopMusic();
    this.setTimer(() => {
      this.audio.playDoorHiss();
      this.ui.showChapterCard('END OF CHAPTER 4', '', '', 4000);
    }, 500);
    this.setTimer(() => this.game.nextChapter(), 5500);
  }

  update(delta) {
    super.update(delta);

    // Animate scan beams (slow sweep)
    this.objects.forEach(o => {
      if (o.userData && o.userData.isScanBeam) {
        o.userData.offsetZ = (o.userData.offsetZ || 0) + delta * 0.8;
        o.material.opacity = 0.35 + Math.sin(o.userData.offsetZ * 2) * 0.15;

        // Check if player crosses the beam
        const dz = Math.abs(this.player.position.z - o.position.z);
        if (dz < 0.3 && !o.userData.scanned) {
          o.userData.scanned = true;
          this.audio.playScannerBeep();
          // Pause slightly longer on player
          this.setTimer(() => {
            this.audio.playScannerBeep();
            this.setTimer(() => { o.userData.scanned = false; }, 400);
          }, 200);
        } else if (dz > 1) {
          o.userData.scanned = false;
        }
      }
    });

    // Guards occasionally look at player
    [this._guard1, this._guard2, this._guard3].forEach(g => {
      if (!g) return;
      if (g.userData.distracted) {
        // Turn toward chaos (south, player-ward)
        const targetY = Math.PI / 2 + Math.sin(this.time * 2) * 0.3;
        g.rotation.y = lerp(g.rotation.y, targetY, delta * 2);
      } else {
        const head = g.getObjectByName('head');
        if (head) {
          const dx = this.player.position.x - g.position.x;
          const dz = this.player.position.z - g.position.z;
          const dist = Math.sqrt(dx * dx + dz * dz);
          if (dist < 8 && dist > 1) {
            const targetY = Math.atan2(dx, dz) - g.rotation.y;
            // Occasionally lock head to player
            const lockT = Math.sin(this.time * 0.3 + g.position.z);
            if (lockT > 0.5) {
              head.rotation.y = lerp(head.rotation.y, targetY, delta * 2);
            } else {
              head.rotation.y = lerp(head.rotation.y, 0, delta * 2);
            }
          }
        }
      }
    });

    // Walking citizens through corridor
    this._checkpointCitizens?.forEach(c => {
      c.position.z -= delta * c.userData.walkSpeed;
      if (c.position.z < -36) c.position.z = 7;

      if (c.userData.fleeing) {
        // Panicked head movement
        const head = c.getObjectByName('head');
        if (head) head.rotation.y = Math.sin(this.time * 8) * 0.4;
      }
    });
  }
}
