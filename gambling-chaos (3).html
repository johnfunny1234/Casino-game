@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes shake{0%,100%{transform:translate(-50%,-50%)}25%{transform:translate(-52%,-48%)}75%{transform:translate(-48%,-52%)}}

#hud{position:fixed;top:0;left:0;width:100%;padding:15px 25px;display:none;z-index:100;pointer-events:none}
#hud-top{display:flex;justify-content:space-between;align-items:center}

#fu{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);display:none;z-index:200;text-align:center}

#ef{height:100%;width:100%;background:linear-gradient(90deg,#ff0000,#ff4444);border-radius:5px;transition:width .3s}

#end h1{font-family:'Bebas Neue',sans-serif;font-size:60px;color:#ffd700;text-shadow:0 0 30px #ffd700}
#end p{color:#ccc;font-size:17px;margin-top:12px;max-width:520px;line-height:1.7}
#xh{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:4px;height:4px;background:rgba(255,255,255,.6);border-radius:50%;z-index:99;pointer-events:none;display:none}
#lookback{position:fixed;bottom:80px;right:20px;background:rgba(0,0,0,.7);border:1px solid #ffd700;padding:8px 16px;border-radius:6px;display:none;z-index:150;font-family:'Oswald',sans-serif;font-size:14px;color:#ffd700;pointer-events:none}
#rain{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;display:none}
#boss-hp{position:fixed;top:90px;left:50%;transform:translateX(-50%);width:350px;display:none;z-index:200;text-align:center}
#boss-name{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#ffd700;margin-bottom:5px;text-shadow:0 0 10px rgba(255,215,0,.5)}
#boss-hp-bg{width:100%;height:12px;background:#222;border-radius:6px;border:1px solid #ffd700}
#boss-hp-bar{height:100%;width:100%;background:linear-gradient(90deg,#ff0000,#ffd700);border-radius:6px;transition:width .3s}
#ability-warn{position:fixed;top:60%;left:50%;transform:translate(-50%,-50%);display:none;z-index:210;font-family:'Bebas Neue',sans-serif;font-size:36px;color:#ff4444;text-shadow:0 0 20px rgba(255,0,0,.7);text-align:center;animation:pulse .4s infinite}
#king-hint{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);display:none;z-index:200;font-family:'Oswald',sans-serif;font-size:16px;color:#ffd700;background:rgba(0,0,0,.8);padding:8px 20px;border-radius:8px;border:1px solid #ffd700}
#secret-g:hover{color:#ff00ff;text-shadow:0 0 20px #ff00ff,0 0 40px #ff00ff}
#secret-a:hover{color:#ff4400;text-shadow:0 0 20px #ff4400,0 0 40px #ff4400}
#secret-b:hover{color:#00ccff;text-shadow:0 0 20px #00ccff,0 0 40px #00ccff}
#secret-m:hover{color:#00ff88;text-shadow:0 0 20px #00ff88,0 0 40px #00ff88}
#secret-i:hover{color:#ff6600;text-shadow:0 0 20px #ff6600,0 0 40px #ff6600}
</style>

<body>
<div id="blocker"><h1><span id="secret-g" onclick="unlockCh2()" style="cursor:pointer">G</span><span id="secret-a" onclick="unlockCh3()" style="cursor:pointer">A</span><span id="secret-m" onclick="unlockCh4()" style="cursor:pointer">M</span><span id="secret-b" onclick="unlockCh3P2()" style="cursor:pointer">B</span>L<span id="secret-i" onclick="unlockCh5()" style="cursor:pointer">I</span>NG CHAOS</h1><h2>A Story of Luck & Mayhem</h2><div style="display:flex;gap:15px;align-items:center;flex-wrap:wrap;justify-content:center"><button class="btn" onclick="startGame()">PLAY</button><button class="btn" id="ch2btn" onclick="startCh2()" style="display:none;background:linear-gradient(135deg,#8800ff,#ff0088);font-size:22px;padding:14px 40px">CHAPTER 2</button><button class="btn" id="ch3btn" onclick="startCh3()" style="display:none;background:linear-gradient(135deg,#ff4400,#ff8800);font-size:22px;padding:14px 40px">CHAPTER 3</button><button class="btn" id="ch3p2btn" onclick="startCh3P2()" style="display:none;background:linear-gradient(135deg,#00aaff,#0044ff);font-size:22px;padding:14px 40px">CH3 PART 2</button><button class="btn" id="ch4btn" onclick="startCh4()" style="display:none;background:linear-gradient(135deg,#00ff88,#005533);font-size:22px;padding:14px 40px">CHAPTER 4</button><button class="btn" id="ch5btn" onclick="startCh5()" style="display:none;background:linear-gradient(135deg,#ff6600,#ff2200);font-size:22px;padding:14px 40px">CHAPTER 5</button></div><div class="ctrl">WASD Move | Mouse Look | E Interact | Click Punch<br>SHIFT Sprint | SPACE Jump</div></div>
<div id="xh"></div>
<div id="hud"><div id="hud-top"><div id="money">$500</div><div id="loc">PARKING LOT</div></div></div>
<div id="hp-c"><div id="hp-b"></div></div>
<div id="dlg"><div id="dw"></div><div id="dt"></div><div id="dh">Press E to continue...</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ══════════════════════════════════════════════════════════
//  GAMBLING CHAOS — V3 Complete Rewrite
// ══════════════════════════════════════════════════════════
let scene,cam,ren,clock;
let P={x:0,y:0,z:48,vy:0,spd:5.5,sprint:9.5,hp:100,money:500,gnd:true};
let keys={},yaw=0,pitch=0,locked=false;
let state='OUTSIDE',dlgOn=false,dlgQ=[],dlgCB=null;
let npcs=[],cols=[],enemies=[],meshes=[];
let fight=false,curE=0,eHP=[100,130],eNm=['COLE','AJ'],pCD=0,eAT=0;
let chase=false,cSpd=3.8,won=false,doorGone=false;
let zLights=[],ltT=0;
// Driving state
let driving=false,driveT=0,drivePhase=0,driveSpeed=0;
let taxiGroup=null,chaseCarGroup=null,driveMeshes=[];
let crashDone=false,escapeFinal=false;

// ══════ AUDIO ENGINE ══════
let actx=null;
function initAudio(){actx=new(window.AudioContext||window.webkitAudioContext)();}
function sfx(type){
  if(!actx)return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.connect(g);g.connect(actx.destination);
  const t=actx.currentTime;
  if(type==='punch'){o.type='sawtooth';o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(50,t+.15);g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);o.start(t);o.stop(t+.2);}
  else if(type==='step'){o.type='triangle';o.frequency.setValueAtTime(80+Math.random()*40,t);g.gain.setValueAtTime(.06,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);o.start(t);o.stop(t+.08);}
  else if(type==='jackpot'){
    [0,.1,.2,.3,.4,.5].forEach((d,i)=>{
      const o2=actx.createOscillator(),g2=actx.createGain();
      o2.connect(g2);g2.connect(actx.destination);
      o2.type='sine';o2.frequency.setValueAtTime(400+i*100,t+d);
      g2.gain.setValueAtTime(.2,t+d);g2.gain.exponentialRampToValueAtTime(.001,t+d+.3);
      o2.start(t+d);o2.stop(t+d+.3);
    });return;
  }
  else if(type==='crash'){o.type='sawtooth';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(30,t+.8);g.gain.setValueAtTime(.5,t);g.gain.exponentialRampToValueAtTime(.001,t+1);o.start(t);o.stop(t+1);
    const n=actx.createBufferSource(),buf=actx.createBuffer(1,actx.sampleRate*.5,actx.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(actx.sampleRate*.1));
    n.buffer=buf;const g2=actx.createGain();n.connect(g2);g2.connect(actx.destination);g2.gain.setValueAtTime(.4,t);g2.gain.exponentialRampToValueAtTime(.001,t+.6);n.start(t);
  }
  else if(type==='slot'){o.type='square';o.frequency.setValueAtTime(600,t);g.gain.setValueAtTime(.1,t);
    for(let i=0;i<10;i++){o.frequency.setValueAtTime(400+Math.random()*400,t+i*.08);}
    g.gain.exponentialRampToValueAtTime(.001,t+.8);o.start(t);o.stop(t+.8);
  }
  else if(type==='door'){o.type='sine';o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(500,t+.15);g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);o.start(t);o.stop(t+.2);}
  else if(type==='engine'){o.type='sawtooth';o.frequency.setValueAtTime(55,t);g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);o.start(t);o.stop(t+.15);}
  else if(type==='horn'){o.type='square';o.frequency.setValueAtTime(350,t);g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.5);o.start(t);o.stop(t+.5);}
  else if(type==='glass'){
    const n=actx.createBufferSource(),buf=actx.createBuffer(1,actx.sampleRate*.3,actx.sampleRate),dd=buf.getChannelData(0);
    for(let i=0;i<dd.length;i++)dd[i]=(Math.random()*2-1)*Math.exp(-i/(actx.sampleRate*.05));
    n.buffer=buf;const g2=actx.createGain();n.connect(g2);g2.connect(actx.destination);g2.gain.setValueAtTime(.3,t);n.start(t);return;
  }
}
let stepT=0;
function stepSound(dt){stepT+=dt;if(stepT>.35){stepT=0;sfx('step');}}

// ══════ MATERIALS ══════
const M={};
function initMat(){
  const L=c=>new THREE.MeshLambertMaterial({color:c});
  const B=c=>new THREE.MeshBasicMaterial({color:c});
  M.road=L(0x2a2a2a);M.swalk=L(0x777777);M.conc=L(0x666666);
  M.cExt=L(0x12082a);M.cExt2=L(0x1f0f3d);
  M.gold=L(0xffd700);M.dWall=L(0x180a28);M.wAcc=L(0x241040);
  M.carp=L(0x8b0000);M.rCarp=L(0xaa1111);M.vFlr=L(0x120828);
  M.wood=L(0x5c3a1e);M.dWood=L(0x3a200e);M.met=L(0x888888);M.chr=L(0xaaaaaa);
  M.skin=L(0xe8b89d);M.dSkin=L(0x8d5524);M.tSkin=L(0xc49a6c);
  M.gls=new THREE.MeshLambertMaterial({color:0x88ccff,transparent:true,opacity:.3});
  M.tile=L(0xdddddd);M.tileD=L(0x999999);M.porc=L(0xf0f0f0);
  M.felt=L(0x0a5c0a);M.din=L(0xf0e0c8);M.food=L(0xcc6633);
  M.leath=L(0x3a1a0a);M.rLeath=L(0x6a1010);
  M.nPink=B(0xff0066);M.nGrn=B(0x00ff88);M.nBlu=B(0x3366ff);
  M.gGold=B(0xffd700);M.gWht=B(0xffffdd);M.gRed=B(0xff3333);
  M.slot=L(0xbb0000);M.slotS=B(0x00ee66);
  M.kWall=L(0xc8c8c8);M.steel=L(0xa0a0a0);
  M.aWall=L(0x3a3a3a);M.aGnd=L(0x222222);M.stGnd=L(0x333333);
  M.yel=L(0xffff00);M.blk=L(0x111111);M.wht=L(0xffffff);
  M.ceil=L(0x0e0e0e);M.bWall=L(0xcccccc);
  M.win=new THREE.MeshBasicMaterial({color:0x001133,transparent:true,opacity:.5});
  M.hrFlr=L(0x0a0808);M.hrW=L(0x1a0a0a);
  M.brnW=L(0x5c3a1e);M.taxi=L(0xffcc00);M.chaseC=L(0x111111);
  M.debris=L(0x666655);M.smoke=new THREE.MeshBasicMaterial({color:0x888888,transparent:true,opacity:.3});
}

// ══════ HELPERS ══════
function $(id){return document.getElementById(id);}
function box(w,h,d,m,x,y,z,c=true){const o=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);o.position.set(x,y,z);scene.add(o);meshes.push(o);if(c)cols.push({x1:x-w/2,x2:x+w/2,z1:z-d/2,z2:z+d/2,y1:y-h/2,y2:y+h/2});return o;}
function cyl(r,h,m,x,y,z,s=10){const o=new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,s),m);o.position.set(x,y,z);scene.add(o);meshes.push(o);return o;}
function person(x,y,z,sk,sh,pa,hat){
  const g=new THREE.Group();
  const bd=new THREE.Mesh(new THREE.BoxGeometry(.6,.85,.4),sh);bd.position.y=1.1;g.add(bd);
  const hd=new THREE.Mesh(new THREE.SphereGeometry(.22,8,8),sk);hd.position.y=1.75;g.add(hd);
  const eM=new THREE.MeshBasicMaterial({color:0xffffff}),pM=new THREE.MeshBasicMaterial({color:0x222222});
  [-.08,.08].forEach(ox=>{const e=new THREE.Mesh(new THREE.SphereGeometry(.04,4,4),eM);e.position.set(ox,1.78,.2);g.add(e);
    const p=new THREE.Mesh(new THREE.SphereGeometry(.025,4,4),pM);p.position.set(ox,1.78,.23);g.add(p);});
  const lm=pa||new THREE.MeshLambertMaterial({color:0x222222});
  [-.15,.15].forEach(ox=>{const l=new THREE.Mesh(new THREE.BoxGeometry(.22,.7,.26),lm);l.position.set(ox,.35,0);g.add(l);});
  [-.42,.42].forEach(ox=>{const a=new THREE.Mesh(new THREE.BoxGeometry(.18,.7,.2),sh);a.position.set(ox,1.05,0);g.add(a);
    const h2=new THREE.Mesh(new THREE.SphereGeometry(.07,4,4),sk);h2.position.set(ox,.65,0);g.add(h2);});
  [-.15,.15].forEach(ox=>{const s=new THREE.Mesh(new THREE.BoxGeometry(.22,.1,.3),M.blk);s.position.set(ox,.05,.02);g.add(s);});
  if(hat){const hm=new THREE.MeshLambertMaterial({color:hat});
    const h1=new THREE.Mesh(new THREE.CylinderGeometry(.28,.28,.12,8),hm);h1.position.y=1.98;g.add(h1);
    const h2=new THREE.Mesh(new THREE.CylinderGeometry(.38,.38,.03,8),hm);h2.position.y=1.92;g.add(h2);}
  g.position.set(x,y,z);scene.add(g);meshes.push(g);return g;
}
function zL(c,i,x,y,z,d=20){const l=new THREE.PointLight(c,i,d);l.position.set(x,y,z);l.visible=false;scene.add(l);zLights.push(l);return l;}
function updZL(){zLights.forEach(l=>{const dx=P.x-l.position.x,dz=P.z-l.position.z;l._d=dx*dx+dz*dz;});zLights.sort((a,b)=>a._d-b._d);zLights.forEach((l,i)=>{l.visible=i<4;});}
function npc(m,x,z,r,id,nm){npcs.push({mesh:m,x,z,radius:r,id,name:nm});}
function ceil(w,d,x,z,h=7){box(w,.2,d,M.ceil,x,h,z,false);}
function setLoc(n){$('loc').textContent=n;}
function updHUD(){$('money').textContent='$'+P.money.toLocaleString();}
function flash(c,dur){const f=$('fl');if(c)f.style.background=c;else f.style.background='#fff';f.style.opacity='.7';setTimeout(()=>f.style.opacity='0',dur||150);}
function showSub(t,s,dur){const el=$('sub');el.style.display='block';el.querySelector('h1').textContent=t;el.querySelector('p').textContent=s;setTimeout(()=>el.style.display='none',dur);}
function warn(txt,dur){const w=$('wrn');w.style.display='block';w.querySelector('h1').textContent=txt;setTimeout(()=>w.style.display='none',dur);}
function blackout(on){$('blk').style.opacity=on?'1':'0';$('blk').style.pointerEvents=on?'all':'none';}

// ══════════════════════════════════════════════════════════
// MAP — rooms flow along -Z axis from entrance
//
// OUTSIDE:      z 35→55
// ENTRANCE:     z 25→35
// MAIN FLOOR:   z 5→25
// VIP:          z -8→5
// HIGH ROLLER:  z -24→-8
// KITCHEN:      z -38→-24
// DINING:       z -54→-38
// SVC HALL:     z -62→-54

function interact(){
  if(dlgOn){advDlg();return;}
  for(const n of npcs){const dx=P.x-n.x,dz=P.z-n.z,d=Math.sqrt(dx*dx+dz*dz);
    if(d<n.radius){
      if(n.id==='guard'&&state==='OUTSIDE'){
        startDlg(n.mesh.userData.dialogue,()=>{
          sfx('door');
          cols=cols.filter(c=>!(Math.abs((c.x1+c.x2)/2)<2&&Math.abs((c.z1+c.z2)/2-35.15)<1));
          meshes.forEach(m=>{if(m.userData&&m.userData.isDoor)m.visible=false;});
          doorGone=true;state='CASINO';setLoc('ENTRANCE HALL');
          showSub('THE GRAND ROYALE','Try your luck...',3000);
        });return;}
      if(n.id==='slot'&&state==='CASINO'&&!chase){triggerSlot();return;}
      if(n.id==='window'&&state==='BATHROOM'&&!fight&&curE>=2){triggerEscape();return;}
      if(n.id==='taxi'&&(state==='ALLEY'||state==='ESCAPING'||P.z<-76)){triggerTaxi();return;}
      if(n.id==='subway'&&state==='FINAL_ESCAPE'){triggerFinalEscape();return;}
      if(n.id==='tony'&&state==='TONY_FIGHT'){pushTony();return;}
      if(n.id==='building'&&state==='STREET_CHASE'){
        state='BUILDING';setLoc('CONSTRUCTION SITE');
        startDlg([{speaker:'Carl',text:"In here! I can lose them!"},{speaker:'SYSTEM',text:"Climb the ramps to the top!"}]);return;
      }
      if(n.mesh&&n.mesh.userData&&n.mesh.userData.dialogue){startDlg(n.mesh.userData.dialogue);return;}
    }
  }
}

// ══════ COLLISION ══════
function checkCol(nx,nz){const pw=.35,stepH=0.8;
  for(const c of cols){
    if(nx+pw>c.x1&&nx-pw<c.x2&&nz+pw>c.z1&&nz-pw<c.z2){
      // Skip if collider top is within step-up range (player can walk onto it)
      if(c.y2<=P.y+stepH&&c.y2>=P.y-0.1)continue;
      // Only block if player body overlaps vertically
      if(P.y+1.5>c.y1&&P.y<c.y2)return true;
    }
  }
  return false;}

// ════════════════════════
// GAME LOOP
// ════════════════════════
function update(){
  const dt=Math.min(clock.getDelta(),.05);
  // DRIVING MODE
  if(driving){updateDrive(dt);return;}
  // TRAIN MODE
  if(state==='TRAIN'){updateTrain(dt);return;}
  if(!locked||dlgOn||won){ren.render(scene,cam);requestAnimationFrame(update);return;}

  const spd=(fight?P.spd*.5:(keys['shift']?P.sprint:P.spd))*dt;
  let mx=0,mz=0;
  if(keys['w']){mx-=Math.sin(yaw)*spd;mz-=Math.cos(yaw)*spd;}
  if(keys['s']){mx+=Math.sin(yaw)*spd;mz+=Math.cos(yaw)*spd;}
  if(keys['a']){mx-=Math.sin(yaw+Math.PI/2)*spd;mz-=Math.cos(yaw+Math.PI/2)*spd;}
  if(keys['d']){mx+=Math.sin(yaw+Math.PI/2)*spd;mz+=Math.cos(yaw+Math.PI/2)*spd;}
  if(keys[' ']&&P.gnd){P.vy=6.5;P.gnd=false;sfx('step');}
  P.vy-=16*dt;P.y+=P.vy*dt;
  // General platform/ground check: scan all colliders as potential floors
  let gy=0;
  const pw=.35;
  if(P.vy<=0){ // only when falling or on ground
    for(const c of cols){
      // Check if player is within X/Z bounds of this collider
      if(P.x+pw>c.x1&&P.x-pw<c.x2&&P.z+pw>c.z1&&P.z-pw<c.z2){
        // Check if player's feet are near the top surface of this collider
        const topY=c.y2;
        if(P.y<=topY+0.3&&P.y>=topY-0.5){
          gy=Math.max(gy,topY);
        }
      }
    }
  }
  // Sink platforms (non-collider, manual check)
  if(P.z>-75&&P.z<-73&&Math.abs(P.x)<8){
    [-5,0,5].forEach(sx=>{
      if(Math.abs(P.x-sx)<1.0&&P.y<=1.15&&P.y>0.3)gy=Math.max(gy,1.0);
    });
  }
  if(P.y<=gy){P.y=gy;P.vy=0;P.gnd=true;}
  const nx=P.x+mx,nz=P.z+mz;
  if(!checkCol(nx,P.z))P.x=nx;
  if(!checkCol(P.x,nz))P.z=nz;
  // Footsteps
  if((keys['w']||keys['s']||keys['a']||keys['d'])&&P.gnd)stepSound(dt);
  // First-person camera
  const eyeH=1.6;

  if((keys['w']||keys['s']||keys['a']||keys['d'])&&P.gnd)cam.position.y+=Math.sin(Date.now()*.009)*.03;

  cam.rotation.x=pitch;
  // Location

  // Prompts
  let near=false;
  for(const n of npcs){const d=Math.sqrt((P.x-n.x)**2+(P.z-n.z)**2);
    if(d<n.radius){near=true;const el=$('pr');
      if(n.id==='slot'&&!chase)el.textContent='Press E — Lucky Slot Machine';
      else if(n.id==='window'&&curE>=2)el.textContent='Press E — Escape Window!';
      else if(n.id==='guard'&&!doorGone)el.textContent='Press E — Talk to Guard';
      else if(n.id==='taxi')el.textContent='Press E — Get in Taxi';
      else if(n.id==='subway')el.textContent='Press E — Subway Entrance';
      else if(n.id==='tony')el.textContent='Press E — PUSH HIM!';
      else if(n.id==='building')el.textContent='Press E — Enter Construction Site';
      else if(n.mesh&&n.mesh.userData&&n.mesh.userData.name)el.textContent='Press E — '+n.mesh.userData.name;
      else near=false;break;}}
  $('pr').style.display=near&&!dlgOn&&!fight?'block':'none';
  // Check subway interact
  for(const n of npcs){if(n.id==='subway'){const d=Math.sqrt((P.x-n.x)**2+(P.z-n.z)**2);
    if(d<n.radius&&keys['e']&&state==='FINAL_ESCAPE'&&!dlgOn){triggerFinalEscape();break;}}}
  updChase(dt);updFight(dt);
  if(typeof updateStreetChase==='function')updateStreetChase(dt);

}

function updateDrive(dt){
  driveT+=dt;
  if(driveTaxi){
    driveTaxi.position.z-=driveSpeed*dt;
    driveTaxi.position.x=3+Math.sin(driveT*1.2)*.6;
    if(Math.floor(driveT*3)%2===0&&Math.floor((driveT-dt)*3)%2!==0)sfx('engine');
  }
  // Move lights to follow taxi
  driveScene.children.forEach(c=>{if(c.isPointLight&&c.userData.offset!==undefined)
    c.position.set(driveTaxi.position.x,5,driveTaxi.position.z+c.userData.offset);});
  // Animate oncoming traffic
  driveTraffic.forEach(c=>{if(c.userData&&c.userData.speed){
    c.position.z+=c.userData.speed*dt;
    if(c.position.z>driveTaxi.position.z+100)c.position.z=driveTaxi.position.z-300;
  }});
  // Chase car
  if(drivePhase>=2&&driveChaser){
    driveChaser.visible=true;
    const gap=drivePhase>=3?10:22;
    const tz=driveTaxi.position.z+gap;
    driveChaser.position.z+=(tz-driveChaser.position.z)*dt*2.5;
    driveChaser.position.x=1+Math.sin(driveT*2.5)*.8;
    if(drivePhase===4){
      driveChaser.position.z+=(driveTaxi.position.z+2-driveChaser.position.z)*dt*6;
      driveTaxi.rotation.z=Math.sin(driveT*12)*.12;
      driveTaxi.rotation.y+=dt*2.5;
    }
  }
  // Camera
  if(keys['tab']&&drivePhase>=2){
    driveCam.position.set(driveTaxi.position.x,2.2,driveTaxi.position.z-1);
    driveCam.lookAt(driveChaser?driveChaser.position.x:0,1.5,driveTaxi.position.z+30);
  }else{
    driveCam.position.set(driveTaxi.position.x-1.2,2.5,driveTaxi.position.z+7);
    driveCam.lookAt(driveTaxi.position.x,1,driveTaxi.position.z-15);
  }
  ren.render(driveScene,driveCam);
  requestAnimationFrame(update);
}

function updateTrain(dt){
  trainT+=dt;
  if(trainPhase<3){
    trainScene.children.forEach(c=>{if(c.userData&&c.userData.city){c.position.z+=trainSpeed*dt;if(c.position.z>100)c.position.z-=800;}});
  }
  if(trainGroup){trainGroup.rotation.z=Math.sin(trainT*2.5)*.006;trainGroup.position.y=Math.sin(trainT*4)*.008;}
  if(trainPhase>=1&&trainChaser){trainChaser.visible=true;
    trainChaser.position.x+=((trainPhase>=2?3:5)-trainChaser.position.x)*dt*2;
    trainChaser.position.z=2+Math.sin(trainT*1.5)*.8;}
  if(trainPhase===2){trainGroup.rotation.z=Math.sin(trainT*12)*.025;trainSpeed=Math.max(4,trainSpeed-dt*6);}
  if(trainPhase===3)trainSpeed=Math.max(0,trainSpeed-dt*12);
  if(trainSpeed>1&&Math.floor(trainT*2)%3===0&&Math.floor((trainT-dt)*2)%3!==0)sfx('engine');
  trainCam.position.set(-1.1,1.5,1.5);
  trainCam.rotation.order='YXZ';trainCam.rotation.y=yaw;trainCam.rotation.x=pitch;
  ren.render(trainScene,trainCam);requestAnimationFrame(update);
}

let mafiaChasing=false,mafiaChasers=[];
function updateStreetChase(dt){
  if(state!=='STREET_CHASE'&&state!=='BUILDING')return;
  if(!mafiaChasing&&state==='STREET_CHASE'){mafiaChasing=true;
    for(let i=0;i<5;i++){
      const sk=i<2?[M.skin,M.dSkin][i]:M.skin;
      const sh=i===0?new THREE.MeshLambertMaterial({color:0xaa0000}):i===1?new THREE.MeshLambertMaterial({color:0x0000bb}):new THREE.MeshLambertMaterial({color:0x111111});
      const mc=person(P.x-3+i*1.5,0,P.z+10+i*2,sk,sh,M.blk);mafiaChasers.push(mc);
    }
  }
  mafiaChasers.forEach(mc=>{const dx=P.x-mc.position.x,dz=P.z-mc.position.z,d=Math.sqrt(dx*dx+dz*dz);
    if(d>3){mc.position.x+=(dx/d)*3.2*dt;mc.position.z+=(dz/d)*3.2*dt;mc.rotation.y=Math.atan2(dx,dz);}});
  if(window._buildingZ&&P.z<window._buildingZ+10&&state==='STREET_CHASE'){

// ═══════════════════════════════════════════
// CHAPTER 2 INTERACTION SYSTEM
// ═══════════════════════════════════════════
function ch2Interact(){
  if(dlgOn){advDlg();return;}
  for(const n of ch2Npcs){const dx=ch2P.x-n.x,dz=ch2P.z-n.z,d=Math.sqrt(dx*dx+dz*dz);
    if(d<n.radius){
      if(n.id==='guard2'&&ch2State==='OUTSIDE'){startDlg(n.mesh.userData.dialogue,()=>{ch2State='ENTER';});return;}
      if(n.id==='guard2b'&&ch2State==='OUTSIDE'){startDlg(n.mesh.userData.dialogue);return;}
      if(n.id==='ch2door'&&ch2State==='ENTER'){sfx('door');blackout(true);
        ch2Cols=ch2Cols.filter(c=>!(Math.abs((c.x1+c.x2)/2)<4&&Math.abs((c.z1+c.z2)/2-5.1)<1));
        ch2Meshes.forEach(m=>{if(m.userData&&m.userData.isDoor)m.visible=false;});
        $('rain').style.display='none';rainCtx=null;rainDrops=[];
        setTimeout(()=>{ch2P.x=0;ch2P.z=1;ch2P.y=0;ch2State='LOBBY';setLoc('TOWER LOBBY');blackout(false);
          showSub('TOWER OF FORTUNE','The successor awaits...',3000);},1500);return;}
      if(n.id==='slasher'&&(ch2State==='LOBBY'||ch2State==='INSIDE'||ch2State==='CASINO'||ch2State==='VIP')){
        startDlg(n.mesh.userData.dialogue,()=>{ch2State='HALLWAY';setLoc('ARENA HALLWAY');n.mesh.position.x=3.5;n.x=3.5;});return;}
      if(n.id==='arena_gate'&&ch2State==='HALLWAY'){startArenaSeq();return;}
      if(n.id==='king_card'&&kingCardMesh&&kingCardMesh.visible&&!kingFound){
        kingFound=true;kingCardMesh.visible=false;sfx('jackpot');$('king-hint').style.display='none';
        startDlg([
          {speaker:'Carl',text:"The King Card! This is the kill switch!"},
          {speaker:'Carl',text:"I need to hit the chest plate — just like the janitor said!"},
          {speaker:'SYSTEM',text:"Click to throw the King Card at the Casino Master!"}
        ],()=>{ch2State='THROW_CARD';});return;}
      // Post-boss interactions
      if(n.id==='elevator1'&&ch2State==='POST_BOSS'){
        startDlg([{speaker:'Carl',text:"The elevator. Floor 222 — AJ's office."},{speaker:'SYSTEM',text:"*Carl steps into the elevator. The doors close.*"}],
        ()=>{blackout(true);setTimeout(()=>{buildFloor222();ch2State='FLOOR222_COMBAT';blackout(false);},1500);});return;}
      if(n.id==='armory_door'){
        sfx('door');
        // Remove door mesh and collision
        if(n.mesh){n.mesh.visible=false;ch2Scene.remove(n.mesh);}
        ch2Cols=ch2Cols.filter(c=>!(Math.abs((c.x1+c.x2)/2+10)<.5&&Math.abs((c.z1+c.z2)/2+145.5)<3));
        // Remove this NPC so prompt doesn't show again
        const idx=ch2Npcs.indexOf(n);if(idx>=0)ch2Npcs.splice(idx,1);
        startDlg([{speaker:'Carl',text:"An armory? These guys were serious."},
          {speaker:'SYSTEM',text:"*The heavy door slides open.*"}]);return;}
      if(n.id==='ak47'&&!hasAK){hasAK=true;akAmmo=120;sfx('jackpot');
        if(n.mesh){n.mesh.visible=false;}
        $('money').textContent='AK-47: '+akAmmo;
        startDlg([{speaker:'Carl',text:"An AK-47. Left on a desk. These guys really are amateurs."},
          {speaker:'SYSTEM',text:"Click to shoot! Clear the guards!"}]);return;}
      if(n.id==='aj_crowd'&&ch2State==='POST_BOSS'){startDlg(n.mesh.userData.dialogue,()=>{
        if(n.mesh)n.mesh.visible=false;});return;}
      if(n.id==='lastguard'){startDlg(n.mesh.userData.dialogue,()=>{
        ch2Cols=ch2Cols.filter(c=>!(Math.abs((c.x1+c.x2)/2)<3&&Math.abs((c.z1+c.z2)/2+170)<1));
        ch2State='AJ_APPROACH';setLoc('AJ\'S OFFICE');});return;}
      if(n.id==='aj_office'&&ch2State==='AJ_APPROACH'&&!ajFight){startAJBoss();return;}
      if(n.id==='ignite'&&ch2State==='AJ_AFTERMATH'&&ajDefeated&&!fireSet){startFireEscape();return;}
      if(n.id==='elevator_escape'&&ch2State==='FIRE_ESCAPE'){startElevatorDown();return;}
      if(n.id==='goto_arena_escape'&&ch2State==='GROUND_ESCAPE'){buildArenaEscape();return;}
      if(n.id==='arena_exit'&&ch2State==='ARENA_ESCAPE'){buildOutsideEscape();return;}
      if(n.id==='alley_enter'&&ch2State==='OUTSIDE_ESCAPE'){buildAlleyway();return;}
      if(n.id==='collapse_zone'&&ch2State==='ALLEYWAY'){startCollapse();return;}
      // ── CHAPTER 3 INTERACTIONS ──
      if(n.id==='ch3_bag'){startDlg([{speaker:'Carl',text:"My money... it's gone. All of it. Burned with the building."},{speaker:'Carl',text:"$1,000,500 turned to ash. Figures."}]);return;}
      if(n.id==='ch3_slasher'&&ch2State==='CH3_RUBBLE'){startDlg(n.mesh.userData.dialogue);return;}
      if(n.id==='ch3_marcus'&&ch2State==='CH3_RUBBLE'){startDlg(n.mesh.userData.dialogue);return;}
      if(n.id==='ch3_tower_enter'&&ch2State==='CH3_RUBBLE'){blackout(true);setTimeout(()=>{buildCh3TowerInside();blackout(false);},1500);return;}
      if(n.id==='ch3_ak47'&&!hasAK){hasAK=true;akAmmo=90;sfx('jackpot');if(n.mesh)n.mesh.visible=false;
        $('money').textContent='AK-47: '+akAmmo;startDlg([{speaker:'Carl',text:"Another AK. These guys love their Russian hardware."},
        {speaker:'SYSTEM',text:"*AK-47 acquired! 90 rounds. Click to shoot.*"}],()=>{buildCh3GuardArea();});return;}
      if(n.id&&n.id.startsWith('ch3_panel_')&&ch2State==='CH3_CORE'){ch3CoreDone++;sfx('jackpot');flash('#00ff00',200);
        const msg=[{speaker:'SYSTEM',text:"*Panel disabled! "+ch3CoreDone+"/"+ch3CoreMax+"*"}];
        if(ch3CoreDone>=ch3CoreMax)msg.push({speaker:'SYSTEM',text:"*ALL PANELS DISABLED! The core is shutting down! GET TO THE SUBWAY!*"});
        else msg.push({speaker:'Carl',text:ch3CoreDone+" down, "+(ch3CoreMax-ch3CoreDone)+" to go."});
        startDlg(msg,()=>{if(ch3CoreDone>=ch3CoreMax){sfxExplosion();flash('#ffd700',500);showSub('CORE DISABLED','Get to the subway! NOW!',3000);}});
        ch2Npcs=ch2Npcs.filter(nn=>nn.id!==n.id);return;}
      if(n.id==='ch3_subway_enter'&&ch2State==='CH3_CORE'&&ch3CoreDone>=ch3CoreMax){blackout(true);setTimeout(()=>{buildCh3Subway();blackout(false);},1500);return;}
      if(n.id==='ch3_core_enter'&&(ch2State==='CH3_POST_GUARDS'||ch2State==='CH3_GUARDS')){blackout(true);setTimeout(()=>{buildCh3Core();blackout(false);},1500);return;}
      if(n.id==='ch3_board_train'&&ch2State==='CH3_SUBWAY'){startDlg([{speaker:'SYSTEM',text:"*You board the emergency train. The doors close.*"},
        {speaker:'Carl',text:"Come on... get us out of here."},{speaker:'SYSTEM',text:"*The train lurches forward into the dark tunnel.*"}],()=>{ch3StartTrain();});return;}
      // ── CHAPTER 3 PART 2 INTERACTIONS ──
      if(n.id==='ch3p2_exit_tunnel'&&ch3p2Phase==='TUNNEL_CRASH'){blackout(true);setTimeout(()=>{buildCh3P2Tunnel();blackout(false);},1500);return;}
      if(n.id==='ch3p2_tunnel_end'&&ch3p2Phase==='TUNNEL'){blackout(true);setTimeout(()=>{buildCh3P2City();blackout(false);},1500);return;}
      if(n.id==='ch3p2_enter_hotel'&&(ch3p2Phase==='CITY'||ch3p2Phase==='RUN_TO_HOTEL')){blackout(true);setTimeout(()=>{buildCh3P2Hotel();blackout(false);},1500);return;}
      if(n.id==='ch3p2_eat'&&ch3p2Phase==='HOTEL'&&!ch3p2AteFood){ch3p2AteFood=true;sfx('jackpot');flash('#00ff00',200);
        startDlg([{speaker:'SYSTEM',text:"*Carl eats some canned soup and crackers.*"},{speaker:'Carl',text:"Not bad. Not bad at all."}]);return;}
      if(n.id==='ch3p2_elevator_up'&&ch3p2Phase==='HOTEL'){blackout(true);setTimeout(()=>{buildCh3P2Roof();blackout(false);},1500);return;}
      if(n.id==='ch3p2_elevator_down'&&ch3p2Phase==='ROOF'){blackout(true);setTimeout(()=>{buildCh3P2Streets();blackout(false);},1500);return;}
      if(n.id==='ch3p2_enter_bridge'&&ch3p2Phase==='STREETS'){blackout(true);setTimeout(()=>{buildCh3P2Bridge();blackout(false);},1500);return;}
      if(n.id==='ch3p2_enter_station'&&ch3p2Phase==='BRIDGE'){blackout(true);setTimeout(()=>{buildCh3P2Station();blackout(false);},1500);return;}
      if(n.id==='ch3p2_marcus_station'&&ch3p2Phase==='STATION'){startDlg(n.mesh.userData.dialogue,()=>{ch3p2CMInvasion();});return;}
      if(n.id==='ch3p2_board_train'&&ch3p2Phase==='STATION'){startDlg([{speaker:'SYSTEM',text:"*Carl and Marcus sprint for the moving train!*"},
        {speaker:'Carl',text:"JUMP! NOW!"},{speaker:'SYSTEM',text:"*They grab the railing and pull themselves aboard!*"}],()=>{ch3p2StartTrainChase();});return;}
      // ── CHAPTER 4 INTERACTIONS ──
      if(n.id==='ch4_exit_wreck'&&ch4Phase==='CH4_TRAINWRECK'){blackout(true);setTimeout(()=>{buildCh4Forest1();blackout(false);},1500);return;}
      if(n.id==='ch4_enter_cave'&&ch4Phase==='CH4_FOREST1'){blackout(true);setTimeout(()=>{buildCh4Cave();blackout(false);},1500);return;}
      if(n.id==='ch4_exit_cave'&&ch4Phase==='CH4_CAVE'){blackout(true);setTimeout(()=>{buildCh4Forest2();blackout(false);},1500);return;}
      if(n.id==='ch4_enter_outpost'&&ch4Phase==='CH4_FOREST2'){blackout(true);setTimeout(()=>{buildCh4Outpost();blackout(false);},1500);return;}
      if(n.id==='ch4_leave_outpost'&&ch4Phase==='CH4_OUTPOST'){blackout(true);setTimeout(()=>{buildCh4OpenArea();blackout(false);},1500);return;}
      if(n.id==='ch4_bush'&&ch4Phase==='CH4_OPEN_AREA'&&!ch4HidingInBush){ch4EnterBush();return;}
      if(n.id==='ch4_go_bunker'&&ch4Phase==='CH4_OPEN_AREA'){blackout(true);setTimeout(()=>{buildCh4Bunker();blackout(false);},1500);return;}
      if(n.id==='ch4_marcus_hit_trigger'&&ch4Phase==='CH4_BUNKER'&&!ch4MarcusLaunched){ch4MarcusHitEvent();return;}
      if(n.id==='ch4_enter_prison'&&ch4Phase==='CH4_SHIP_INTERIOR'){blackout(true);setTimeout(()=>{buildCh4Prison();blackout(false);},1500);return;}
      // ── CHAPTER 5 INTERACTIONS ──
      if(n.id==='ch5_ship_exit'&&ch5Phase==='CH5_SHIP_FIRE'){ch5ShipJumpScene();return;}
      if(n.id==='ch5_to_outpost'&&ch5Phase==='CH5_AFTERMATH'){blackout(true);setTimeout(()=>{ch5Phase='CH5_OUTPOST';buildCh5Outpost();blackout(false);},1500);return;}

function spawnFire(x,y,z,count,spread){
  for(let i=0;i<count;i++){
    const c=[0xff4400,0xff6600,0xff2200,0xffaa00,0xff0000][Math.floor(Math.random()*5)];
    const m=new THREE.Mesh(new THREE.BoxGeometry(.15+Math.random()*.2,.15+Math.random()*.2,.15),
      new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:.7+Math.random()*.3}));
    m.position.set(x+(Math.random()-.5)*spread,y+Math.random()*1.5,z+(Math.random()-.5)*spread);
    ch2Scene.add(m);
    fireParticles.push({mesh:m,vy:.5+Math.random()*1.5,life:1+Math.random()*2,maxLife:1+Math.random()*2,
      ox:x+(Math.random()-.5)*spread,oz:z+(Math.random()-.5)*spread,spread:spread,baseY:y});
  }
}
function spawnSmoke(x,y,z,count,spread){
  for(let i=0;i<count;i++){
    const m=new THREE.Mesh(new THREE.BoxGeometry(.3+Math.random()*.4,.3+Math.random()*.4,.3),
      new THREE.MeshBasicMaterial({color:0x444444,transparent:true,opacity:.25+Math.random()*.2}));
    m.position.set(x+(Math.random()-.5)*spread,y+Math.random()*2,z+(Math.random()-.5)*spread);
    ch2Scene.add(m);
    smokeParticles.push({mesh:m,vy:.3+Math.random()*.8,vx:(Math.random()-.5)*.3,life:2+Math.random()*3,maxLife:2+Math.random()*3,
      ox:x,oz:z,spread:spread,baseY:y});
  }
}
function spawnDebris(x,y,z,count){
  for(let i=0;i<count;i++){
    const s=.1+Math.random()*.25;
    const c=[0x666655,0x554433,0x887766,0x333333,0x665544][Math.floor(Math.random()*5)];
    const m=new THREE.Mesh(new THREE.BoxGeometry(s,s,s),new THREE.MeshLambertMaterial({color:c}));
    m.position.set(x+(Math.random()-.5)*4,y+5+Math.random()*3,z+(Math.random()-.5)*4);
    m.rotation.set(Math.random()*3,Math.random()*3,Math.random()*3);
    ch2Scene.add(m);
    debrisParticles.push({mesh:m,vy:-2-Math.random()*4,vx:(Math.random()-.5)*2,vz:(Math.random()-.5)*2,
      ry:Math.random()*3,life:3+Math.random()*2,ground:0});
  }
}
function updateParticles(dt){
  for(let i=fireParticles.length-1;i>=0;i--){
    const p=fireParticles[i];p.life-=dt;
    if(p.life<=0){p.mesh.position.set(p.ox+(Math.random()-.5)*p.spread,p.baseY,p.oz+(Math.random()-.5)*p.spread);
      p.life=p.maxLife;p.mesh.material.opacity=.7+Math.random()*.3;}
    p.mesh.position.y+=p.vy*dt;p.mesh.position.x+=Math.sin(Date.now()*.005+i)*.01;
    p.mesh.material.opacity=Math.max(0,(p.life/p.maxLife)*.8);
    p.mesh.scale.setScalar(.5+p.life/p.maxLife);
  }
  for(let i=smokeParticles.length-1;i>=0;i--){
    const p=smokeParticles[i];p.life-=dt;
    if(p.life<=0){p.mesh.position.set(p.ox+(Math.random()-.5)*p.spread,p.baseY,p.oz+(Math.random()-.5)*p.spread);
      p.life=p.maxLife;p.mesh.material.opacity=.25;}
    p.mesh.position.y+=p.vy*dt;p.mesh.position.x+=p.vx*dt;
    p.mesh.material.opacity=Math.max(0,(p.life/p.maxLife)*.25);
    p.mesh.scale.setScalar(.8+((p.maxLife-p.life)/p.maxLife)*1.5);
  }
  for(let i=debrisParticles.length-1;i>=0;i--){
    const p=debrisParticles[i];
    if(p.mesh.position.y>p.ground){p.vy-=12*dt;p.mesh.position.y+=p.vy*dt;
      p.mesh.position.x+=p.vx*dt;p.mesh.position.z+=p.vz*dt;
      p.mesh.rotation.x+=p.ry*dt;p.mesh.rotation.z+=p.ry*dt*.7;
    }else{p.mesh.position.y=p.ground;p.life-=dt;
      if(p.life<=0){ch2Scene.remove(p.mesh);debrisParticles.splice(i,1);}}
  }
}

function updateGuards(dt){
  if(ch2State!=='FLOOR222_COMBAT'&&ch2State!=='CH3_GUARDS')return;
  ch2ShootCD=Math.max(0,ch2ShootCD-dt);
  guardList.forEach(g=>{if(!g.alive)return;
    const dx=ch2P.x-g.x,dz=ch2P.z-g.z,dist=Math.sqrt(dx*dx+dz*dz);
    g.mesh.rotation.y=Math.atan2(dx,dz);g.atkT-=dt;
    if(g.atkT<=0&&dist<25){g.atkT=1.2+Math.random()*.8;
      const ang=Math.atan2(dx,dz),spd=12;
      const pm=new THREE.Mesh(new THREE.SphereGeometry(.12,4,4),new THREE.MeshBasicMaterial({color:0xff0000}));
      pm.position.set(g.x,1.5,g.z);ch2Scene.add(pm);
      projectiles.push({mesh:pm,vx:Math.sin(ang)*spd,vz:Math.cos(ang)*spd,vy:0,life:3,friendly:false,dmg:8+Math.random()*5});
      sfxLaser();}
  });
}
function updateProjectiles(dt){
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    p.mesh.position.x+=p.vx*dt;p.mesh.position.z+=p.vz*dt;p.mesh.position.y+=p.vy*dt;p.life-=dt;
    if(p.life<=0){ch2Scene.remove(p.mesh);projectiles.splice(i,1);continue;}
    if(!p.friendly){const dx=p.mesh.position.x-ch2P.x,dz=p.mesh.position.z-ch2P.z;
      if(dx*dx+dz*dz<1){ch2P.hp-=p.dmg;flash('#ff0000',100);sfx('punch');
        ch2Scene.remove(p.mesh);projectiles.splice(i,1);if(ch2P.hp<=0)ch2P.hp=10;updBUI();continue;}}
    if(p.friendly){
      guardList.forEach(g=>{if(!g.alive)return;const dx=p.mesh.position.x-g.x,dz=p.mesh.position.z-g.z;
        if(dx*dx+dz*dz<1.5){g.hp-=25+Math.random()*15;
          if(g.hp<=0){g.alive=false;g.mesh.rotation.x=Math.PI/2;g.mesh.position.y=.3;floorGuardsAlive--;sfx('crash');
            if(floorGuardsAlive===1&&!lastGuardTalked&&!ch3Active){lastGuardTalked=true;
              const lg=guardList.find(gg=>gg.alive);if(lg){lg.mesh.userData={name:'Last Guard',dialogue:[
                {speaker:'Last Guard',text:"*drops weapon* WAIT! Please! I got kids!"},
                {speaker:'Last Guard',text:"AJ doesn't pay us enough for THIS! He's in his office! Just go!"},
                {speaker:'Carl',text:"Smart choice. Stay down."},
                {speaker:'Last Guard',text:"*slides against wall* Thank you..."}
              ]};ch2Npcs.push({mesh:lg.mesh,x:lg.x,z:lg.z,radius:3,id:'lastguard'});}}
            if(floorGuardsAlive<=0){if(ch3Active){ch2Fight=false;ch2State='CH3_POST_GUARDS';
              showSub('CLEAR','All guards eliminated. Find the core.',3000);
              ch2Npcs.push({mesh:null,x:0,z:-178,radius:3,id:'ch3_core_enter',name:'Core Room'});
            }else{ch2Cols=ch2Cols.filter(c=>!(Math.abs((c.x1+c.x2)/2)<3&&Math.abs((c.z1+c.z2)/2+170)<1));
              ch2State='AJ_APPROACH';setLoc('AJ\'S OFFICE');}}}
          ch2Scene.remove(p.mesh);projectiles.splice(i,1);}});
      if(ajMesh&&ajFight){const dx=p.mesh.position.x-ajMesh.position.x,dz=p.mesh.position.z-ajMesh.position.z,dy=p.mesh.position.y-ajMesh.position.y;
        if(dx*dx+dz*dz+dy*dy<4){ajHP-=15+Math.random()*10;sfx('punch');flash();
          ch2Scene.remove(p.mesh);projectiles.splice(i,1);checkAJPhase();}}
      // Ch4 zombie hits
      if(ch4){let hit=false;
        for(let zi=ch4Zombies.length-1;zi>=0;zi--){const z=ch4Zombies[zi];if(!z.alive||hit)continue;
          const dx=p.mesh.position.x-z.x,dz=p.mesh.position.z-z.z;
          if(dx*dx+dz*dz<1.5){z.hp-=25+Math.random()*15;sfx('punch');
            if(z.hp<=0){z.alive=false;z.mesh.rotation.x=Math.PI/2;z.mesh.position.y=.3;sfx('crash');
              showSub('KILLED','*Zombie eliminated!*',2000);}
            ch2Scene.remove(p.mesh);projectiles.splice(i,1);hit=true;}}
        if(!hit){for(let ei=ch4ForestEnemies.length-1;ei>=0;ei--){const e=ch4ForestEnemies[ei];if(!e.alive||hit)continue;
          const dx=p.mesh.position.x-e.x,dz=p.mesh.position.z-e.z;
          if(dx*dx+dz*dz<1.5){e.hp-=25+Math.random()*15;sfx('punch');
            if(e.hp<=0){e.alive=false;e.mesh.rotation.x=Math.PI/2;e.mesh.position.y=.3;sfx('crash');
              spawnDebris(e.x,1.5,e.z,5);}
            ch2Scene.remove(p.mesh);projectiles.splice(i,1);hit=true;}}}
      }}
  }
}

function buildHelicopter(bodyColor,mil){
  const g=new THREE.Group();
  const mat=new THREE.MeshLambertMaterial({color:bodyColor});
  const dk=new THREE.MeshLambertMaterial({color:0x333333});
  const gl=new THREE.MeshBasicMaterial({color:0x88ccff,transparent:true,opacity:.4});
  // Fuselage body
  g.add(new THREE.Mesh(new THREE.BoxGeometry(1.8,1.4,4.5),mat));
  // Nose cone
  const nose=new THREE.Mesh(new THREE.ConeGeometry(.7,2.2,6),mat);nose.rotation.x=Math.PI/2;nose.position.z=3.3;g.add(nose);
  // Cockpit windshield bubble
  const ck=new THREE.Mesh(new THREE.SphereGeometry(.7,8,6,0,Math.PI*2,0,Math.PI/2),gl);ck.position.set(0,.5,2);g.add(ck);
  // Windshield frame
  const wf=new THREE.Mesh(new THREE.BoxGeometry(.04,.8,.04),dk);wf.position.set(0,.5,2.5);g.add(wf);
  const wf2=new THREE.Mesh(new THREE.BoxGeometry(.04,.04,.6),dk);wf2.position.set(0,.9,2.2);g.add(wf2);
  // Side windows with frames
  [-.91,.91].forEach(ox=>{
    const w=new THREE.Mesh(new THREE.BoxGeometry(.02,.45,.9),gl);w.position.set(ox,.2,.5);g.add(w);
    const f=new THREE.Mesh(new THREE.BoxGeometry(.03,.5,.03),dk);f.position.set(ox,.2,0);g.add(f);
    const f2=new THREE.Mesh(new THREE.BoxGeometry(.03,.5,.03),dk);f2.position.set(ox,.2,1);g.add(f2);
  });
  // Tail boom
  const tb=new THREE.Mesh(new THREE.BoxGeometry(.3,.3,4.5),mat);tb.position.set(0,0,-4.8);g.add(tb);
  // Tail vertical fin
  const vf=new THREE.Mesh(new THREE.BoxGeometry(.08,1.8,1),mat);vf.position.set(0,.7,-6.8);g.add(vf);
  // Tail horizontal stabilizers
  const hf=new THREE.Mesh(new THREE.BoxGeometry(1.8,.06,.7),mat);hf.position.set(0,.15,-6.8);g.add(hf);
  // Rotor mast
  const ms=new THREE.Mesh(new THREE.CylinderGeometry(.08,.08,.5,6),dk);ms.position.set(0,1,0);g.add(ms);
  // Main rotor - 4 blades
  const mr=new THREE.Group();
  for(let i=0;i<4;i++){const bl=new THREE.Mesh(new THREE.BoxGeometry(6.5,.03,.22),dk);bl.rotation.y=i*Math.PI/2;mr.add(bl);}
  mr.position.y=1.3;g.add(mr);
  // Tail rotor - 3 blades
  const tr=new THREE.Group();
  for(let i=0;i<3;i++){const b=new THREE.Mesh(new THREE.BoxGeometry(.03,.8,.1),dk);b.rotation.z=i*(Math.PI*2/3);tr.add(b);}
  tr.position.set(.2,.5,-6.8);g.add(tr);
  // Landing skids with struts and cross-bars
  [-.65,.65].forEach(ox=>{
    const skid=new THREE.Mesh(new THREE.BoxGeometry(.05,.05,3.2),dk);skid.position.set(ox,-1.05,0);g.add(skid);
    const s1=new THREE.Mesh(new THREE.BoxGeometry(.04,.65,.04),dk);s1.position.set(ox,-.72,.9);g.add(s1);
    const s2=new THREE.Mesh(new THREE.BoxGeometry(.04,.65,.04),dk);s2.position.set(ox,-.72,-.7);g.add(s2);
    const cs=new THREE.Mesh(new THREE.BoxGeometry(.04,.04,1.6),dk);cs.position.set(ox,-.4,.1);g.add(cs);
  });
  // Engine housing
  const en=new THREE.Mesh(new THREE.CylinderGeometry(.3,.3,.7,6),new THREE.MeshLambertMaterial({color:0x555555}));
  en.position.set(0,.85,-.3);g.add(en);
  // Exhaust pipe
  const ex=new THREE.Mesh(new THREE.CylinderGeometry(.08,.1,.3,6),dk);ex.rotation.x=Math.PI/4;ex.position.set(0,.6,-1.5);g.add(ex);
  // Side doors (open)
  [-.95,.95].forEach(ox=>{
    const d=new THREE.Mesh(new THREE.BoxGeometry(.03,.75,1),mat);d.position.set(ox+(ox>0?.3:-.3),.1,.3);g.add(d);
  });
  // Interior seat visible through doors
  const seat=new THREE.Mesh(new THREE.BoxGeometry(1,.15,.4),dk);seat.position.set(0,-.15,-.5);g.add(seat);
  const seatB=new THREE.Mesh(new THREE.BoxGeometry(1,.5,.06),dk);seatB.position.set(0,.1,-.7);g.add(seatB);
  if(mil){
    // Weapon pods on pylons with missiles
    [[-1.3,-.5,.3],[1.3,-.5,.3]].forEach(([px,py,pz])=>{
      const pylon=new THREE.Mesh(new THREE.BoxGeometry(.06,.3,.04),dk);pylon.position.set(px,py+.15,pz);g.add(pylon);
      const pod=new THREE.Mesh(new THREE.BoxGeometry(.25,.18,1.1),dk);pod.position.set(px,py,pz);g.add(pod);
      const m1=new THREE.Mesh(new THREE.CylinderGeometry(.03,.03,.5,4),new THREE.MeshLambertMaterial({color:0x666666}));
      m1.rotation.x=Math.PI/2;m1.position.set(px-.08,py-.12,pz+.1);g.add(m1);
      const m2=new THREE.Mesh(new THREE.CylinderGeometry(.03,.03,.5,4),new THREE.MeshLambertMaterial({color:0x666666}));
      m2.rotation.x=Math.PI/2;m2.position.set(px+.08,py-.12,pz+.1);g.add(m2);
    });
    // Antenna
    const ant=new THREE.Mesh(new THREE.BoxGeometry(.02,.5,.02),dk);ant.position.set(0,2.1,-1);g.add(ant);
    // Spotlight
    const spot=new THREE.Mesh(new THREE.CylinderGeometry(.08,.12,.15,6),new THREE.MeshBasicMaterial({color:0xffffcc}));
    spot.position.set(0,-.8,1.5);g.add(spot);
  }
  return {group:g,mr:mr,tr:tr};
}

function buildCasinoShip(){
  const g=new THREE.Group();
  const gld=new THREE.MeshLambertMaterial({color:0xddaa00});
  const dgld=new THREE.MeshLambertMaterial({color:0xbb8800});
  const dk=new THREE.MeshLambertMaterial({color:0x555555});
  // Hull
  g.add(new THREE.Mesh(new THREE.BoxGeometry(4,2,8),gld));
  // Tapered front
  const fr=new THREE.Mesh(new THREE.ConeGeometry(1.5,3,4),gld);fr.rotation.x=Math.PI/2;fr.position.z=5.5;g.add(fr);
  // Deck structure
  const deck=new THREE.Mesh(new THREE.BoxGeometry(3,1.5,6),dgld);deck.position.y=1.5;g.add(deck);
  // Bridge tower
  const br=new THREE.Mesh(new THREE.BoxGeometry(2,1.2,2),new THREE.MeshLambertMaterial({color:0xaa7700}));br.position.set(0,2.8,-1);g.add(br);
  // Bridge windows (red glow)
  const bw=new THREE.Mesh(new THREE.BoxGeometry(2.1,.4,.05),new THREE.MeshBasicMaterial({color:0xff4400,transparent:true,opacity:.6}));bw.position.set(0,2.8,.02);g.add(bw);
  // Golden card symbols on sides
  [[-2.01,0],[2.01,0]].forEach(([sx,sz])=>{
    const sym=new THREE.Mesh(new THREE.BoxGeometry(.05,.8,.8),new THREE.MeshBasicMaterial({color:0xffd700}));sym.position.set(sx,1.5,sz);g.add(sym);
  });
  // Engine glow underneath
  [[-1.2,-2],[1.2,-2]].forEach(([ex,ez])=>{
    const eng=new THREE.Mesh(new THREE.CylinderGeometry(.4,.5,.6,6),new THREE.MeshBasicMaterial({color:0xff6600,transparent:true,opacity:.7}));eng.position.set(ex,-1.3,ez);g.add(eng);
  });
  // Weapon turret
  const tBase=new THREE.Mesh(new THREE.CylinderGeometry(.3,.4,.4,6),dk);tBase.position.set(0,2.5,3);g.add(tBase);
  const barrel=new THREE.Mesh(new THREE.BoxGeometry(.12,.12,2.5),dk);barrel.position.set(0,2.5,4.5);g.add(barrel);
  // Railing
  for(let i=-2;i<=2;i++){
    const p1=new THREE.Mesh(new THREE.BoxGeometry(.04,.5,.04),dgld);p1.position.set(1.45,2.5,i*1.2);g.add(p1);
    const p2=new THREE.Mesh(new THREE.BoxGeometry(.04,.5,.04),dgld);p2.position.set(-1.45,2.5,i*1.2);g.add(p2);
  }
  const rl=new THREE.Mesh(new THREE.BoxGeometry(.03,.03,5),dgld);rl.position.set(1.45,2.75,0);g.add(rl);
  const rl2=new THREE.Mesh(new THREE.BoxGeometry(.03,.03,5),dgld);rl2.position.set(-1.45,2.75,0);g.add(rl2);
  return g;
}

function ch3HelicopterSeq(){
  if(ch2State!=='CH3_RUBBLE')return;
  ch3HeliPhase=1;
  const h1=buildHelicopter(0x336633,false);
  ch3Heli1=h1.group;ch3Heli1MR=h1.mr;ch3Heli1TR=h1.tr;
  ch3Heli1.position.set(60,30,30);ch3Heli1.scale.set(2,2,2);
  ch2Scene.add(ch3Heli1);
  showSub('','*helicopter rotors in the distance*',3000);sfx('engine');
  let h1T=0;
  const h1I=setInterval(()=>{h1T+=.02;
    ch3Heli1.position.x=60-h1T*15;ch3Heli1.position.z=30-h1T*5;ch3Heli1.rotation.y=.3;
    if(h1T>8){clearInterval(h1I);ch2Scene.remove(ch3Heli1);ch3Heli1=null;ch3Heli1MR=null;ch3Heli1TR=null;
      setTimeout(()=>ch3Heli2Arrive(),3000);}
  },30);
}
function ch3Heli2Arrive(){
  if(ch2State!=='CH3_RUBBLE')return;
  ch3HeliPhase=2;
  const h2=buildHelicopter(0x335533,true);
  ch3Heli2=h2.group;ch3Heli2MR=h2.mr;ch3Heli2TR=h2.tr;
  ch3Heli2.position.set(-40,35,-20);ch3Heli2.scale.set(2.5,2.5,2.5);
  ch2Scene.add(ch3Heli2);sfx('engine');
  showSub('RESCUE HELICOPTER','*ATTENTION! THIS IS THE MILITARY! WE ARE LANDING FOR EVACUATION!*',5000);
  let h2T=0;
  const h2I=setInterval(()=>{h2T+=.02;
    ch3Heli2.position.y=35-h2T*2;ch3Heli2.position.x=-40+h2T*4;
    if(ch3Heli2.position.y<18)ch3Heli2.position.y=18;
    if(h2T>6){clearInterval(h2I);setTimeout(()=>ch3CasinoShipAttack(),2000);}
  },30);
}
function ch3CasinoShipAttack(){
  ch3HeliPhase=3;
  const ship=buildCasinoShip();ch3Ship=ship;
  ship.position.set(50,25,-100);ship.scale.set(2,2,2);ship.rotation.y=Math.PI/2;
  ch2Scene.add(ship);
  showSub('???','*A golden shape emerges from the smoke...*',3000);sfx('crash');
  ch2ZL(0xffd700,.6,50,25,-100,25);
  let sT=0;
  const sI=setInterval(()=>{sT+=.02;
    ship.position.x=50-sT*8;ship.position.z=-100+sT*8;ship.rotation.y=Math.PI/2+sT*.1;
    if(sT>4){clearInterval(sI);
      sfxExplosion();flash('#ffd700',300);
      showSub('CASINO SHIP','*The ship fires at the rescue helicopter!*',3000);
      const proj=new THREE.Mesh(new THREE.SphereGeometry(.5,6,6),new THREE.MeshBasicMaterial({color:0xffd700}));
      proj.position.copy(ship.position);proj.position.y+=5;ch2Scene.add(proj);
      let pT=0;
      const pI=setInterval(()=>{pT+=.03;
        if(ch3Heli2){proj.position.lerp(ch3Heli2.position,.1);
          if(pT>2){clearInterval(pI);ch2Scene.remove(proj);ch3HeliCrash();}}
        else{clearInterval(pI);ch2Scene.remove(proj);}
      },30);
    }
  },30);
}
function ch3HeliCrash(){
  if(!ch3Heli2)return;
  sfxExplosion();sfxCollapse();flash('#ff4400',500);
  showSub('CRASH','*The helicopter is hit! It\'s going down!*',4000);
  const crashX=ch3Heli2.position.x,crashZ=ch3Heli2.position.z;
  let cT=0;
  const cI=setInterval(()=>{cT+=.02;
    if(ch3Heli2){ch3Heli2.position.y-=cT*2;ch3Heli2.rotation.z+=.05;ch3Heli2.rotation.x+=.02;
      if(ch3Heli2.position.y<=0){clearInterval(cI);
        sfxExplosion();sfxCollapse();flash('#ff8800',400);
        spawnFire(crashX,0,crashZ,20,6);spawnSmoke(crashX,3,crashZ,15,10);
        spawnDebris(crashX,5,crashZ,15);ch2ZL(0xff4400,.6,crashX,3,crashZ,15);
        ch3Heli2MR=null;ch3Heli2TR=null;
        if(ch3Ship){let rT=0;const rI=setInterval(()=>{rT+=.02;
          ch3Ship.position.x-=2;ch3Ship.position.y+=.5;
          if(rT>4){clearInterval(rI);ch2Scene.remove(ch3Ship);ch3Ship=null;}},30);}
        ch3HeliPhase=0;
      }
    }else{clearInterval(cI);}
  },30);
}

function ch3p2Ship2Event(){
  const ship2=buildCasinoShip();ch3p2Ship2=ship2;
  ship2.position.set(-100,20,-50);ship2.scale.set(3,3,3);
  ch2Scene.add(ship2);
  showSub('SECOND CASINO SHIP','*Another golden ship approaches!*',3000);sfx('engine');
  let sT=0;
  const sI=setInterval(()=>{sT+=.02;
    ship2.position.x=-100+sT*12;ship2.position.y=20-sT*.5;
    if(sT>5){clearInterval(sI);
      showSub('CASINO SHIP','"WE SEE YOU. THIS HOTEL WILL BURN."',4000);sfxAlarm();
      setTimeout(()=>{
        showSub('CHARGING','*The ship\'s weapons glow bright...*',2000);
        const charge=new THREE.Mesh(new THREE.SphereGeometry(1,8,8),new THREE.MeshBasicMaterial({color:0xffd700}));
        charge.position.copy(ship2.position);charge.position.y-=3;ch2Scene.add(charge);
        bobNpcs.push({mesh:charge,baseY:charge.position.y,speed:5,amp:.3});
        setTimeout(()=>{
          sfxExplosion();sfxExplosion();flash('#ff4400',500);
          showSub('ROCKET!','*A rocket streaks across the sky — DIRECT HIT!*',4000);
          ch2Scene.remove(charge);
          spawnFire(ship2.position.x,ship2.position.y,ship2.position.z,20,5);
          spawnDebris(ship2.position.x,ship2.position.y,ship2.position.z,15);
          let cT=0;
          const cI=setInterval(()=>{cT+=.02;
            ship2.position.y-=cT*3;ship2.rotation.z+=.04;ship2.rotation.x+=.02;
            if(ship2.position.y<-35){clearInterval(cI);ch2Scene.remove(ship2);
              sfxCollapse();flash('#ff8800',300);
              spawnFire(ship2.position.x,-30,ship2.position.z,15,8);
              for(let h=0;h<4;h++){
                const heli=buildHelicopter(0x335533,h<2);
                heli.group.position.set(-20+h*15,10+Math.random()*10,-10);heli.group.scale.set(1.5,1.5,1.5);
                ch2Scene.add(heli.group);ch3p2Helis.push(heli);

                  heli.group.position.x+=2;heli.group.position.y+=.3;heli.group.position.z-=1;

// ── Marcus walking / following system ──
function ch4UpdateMarcus(dt){
  if(!ch4Marcus||!ch4MarcusFollowing)return;
  const dx=ch2P.x-ch4Marcus.position.x,dz=ch2P.z-ch4Marcus.position.z;
  const dist=Math.sqrt(dx*dx+dz*dz);
  const limbs=ch4Marcus.userData.limbs;
  if(dist>4){
    ch4Marcus.userData.isWalking=true;
    ch4Marcus.rotation.y=Math.atan2(dx,dz);
    const spd=ch4MarcusWalkSpeed*dt;
    ch4Marcus.position.x+=(dx/dist)*spd;
    ch4Marcus.position.z+=(dz/dist)*spd;
    const npc=ch2Npcs.find(n=>n.id==='ch4_marcus');
    if(npc){npc.x=ch4Marcus.position.x;npc.z=ch4Marcus.position.z;}
    if(limbs){const t=Date.now()*.006;
      limbs.ll.rotation.x=Math.sin(t)*.5;limbs.rl.rotation.x=Math.sin(t+Math.PI)*.5;
      limbs.la.rotation.x=Math.sin(t+Math.PI)*.4;limbs.ra.rotation.x=Math.sin(t)*.4;}
  }else{
    ch4Marcus.userData.isWalking=false;
    ch4Marcus.rotation.y=Math.atan2(dx,dz);
    if(limbs){limbs.ll.rotation.x*=.9;limbs.rl.rotation.x*=.9;limbs.la.rotation.x*=.9;limbs.ra.rotation.x*=.9;}
  }
}

// ── Zombie AI update ──
function ch4UpdateZombies(dt){
  for(let zi=ch4Zombies.length-1;zi>=0;zi--){
    const z=ch4Zombies[zi];if(!z.alive)continue;
    const dx=ch2P.x-z.x,dz=ch2P.z-z.z,dist=Math.sqrt(dx*dx+dz*dz);
    z.mesh.rotation.y=Math.atan2(dx,dz);
    if(dist>1.5){const spd=z.speed*dt;
      z.x+=(dx/dist)*spd;z.z+=(dz/dist)*spd;
      z.mesh.position.x=z.x;z.mesh.position.z=z.z;
      const t=Date.now()*.004;const limbs=z.mesh.userData.limbs;
      if(limbs){limbs.ll.rotation.x=Math.sin(t)*.3;limbs.rl.rotation.x=Math.sin(t+Math.PI)*.3;}}
    z.atkT-=dt;
    if(dist<2&&z.atkT<=0){z.atkT=1.5;ch2P.hp-=10+Math.random()*8|0;flash('#00ff00',150);sfx('punch');updBUI();}
    z.growlT-=dt;
    if(z.growlT<=0){z.growlT=4+Math.random()*5;sfxZombieGrowl();}
  }
}

function ch4SlasherClimb(){
  if(!ch4Slasher)return;
  const startPos={x:ch4Slasher.position.x,y:ch4Slasher.position.y,z:ch4Slasher.position.z};
  const endPos={x:startPos.x+5,y:startPos.y+8,z:startPos.z+10};
  let climbT=0;const limbs=ch4Slasher.userData.limbs;
  const climbI=setInterval(()=>{climbT+=.03;const p=Math.min(climbT/4,1);
    ch4Slasher.position.x=startPos.x+(endPos.x-startPos.x)*p;
    ch4Slasher.position.y=startPos.y+(endPos.y-startPos.y)*p;
    ch4Slasher.position.z=startPos.z+(endPos.z-startPos.z)*p;
    if(limbs){const t=climbT*8;
      limbs.la.rotation.x=Math.sin(t)*.8-.5;limbs.ra.rotation.x=Math.sin(t+Math.PI)*.8-.5;
      limbs.ll.rotation.x=Math.sin(t+Math.PI)*.6;limbs.rl.rotation.x=Math.sin(t)*.6;}
    if(p>=1){clearInterval(climbI);
      ch2Scene.remove(ch4Slasher);ch4Slasher=null;
      showSub('','*The Card Slasher disappears over the ledge.*',3000);}
  },30);
}

// ── Ch5 Update Marcus follow ──
function ch5UpdateMarcus(dt){
  if(!ch5Marcus||!ch5MarcusFollowing)return;
  const dx=ch2P.x-ch5Marcus.position.x,dz=ch2P.z-ch5Marcus.position.z;
  const dist=Math.sqrt(dx*dx+dz*dz);
  ch5Marcus.rotation.y=Math.atan2(dx,dz);
  if(dist>3.5){
    const spd=ch5MarcusWalkSpeed*dt;
    ch5Marcus.position.x+=dx/dist*spd;ch5Marcus.position.z+=dz/dist*spd;
    const t=Date.now()*.006;
    if(ch5Marcus.userData.limbs){
      ch5Marcus.userData.limbs.ll.rotation.x=Math.sin(t)*.5;
      ch5Marcus.userData.limbs.rl.rotation.x=-Math.sin(t)*.5;
      ch5Marcus.userData.limbs.la.rotation.x=-Math.sin(t)*.3;
      ch5Marcus.userData.limbs.ra.rotation.x=Math.sin(t)*.3;
    }
  }else{
    if(ch5Marcus.userData.limbs){
      ch5Marcus.userData.limbs.ll.rotation.x*=.9;ch5Marcus.userData.limbs.rl.rotation.x*=.9;
      ch5Marcus.userData.limbs.la.rotation.x*=.9;ch5Marcus.userData.limbs.ra.rotation.x*=.9;
    }
  }
  // Update NPC tracking
  ch2Npcs.forEach(n=>{if(n.mesh===ch5Marcus){n.x=ch5Marcus.position.x;n.z=ch5Marcus.position.z;}});
}

// ── CARD SLASHER vs AJ FIGHT ──
function ch5FightSequence(){
  sfxSwordClash();flash('#ff4400',150);
  showSub('BETRAYAL!','Card Slasher attacks AJ!',2000);

  // Cinematic fight — timed sequence
  let fightPhase=0;
  const fightInt=setInterval(()=>{
    fightPhase++;

    if(fightPhase===1){
      // Slasher lunges
      sfxSwordClash();
      ch5CardSlasher.position.z=ch5AJ.position.z-.5;
      ch5CardSlasher.rotation.y=0;
      spawnDebris(0,2,6,2);
    }
    if(fightPhase===3){
      // AJ blocks
      sfx('punch');flash('#ff0000',80);
      if(ch2Cam)ch2Cam.rotation.z=(Math.random()-.5)*.04;
    }
    if(fightPhase===5){
      // Exchange blows
      sfxSwordClash();sfxSwordClash();
      spawnDebris(-1,2.5,6,3);
      ch5CardSlasher.position.x=-1;ch5AJ.position.x=1;
    }
    if(fightPhase===7){
      // AJ counters hard
      sfx('crash');flash('#ff2200',150);
      ch5CardSlasher.position.x=.5;
      if(ch2Cam)ch2Cam.rotation.z=(Math.random()-.5)*.06;
      setTimeout(()=>{if(ch2Cam)ch2Cam.rotation.z=0;},100);
    }
    if(fightPhase===8){
      // Wall cracks
      sfxBreaking();
      const crack=new THREE.Mesh(new THREE.BoxGeometry(.1,1.5,.1),new THREE.MeshLambertMaterial({color:0x444444}));
      crack.position.set(4.8,2,3);ch2Scene.add(crack);
      spawnDebris(4.5,2.5,3,3);
    }
    if(fightPhase===10){
      // Slasher dodges, throws card
      sfxSwordClash();
      ch5CardSlasher.position.x=-2;ch5CardSlasher.position.z=6.5;
      ch5AJ.position.x=0;
    }
    if(fightPhase===12){
      // AJ smashes ground
      sfx('crash');sfxExplosion();flash('#ffaa00',200);
      if(ch2Cam)ch2Cam.rotation.z=(Math.random()-.5)*.08;
      setTimeout(()=>{if(ch2Cam)ch2Cam.rotation.z=0;},120);
      spawnDebris(0,1,6,5);spawnDebris(2,2,5,3);
      // Floor cracks
      const floorCrack=new THREE.Mesh(new THREE.BoxGeometry(2,.02,1.5),new THREE.MeshLambertMaterial({color:0x444444}));
      floorCrack.position.set(0,.01,6);ch2Scene.add(floorCrack);
    }
    if(fightPhase===14){
      // Intense exchange
      sfxSwordClash();sfx('punch');
      ch5CardSlasher.position.set(1,0,7);ch5AJ.position.set(-1,0,6);
      spawnDebris(0,3,6.5,4);
    }
    if(fightPhase===16){
      clearInterval(fightInt);if(ch2Cam)ch2Cam.rotation.z=0;

      startDlg([
        {speaker:'Card Slasher',text:"*panting* You're strong... but you're not invincible!"},
        {speaker:'AJ',text:"*laughing* You think a CARD can stop me?! I'LL DESTROY YOU!"},
        {speaker:'SYSTEM',text:"*AJ charges forward — the Card Slasher dodges. The wall EXPLODES outward!*"},
        {speaker:'SYSTEM',text:"*Fire erupts from broken fuel lines in the hull! The ship is catching fire!*"},
        {speaker:'Card Slasher',text:"*to Carl* GO! GET MARCUS AND RUN! I'LL HOLD HIM OFF!"},
        {speaker:'Carl',text:"*grabs Marcus* Come on! We're getting out of here!"},
        {speaker:'Marcus',text:"*groans* ...can't... feel my legs..."},
        {speaker:'Carl',text:"I'll carry you if I have to. MOVE!"}
      ],()=>{
        ch3Cinematic=false;
        ch5Phase='CH5_SHIP_FIRE';
        ch5MarcusFollowing=true;
        // Transition to burning ship corridor
        blackout(true);
        setTimeout(()=>{
          buildCh5ShipFire();blackout(false);
        },1500);
      });
    }
  },400);
}

    {speaker:'Carl',text:"Weapons, documents... they were planning something big."},
    {speaker:'Marcus',text:"*notices the bomb* Carl — LOOK. That's a Casino Lucky Bomb."},
    {speaker:'Carl',text:"A what?"},
    {speaker:'Marcus',text:"Explosive device. Casino tech. Pick it up — we can use it to blast our way out."},
    {speaker:'SYSTEM',text:"*Search the room. Read the documents. Pick up the bomb. Place it on the weak wall.*"}
  ]);
}

// ── Lore documents interaction ──
function ch5ReadDocs(){
  startDlg([
    {speaker:'SYSTEM',text:"*Carl reads the scattered documents...*"},
    {speaker:'SYSTEM',text:"*\"OPERATION: GOLDEN GATE — Phase 3 deployment. Portal generator at 80% capacity.\"*"},
    {speaker:'SYSTEM',text:"*\"Target: Black Forest Military Bunker. Estimated resistance: 200 personnel.\"*"},
    {speaker:'SYSTEM',text:"*\"Casino Master directive: Complete portal by 0600. No survivors.\"*"},
    {speaker:'Carl',text:"*hands shaking* ...they're going to wipe out the entire bunker."},
    {speaker:'Marcus',text:"We have to warn them, Carl. If that portal opens above the bunker..."},
    {speaker:'Carl',text:"Then we better move fast. Let's blow this place and go."}

// ── Pick up bomb ──
function ch5PickupBomb(){
  sfx('jackpot');flash('#ff4400',200);
  ch5BombPlaced=false;

  startDlg([
    {speaker:'SYSTEM',text:"*Casino Lucky Bomb acquired!*"},
    {speaker:'Carl',text:"*examines it* Heavy. Looks powerful enough."},
    {speaker:'Marcus',text:"Place it on that cracked wall. Should blast right through."},
    {speaker:'SYSTEM',text:"*Go to the cracked wall and press E to place the bomb.*"}
  ]);
}

// ── Place bomb ──
function ch5PlaceBomb(){
  if(ch5BombPlaced)return;
  ch5BombPlaced=true;
  sfxBombBeep();

  // Place bomb visually
  const placedBomb=new THREE.Mesh(new THREE.CylinderGeometry(.2,.2,.3,8),new THREE.MeshLambertMaterial({color:0x222222}));
  placedBomb.position.set(0,.5,2.7);ch2Scene.add(placedBomb);
  const bombLight=new THREE.PointLight(0xff0000,.5,5);bombLight.position.set(0,.8,2.7);ch2Scene.add(bombLight);

  // Beeping
  let beeps=0;
  const beepInt=setInterval(()=>{
    sfxBombBeep();flash('#ff0000',50);
    bombLight.visible=!bombLight.visible;
    beeps++;
    if(beeps>8){
      clearInterval(beepInt);
    }
  },400);

  startDlg([
    {speaker:'SYSTEM',text:"*Carl places the Casino Lucky Bomb on the wall.*"},
    {speaker:'Carl',text:"*steps back* It's set. We need to RUN."},
    {speaker:'Marcus',text:"How long do we have?!"},
    {speaker:'Carl',text:"Not long enough! MOVE!"}
  ],()=>{
    // Explosion after short delay
    setTimeout(()=>{
      sfxExplosion();sfxExplosion();flash('#ffaa00',600);
      // Massive shake
      let si=0;
      const shk=setInterval(()=>{if(ch2Cam)ch2Cam.rotation.z=(Math.random()-.5)*.1;si++;
        if(si>15){clearInterval(shk);if(ch2Cam)ch2Cam.rotation.z=0;}},80);

      showSub('BOOM!','*THE OUTPOST EXPLODES!*',3000);

      blackout(true);
      setTimeout(()=>{
        ch5Phase='CH5_FOREST_TREK';
        buildCh5ForestTrek();blackout(false);
      },3000);
    },2000);
  });
}

// ═══════════════════════════════════════════
// FOREST TREK TO BUNKER
// ═══════════════════════════════════════════
function buildCh5ForestTrek(){
  ch5ClearScene();ch5ForestBuilt=true;
  ch2Scene.fog=new THREE.FogExp2(0x223322,.012);ch2Scene.background=new THREE.Color(0x334433);
  ch2Scene.children=[];
  ch2Scene.add(new THREE.AmbientLight(0x88aa77,.5));
  const sun=new THREE.DirectionalLight(0xffeedd,.4);sun.position.set(-5,25,10);ch2Scene.add(sun);

  const groundM=new THREE.MeshLambertMaterial({color:0x3a4a2a});
  const treeM=new THREE.MeshLambertMaterial({color:0x443322});
  const leafM=new THREE.MeshLambertMaterial({color:0x336633});
  const pathM=new THREE.MeshLambertMaterial({color:0x4a3a2a});
  const rockM=new THREE.MeshLambertMaterial({color:0x666655});

  // Ground
  ch2B(80,.2,250,groundM,0,-.1,-100);

  // Path through forest
  ch2B(3,.05,250,pathM,0,0,-100);

  // === Section 1: Post-explosion area (z=0 to z=-40) ===
  // Outpost remains visible behind (burning)
  for(let i=0;i<5;i++){
    const fx=5+Math.random()*10,fz=5+Math.random()*5;
    spawnFire(fx,1,fz);spawnSmoke(fx,3,fz);
  }
  // Fireball in background
  const fireball=new THREE.Mesh(new THREE.SphereGeometry(3,8,8),new THREE.MeshBasicMaterial({color:0xff4400,transparent:true,opacity:.4}));
  fireball.position.set(10,4,10);ch2Scene.add(fireball);

  // Trees along path
  for(let z=0;z>-40;z-=6){
    for(let side=-1;side<=1;side+=2){
      const tx=side*(4+Math.random()*8);
      const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.2,.3,4+Math.random()*2,6),treeM);
      trunk.position.set(tx,2,z+Math.random()*3);ch2Scene.add(trunk);
      const canopy=new THREE.Mesh(new THREE.SphereGeometry(1.5+Math.random(),6,6),leafM);
      canopy.position.set(tx,5+Math.random(),z+Math.random()*3);ch2Scene.add(canopy);
      ch2Cols.push({x1:tx-.3,z1:z-.3,x2:tx+.3,z2:z+.3});
    }
  }

  // === Section 2: Rocky area with scouts (z=-40 to z=-90) ===
  // Rock formations
  for(let i=0;i<6;i++){
    const rx=-8+Math.random()*16,rz=-45-Math.random()*40;
    if(Math.abs(rx)<2.5)continue;
    const rock=new THREE.Mesh(new THREE.DodecahedronGeometry(.8+Math.random(),0),rockM);
    rock.position.set(rx,.5,rz);ch2Scene.add(rock);
    ch2Cols.push({x1:rx-1,z1:rz-1,x2:rx+1,z2:rz+1});
  }

  // Military scouts (friendly NPCs)
  const scout1=ch4BuildRiggedPerson(-3,0,-55,M.skin,
    new THREE.MeshLambertMaterial({color:0x335533}),
    new THREE.MeshLambertMaterial({color:0x335533}),null,0);
  scout1.userData.dialogue=[
    {speaker:'Scout',text:"*startled* Whoa! Don't shoot! We're friendlies!"},
    {speaker:'Scout',text:"We're from the Black Forest Bunker. Patrol unit."},
    {speaker:'Carl',text:"The bunker — we need to get there. Now."},
    {speaker:'Scout',text:"Follow the path south. Main gate is about a klick out."},
    {speaker:'Scout',text:"But be careful — we've been seeing Casino patrols in the area."}
  ];
  scout1.userData.name='Military Scout';
  ch2Npcs.push({id:'ch5_scout1',x:-3,z:-55,radius:3,mesh:scout1});
  ch5ForestScouts.push(scout1);

  const scout2=ch4BuildRiggedPerson(4,0,-70,M.skin,
    new THREE.MeshLambertMaterial({color:0x335533}),
    new THREE.MeshLambertMaterial({color:0x335533}),null,Math.PI);
  scout2.userData.dialogue=[
    {speaker:'Scout 2',text:"You look like you've been through hell."},
    {speaker:'Carl',text:"You have no idea. The Casino forces — they're coming for the bunker."},
    {speaker:'Scout 2',text:"*alarmed* What?! When?!"},
    {speaker:'Carl',text:"Soon. They have a portal. We need to warn command."},
    {speaker:'Scout 2',text:"Then MOVE! The main gate is just ahead. Tell the Commander!"}
  ];
  scout2.userData.name='Military Scout';
  ch2Npcs.push({id:'ch5_scout2',x:4,z:-70,radius:3,mesh:scout2});
  ch5ForestScouts.push(scout2);

  // === Section 3: Signs of invasion prep (z=-90 to z=-130) ===
  // Tire tracks in the dirt
  for(let z=-90;z>-130;z-=3){
    const track=new THREE.Mesh(new THREE.BoxGeometry(.4,.02,2),new THREE.MeshLambertMaterial({color:0x2a2a1a}));
    track.position.set(5+Math.sin(z*.1)*2,.01,z);ch2Scene.add(track);
  }

  // Abandoned Casino patrol vehicle (destroyed)
  const wreckedCar=new THREE.Mesh(new THREE.BoxGeometry(2,1.2,3.5),new THREE.MeshLambertMaterial({color:0x333333}));
  wreckedCar.position.set(-6,.6,-100);wreckedCar.rotation.z=.15;ch2Scene.add(wreckedCar);
  ch2Cols.push({x1:-7.5,z1:-102,x2:-4.5,z2:-98});
  spawnSmoke(-6,2,-100);

  // Dense trees continue
  for(let z=-90;z>-140;z-=5){
    for(let side=-1;side<=1;side+=2){
      const tx=side*(5+Math.random()*10);
      if(Math.abs(tx)<3)continue;
      const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.2,.35,5+Math.random()*3,6),treeM);
      trunk.position.set(tx,2.5,z);ch2Scene.add(trunk);
      const canopy=new THREE.Mesh(new THREE.SphereGeometry(2+Math.random(),6,6),leafM);
      canopy.position.set(tx,6+Math.random()*2,z);ch2Scene.add(canopy);
      ch2Cols.push({x1:tx-.35,z1:z-.35,x2:tx+.35,z2:z+.35});
    }
  }

  // Forest boundary
  ch2Cols.push({x1:-20,z1:-145,x2:-19,z2:5});
  ch2Cols.push({x1:19,z1:-145,x2:20,z2:5});

  // Exit trigger to Bunker Gate
  ch2Npcs.push({id:'ch5_to_bunker_gate',x:0,z:-138,radius:3,mesh:null});

  // Marcus
  ch5Marcus=ch5BuildMarcusInjured(1,0,1,Math.PI);
  ch5MarcusFollowing=true;ch5MarcusWalkSpeed=3;

  ch2P.x=0;ch2P.y=0;ch2P.z=3;yaw=Math.PI;
  setLoc('FOREST — PATH TO BUNKER');

  startDlg([
    {speaker:'SYSTEM',text:"*The outpost is nothing but fire and rubble behind them.*"},
    {speaker:'Marcus',text:"*breathing hard* ...we did it. We actually did it."},
    {speaker:'Carl',text:"Not yet. We need to reach the Black Forest Bunker. They're in danger."},
    {speaker:'Marcus',text:"Then lead the way. I'm right behind you."},
    {speaker:'SYSTEM',text:"*Follow the path south through the forest to the bunker gate.*"}
  ]);
}

// ═══════════════════════════════════════════
// BLACK FOREST BUNKER — MAIN GATE
// ═══════════════════════════════════════════
function buildCh5BunkerGate(){
  ch5ClearScene();ch5BunkerGateBuilt=true;
  ch2Scene.fog=new THREE.FogExp2(0x222222,.015);ch2Scene.background=new THREE.Color(0x3a4a3a);
  ch2Scene.children=[];
  ch2Scene.add(new THREE.AmbientLight(0x889988,.5));
  const sun=new THREE.DirectionalLight(0xffeedd,.45);sun.position.set(0,25,5);ch2Scene.add(sun);

  const groundM=new THREE.MeshLambertMaterial({color:0x3a4a2a});
  const concreteM=new THREE.MeshLambertMaterial({color:0x666666});
  const metalM=new THREE.MeshLambertMaterial({color:0x555566});
  const darkM=new THREE.MeshLambertMaterial({color:0x333344});
  const gateM=new THREE.MeshLambertMaterial({color:0x444455});

  // Ground
  ch2B(80,.2,80,groundM,0,-.1,-30);

  // === MASSIVE BUNKER GATE ===
  // Concrete walls flanking the gate
  ch2B(15,8,3,concreteM,-17,4,-40);ch2Cols.push({x1:-24.5,z1:-41.5,x2:-9.5,z2:-38.5});
  ch2B(15,8,3,concreteM,17,4,-40);ch2Cols.push({x1:9.5,z1:-41.5,x2:24.5,z2:-38.5});

  // The gate itself — massive metal doors
  ch2B(6,7,.5,gateM,-3,3.5,-40);
  ch2B(6,7,.5,gateM,3,3.5,-40);
  // Gate frame
  ch2B(14,1,.5,darkM,0,7.5,-40,true);
  ch2B(1,8,.5,darkM,-7,4,-40,true);
  ch2B(1,8,.5,darkM,7,4,-40,true);

  // "BLACK FOREST BUNKER" text above gate (represented by a gold sign)
  const signMat=new THREE.MeshLambertMaterial({color:0xffd700});
  const signBg=new THREE.Mesh(new THREE.BoxGeometry(10,1.2,.2),darkM);
  signBg.position.set(0,8.5,-40);ch2Scene.add(signBg);
  const signText=new THREE.Mesh(new THREE.BoxGeometry(9,.8,.05),signMat);
  signText.position.set(0,8.5,-39.85);ch2Scene.add(signText);

  // Spotlights on gate
  const gateLight1=new THREE.PointLight(0xffffff,.6,20);gateLight1.position.set(-5,8,-38);ch2Scene.add(gateLight1);
  const gateLight2=new THREE.PointLight(0xffffff,.6,20);gateLight2.position.set(5,8,-38);ch2Scene.add(gateLight2);

  // Guard towers on each side
  ch2B(4,10,4,concreteM,-28,5,-40);ch2Cols.push({x1:-30,z1:-42,x2:-26,z2:-38});
  ch2B(4,10,4,concreteM,28,5,-40);ch2Cols.push({x1:26,z1:-42,x2:30,z2:-38});

  // Sandbag emplacements
  for(let sx=-15;sx<=15;sx+=10){
    const sandbag=new THREE.Mesh(new THREE.BoxGeometry(3,.8,1.5),new THREE.MeshLambertMaterial({color:0x887744}));
    sandbag.position.set(sx,.4,-30);ch2Scene.add(sandbag);
    ch2Cols.push({x1:sx-1.5,z1:-31,x2:sx+1.5,z2:-29});
  }

  // Military vehicles
  // APC
  const apc=new THREE.Mesh(new THREE.BoxGeometry(3,2,5),new THREE.MeshLambertMaterial({color:0x445544}));
  apc.position.set(-20,1,-25);ch2Scene.add(apc);
  ch2Cols.push({x1:-21.5,z1:-27.5,x2:-18.5,z2:-22.5});
  // Turret on APC
  const turret=new THREE.Mesh(new THREE.CylinderGeometry(.3,.3,1.5,6),metalM);
  turret.position.set(-20,2.5,-25);ch2Scene.add(turret);
  const barrel=new THREE.Mesh(new THREE.CylinderGeometry(.08,.08,2,6),metalM);
  barrel.position.set(-20,2.8,-23.5);barrel.rotation.x=Math.PI/2;ch2Scene.add(barrel);

  // Truck
  const truck=new THREE.Mesh(new THREE.BoxGeometry(2.5,2,4.5),new THREE.MeshLambertMaterial({color:0x445544}));
  truck.position.set(20,1,-20);ch2Scene.add(truck);
  ch2Cols.push({x1:18.5,z1:-22.5,x2:21.5,z2:-17.5});

  // Soldiers (multiple NPCs to talk to)
  // Commander
  const commander=ch4BuildRiggedPerson(0,0,-35,M.skin,
    new THREE.MeshLambertMaterial({color:0x334433}),
    new THREE.MeshLambertMaterial({color:0x334433}),0x333322,0);
  commander.userData.dialogue=[
    {speaker:'Commander Hayes',text:"*turns* Who the hell — you're not one of my men."},
    {speaker:'Carl',text:"Sir — the Casino Master is sending forces HERE. A portal device."},
    {speaker:'Commander Hayes',text:"*narrows eyes* ...how do you know this?"},
    {speaker:'Carl',text:"I was inside their outpost. Read their documents. Operation Golden Gate."},
    {speaker:'Commander Hayes',text:"*goes pale* ...Golden Gate. We've heard rumors. But a portal—"},
    {speaker:'Marcus',text:"*steps forward* It's real, Commander. I've SEEN the portals. They're coming."},
    {speaker:'Commander Hayes',text:"*long pause, then turns to soldiers* ALL UNITS! DEFCON 1! THIS IS NOT A DRILL!"},
    {speaker:'Commander Hayes',text:"*to Carl* You've given us a fighting chance, son. Get inside. Rest. You've earned it."},
    {speaker:'Carl',text:"There's no rest until this is over, Commander."},
    {speaker:'Commander Hayes',text:"*nods slowly* ...then God help us all."}
  ];
  commander.userData.name='Commander Hayes';
  ch2Npcs.push({id:'ch5_commander',x:0,z:-35,radius:3,mesh:commander});

  // Soldiers around the area
  const soldierDialogues=[
    [{speaker:'Soldier',text:"I've never seen the Commander that scared. Must be bad."},{speaker:'Soldier',text:"If you need ammo, check the supply tent. Good luck."}],
    [{speaker:'Soldier',text:"*loading weapon* A portal? Over our bunker? This is insane."},{speaker:'Soldier',text:"We've fought Casino goons before. But this... this is different."}],
    [{speaker:'Soldier',text:"*nervous* My family is in the bunker. If those walls fall..."},{speaker:'Carl',text:"They won't. Not if we can help it."}],
    [{speaker:'Medic',text:"*sees Marcus* Sit down, soldier. You need medical attention."},{speaker:'Marcus',text:"I've had worse. *pauses* Actually, no. This is the worst."},{speaker:'Medic',text:"We'll patch you up. Just hang in there."}]
  ];

  const soldierPositions=[[-12,0,-28],[-8,0,-32],[12,0,-25],[8,0,-33]];
  const soldierNames=['Soldier','Soldier','Soldier','Medic'];
  soldierPositions.forEach((pos,i)=>{
    const soldier=ch4BuildRiggedPerson(pos[0],pos[1],pos[2],M.skin,
      new THREE.MeshLambertMaterial({color:0x334433}),
      new THREE.MeshLambertMaterial({color:0x334433}),null,Math.random()*Math.PI*2);
    soldier.userData.dialogue=soldierDialogues[i];
    soldier.userData.name=soldierNames[i];
    ch2Npcs.push({id:'ch5_soldier_'+i,x:pos[0],z:pos[2],radius:3,mesh:soldier});
  });

  // End trigger
  ch2Npcs.push({id:'ch5_end_trigger',x:0,z:-39,radius:3,mesh:null});

  // Marcus
  ch5Marcus=ch5BuildMarcusInjured(2,0,-10,Math.PI);
  ch5MarcusFollowing=true;ch5MarcusWalkSpeed=3;

  ch2P.x=0;ch2P.y=0;ch2P.z=0;yaw=Math.PI;
  setLoc('BLACK FOREST BUNKER — MAIN GATE');

  showSub('BLACK FOREST BUNKER','Military Headquarters',3000);

  startDlg([
    {speaker:'SYSTEM',text:"*The Black Forest Bunker looms ahead — a fortress of concrete and steel.*"},
    {speaker:'SYSTEM',text:"*Soldiers man the walls. Vehicles are positioned. Defenses are ready.*"},
    {speaker:'Carl',text:"*stops, looking up at the massive gate* ...we made it."},
    {speaker:'Marcus',text:"*leaning on Carl* ...barely. Talk to the Commander. He needs to know."},
    {speaker:'SYSTEM',text:"*Talk to the soldiers. Find the Commander. Warn them about the invasion.*"}
  ]);
}

// ═══════════════════════════════════════════
// CHAPTER 5 ENDING
// ═══════════════════════════════════════════
function ch5EndingSequence(){
  ch3Cinematic=true;
  blackout(true);

  setTimeout(()=>{
    showSub('','*The bunker alarms begin to wail...*',2500);
    setTimeout(()=>{
      sfxAlarm();
      showSub('','*In the sky above the forest... a golden light begins to pulse.*',3000);

      setTimeout(()=>{
        won=true;ch3Cinematic=false;
        $('end').style.display='flex';
        $('end').querySelector('h1').textContent='CHAPTER 5 COMPLETE';
        $('end').querySelector('p').innerHTML='<span style="color:#aaa;font-size:15px">The Commander\'s orders echoed through the bunker corridors.<br><br>Soldiers scrambled to their positions.<br>Weapons were loaded. Doors were sealed.<br>Families huddled in the lower levels, praying.<br><br>Carl stood at the gate, watching the sky.<br><br>The golden light grew brighter — pulsing, growing,<br>splitting the clouds apart like a wound in the heavens.<br><br>Marcus sat against the wall, bandaged and broken,<br>but his eyes burned with something the Casino Master couldn\'t take.<br><br>Defiance.<br><br>"They\'re coming," Marcus whispered.<br><br>Carl checked his weapon. Sixty rounds.<br>Not enough. Never enough.<br><br>But he\'d fought with less. He\'d survived with less.<br><br>The forest shook. The trees bent.<br>A sound like thunder rolled across the mountains.<br><br>And then — in the heart of the golden light —<br>the portal opened.<br><br>It was bigger than anything they\'d seen before.<br>A tear in reality itself, humming with ancient power.<br><br>Through it, shapes began to emerge.<br>Thousands of them.<br><br>The Casino Master\'s army.<br><br>Carl raised his weapon.<br><br>"Let them come."<br><br></span><span style="color:#ffd700;font-family:Bebas Neue;font-size:28px;letter-spacing:6px">TO BE CONTINUED...</span>';
        $('hud').style.display='none';blackout(false);
      },4000);
    },3000);
  },2000);
}

// ── Unlock function for Ch5 ──
function unlockCh5(){
  const b=$('ch5btn');
  if(b.style.display==='none'){
    b.style.display='block';initAudio();sfxAlarm();
    flash('#ff6600',300);
    const letter=$('secret-i');
    if(letter){letter.style.transition='transform 1.5s ease-in, opacity 1s 0.5s, color 0.3s';
      letter.style.color='#ff6600';letter.style.textShadow='0 0 20px #ff6600,0 0 40px #ff6600';
      letter.style.transform='translateY(200px) rotate(-45deg)';letter.style.opacity='0';
      letter.style.pointerEvents='none';}
  }
}

function startGame(){
  $('blocker').style.display='none';$('hud').style.display='block';
  initAudio();init();document.body.requestPointerLock();update();
}
